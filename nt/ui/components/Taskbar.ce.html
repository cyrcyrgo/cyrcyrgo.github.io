<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
</head>
<body>
<!-- ============================================================
     Taskbar.ce.html — WebNT-HTML5 Web OS Kernel Taskbar Component
     Custom Element: <nt-taskbar>
     Uses Shadow DOM (open mode) for style encapsulation.
     【对接内核】Window button list synced with WindowManager.
     ============================================================ -->

<template id="nt-taskbar-template">
  <style>
    :host {
      display: block;
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: var(--sys-taskbar-height, 48px);
      font-family: var(--sys-font-ui, 'Segoe UI', sans-serif);
      font-size: var(--sys-font-size-sm, 12px);
      color: var(--sys-taskbar-text, #e8eaed);
      z-index: 90000;
      user-select: none;
      -webkit-user-select: none;
    }

    .taskbar {
      display: flex;
      align-items: center;
      width: 100%;
      height: 100%;
      background: rgba(30, 30, 30, 0.85);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 -2px 12px rgba(0, 0, 0, 0.3);
      padding: 0 4px;
      gap: 2px;
    }

    /* ── Left Section: Start Button ──────────────────── */
    .taskbar-left {
      display: flex;
      align-items: center;
      height: 100%;
      flex-shrink: 0;
    }

    .start-button {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border-radius: 6px;
      cursor: pointer;
      transition: background var(--sys-transition-fast, 100ms ease);
      position: relative;
    }

    .start-button:hover {
      background: rgba(255, 255, 255, 0.08);
    }

    .start-button:active,
    .start-button.active {
      background: rgba(255, 255, 255, 0.13);
    }

    .start-button svg {
      width: 20px;
      height: 20px;
      transition: transform var(--sys-transition-normal, 200ms ease);
    }

    .start-button:hover svg {
      transform: scale(1.1);
    }

    .start-button.active svg {
      transform: scale(1.05);
    }

    /* ── Center Section: Window Buttons ──────────────── */
    .taskbar-center {
      display: flex;
      align-items: center;
      flex: 1;
      height: 100%;
      overflow-x: auto;
      overflow-y: hidden;
      gap: 2px;
      padding: 0 4px;
    }

    .taskbar-center::-webkit-scrollbar {
      height: 3px;
    }

    .taskbar-center::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.15);
      border-radius: 2px;
    }

    .window-button {
      display: flex;
      align-items: center;
      height: 36px;
      min-width: 40px;
      max-width: 200px;
      padding: 0 10px;
      border-radius: 6px;
      cursor: pointer;
      gap: 8px;
      transition: background var(--sys-transition-fast, 100ms ease),
                  color var(--sys-transition-fast, 100ms ease);
      white-space: nowrap;
      border: 1px solid transparent;
      flex-shrink: 0;
    }

    .window-button:hover {
      background: rgba(255, 255, 255, 0.07);
    }

    .window-button:active {
      background: rgba(255, 255, 255, 0.12);
    }

    .window-button.active {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.15);
    }

    .window-button.minimized {
      opacity: 0.55;
    }

    .window-button.minimized:hover {
      opacity: 0.8;
    }

    .window-button .btn-icon {
      width: 18px;
      height: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .window-button .btn-icon svg {
      width: 14px;
      height: 14px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .window-button .btn-title {
      font-size: var(--sys-font-size-sm, 12px);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 140px;
    }

    /* ── Right Section: System Tray ──────────────────── */
    .taskbar-right {
      display: flex;
      align-items: center;
      height: 100%;
      flex-shrink: 0;
      gap: 2px;
      padding-right: 4px;
    }

    .tray-item {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 36px;
      min-width: 36px;
      padding: 0 6px;
      border-radius: 6px;
      cursor: pointer;
      transition: background var(--sys-transition-fast, 100ms ease);
      position: relative;
    }

    .tray-item:hover {
      background: rgba(255, 255, 255, 0.07);
    }

    .tray-item:active {
      background: rgba(255, 255, 255, 0.13);
    }

    .tray-item svg {
      width: 16px;
      height: 16px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .tray-clock {
      font-size: var(--sys-font-size-sm, 12px);
      font-variant-numeric: tabular-nums;
      padding: 0 8px;
      min-width: auto;
      line-height: 1;
      flex-direction: column;
      align-items: flex-end;
      gap: 0;
    }

    .tray-clock .time {
      font-weight: 500;
    }

    .tray-clock .date {
      font-size: 10px;
      opacity: 0.7;
      display: none;
    }

    .tray-clock.show-date .date {
      display: block;
    }

    .tray-clock.show-date .time {
      font-size: 11px;
    }

    .tray-separator {
      width: 1px;
      height: 20px;
      background: rgba(255, 255, 255, 0.12);
      margin: 0 2px;
    }

    /* ── Notification Badge ────────────────────────────── */
    .notification-badge {
      position: absolute;
      top: 4px;
      right: 4px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--sys-accent, #8ab4f8);
      display: none;
    }

    .notification-badge.visible {
      display: block;
    }

    /* ── Context Menu Overlay ──────────────────────────── */
    #context-menu-host {
      position: absolute;
      z-index: 100000;
    }

    /* ── Flyout Panels ─────────────────────────────────── */
    .flyout-panel {
      position: absolute;
      bottom: calc(var(--sys-taskbar-height, 48px) + 4px);
      background: rgba(30, 30, 30, 0.92);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      padding: 12px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      display: none;
      min-width: 260px;
      color: var(--sys-taskbar-text, #e8eaed);
      font-size: var(--sys-font-size-sm, 12px);
      z-index: 99999;
      animation: flyout-slide-up var(--sys-transition-normal, 200ms ease) forwards;
    }

    .flyout-panel.visible {
      display: block;
    }

    @keyframes flyout-slide-up {
      from {
        transform: translateY(8px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .flyout-panel .panel-title {
      font-size: var(--sys-font-size-md, 14px);
      font-weight: 600;
      margin-bottom: 8px;
      color: inherit;
    }

    .flyout-panel .panel-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 0;
      gap: 8px;
    }

    .flyout-panel .panel-label {
      opacity: 0.7;
    }

    .flyout-panel .panel-value {
      font-weight: 500;
    }

    .flyout-panel .volume-slider {
      width: 100%;
      height: 4px;
      -webkit-appearance: none;
      appearance: none;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 2px;
      outline: none;
      margin: 8px 0;
    }

    .flyout-panel .volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--sys-accent, #8ab4f8);
      cursor: pointer;
    }

    .flyout-panel .notification-list {
      max-height: 200px;
      overflow-y: auto;
    }

    .flyout-panel .notification-item {
      padding: 8px;
      border-radius: 6px;
      margin-bottom: 4px;
      background: rgba(255, 255, 255, 0.04);
      border-left: 3px solid var(--sys-accent, #8ab4f8);
    }

    .flyout-panel .notification-item.warning {
      border-left-color: var(--sys-warning, #fdd663);
    }

    .flyout-panel .notification-item.error {
      border-left-color: var(--sys-danger, #f28b82);
    }

    .flyout-panel .notification-title {
      font-weight: 500;
      margin-bottom: 2px;
    }

    .flyout-panel .notification-message {
      opacity: 0.7;
      font-size: 11px;
    }

    .flyout-panel .clear-btn {
      display: block;
      width: 100%;
      padding: 6px;
      margin-top: 8px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 6px;
      color: inherit;
      cursor: pointer;
      font-size: var(--sys-font-size-sm, 12px);
      text-align: center;
      transition: background var(--sys-transition-fast, 100ms ease);
    }

    .flyout-panel .clear-btn:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    /* ── Responsive: small screens ──────────────────────── */
    @container (max-width: 480px) {
      .window-button {
        max-width: 120px;
        padding: 0 6px;
      }
      .window-button .btn-title {
        max-width: 70px;
      }
      .tray-item {
        min-width: 28px;
        padding: 0 4px;
      }
    }
  </style>

  <!-- Left: Start Button -->
  <div class="taskbar">
    <div class="taskbar-left">
      <div class="start-button" id="start-button" title="Start">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M3 3h8.5v8.5H3V3zm0 9.5h8.5V21H3v-8.5zM12.5 3H21v8.5h-8.5V3zm0 9.5H21V21h-8.5v-8.5z"/>
        </svg>
      </div>
    </div>

    <!-- Center: Window Buttons -->
    <div class="taskbar-center" id="taskbar-center">
      <!-- Window buttons rendered dynamically -->
    </div>

    <!-- Right: System Tray -->
    <div class="taskbar-right" id="taskbar-right">
      <!-- Terminal quick launch -->
      <div class="tray-item" id="tray-terminal" title="Terminal">
        <svg viewBox="0 0 24 24">
          <polyline points="4 17 10 11 4 5"/>
          <line x1="12" y1="19" x2="20" y2="19"/>
        </svg>
      </div>

      <div class="tray-separator"></div>

      <!-- Network -->
      <div class="tray-item" id="tray-network" title="Network">
        <svg viewBox="0 0 24 24">
          <path d="M5 12.55a11 11 0 0 1 14.08 0"/>
          <path d="M1.42 9a16 16 0 0 1 21.16 0"/>
          <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
          <circle cx="12" cy="20" r="1"/>
        </svg>
      </div>

      <!-- Volume -->
      <div class="tray-item" id="tray-volume" title="Volume">
        <svg viewBox="0 0 24 24">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/>
        </svg>
      </div>

      <!-- Notifications -->
      <div class="tray-item" id="tray-notification" title="Notifications">
        <svg viewBox="0 0 24 24">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
        <span class="notification-badge" id="notification-badge"></span>
      </div>

      <div class="tray-separator"></div>

      <!-- Clock -->
      <div class="tray-item tray-clock" id="tray-clock" title="Click to show date">
        <span class="time" id="clock-time">00:00</span>
        <span class="date" id="clock-date"></span>
      </div>
    </div>
  </div>

  <!-- Context Menu Host -->
  <div id="context-menu-host"></div>

  <!-- Network Flyout -->
  <div class="flyout-panel" id="flyout-network">
    <div class="panel-title">Network</div>
    <div class="panel-row">
      <span class="panel-label">Status:</span>
      <span class="panel-value" id="net-status">Connected</span>
    </div>
    <div class="panel-row">
      <span class="panel-label">Adapter:</span>
      <span class="panel-value" id="net-adapter">eth0</span>
    </div>
    <div class="panel-row">
      <span class="panel-label">IP Address:</span>
      <span class="panel-value" id="net-ip">127.0.0.1</span>
    </div>
  </div>

  <!-- Volume Flyout -->
  <div class="flyout-panel" id="flyout-volume">
    <div class="panel-title">Volume</div>
    <div class="panel-row">
      <span class="panel-label">Level:</span>
      <span class="panel-value" id="vol-level">50%</span>
    </div>
    <input type="range" class="volume-slider" id="volume-slider" min="0" max="100" value="50">
  </div>

  <!-- Notification Flyout -->
  <div class="flyout-panel" id="flyout-notification">
    <div class="panel-title">Notifications</div>
    <div class="notification-list" id="notification-list">
      <div style="text-align:center;opacity:0.5;padding:16px;">No notifications</div>
    </div>
    <button class="clear-btn" id="clear-notifications">Clear All</button>
  </div>
</template>

<script type="module">
  import WindowManager from '../../subsystem/window-manager/WindowManager.Core.js';
  import SysCallBridge from '../../kernel/syscall/SysCall.Bridge.js';
  import ProcessManager from '../../kernel/executor/ProcessManager.js';

  /**
   * SVG icon paths for common apps on taskbar buttons.
   */
  const APP_ICONS = {
    terminal: `<svg viewBox="0 0 24 24"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>`,
    explorer: `<svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>`,
    settings: `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>`,
    webview: `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>`,
    notepad: `<svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>`,
    monitor: `<svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>`,
    bin: `<svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>`,
    calculator: `<svg viewBox="0 0 24 24"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="8" y1="10" x2="16" y2="10"/><line x1="8" y1="14" x2="12" y2="14"/></svg>`,
    monitor2: `<svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>`,
    taskmgr: `<svg viewBox="0 0 24 24"><path d="M12 20V10"/><path d="M18 20V4"/><path d="M6 20v-4"/></svg>`,
    default: `<svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="9" y1="9" x2="15" y2="15"/><line x1="15" y1="9" x2="9" y2="15"/></svg>`,
  };

  /**
   * Context menu items for window buttons.
   */
  function getWindowContextMenuItems(windowId) {
    return [
      { label: 'Restore',    action: 'restore',    windowId },
      { label: 'Minimize',   action: 'minimize',   windowId },
      { label: 'Maximize',   action: 'maximize',   windowId },
      { label: '',           separator: true },
      { label: 'Close',      action: 'close',      windowId },
      { label: '',           separator: true },
      { label: 'Move to desktop', action: 'move-desktop', windowId },
    ];
  }

  class NtTaskbar extends HTMLElement {
    constructor() {
      super();
      this.attachShadow({ mode: 'open' });

      const template = document.getElementById('nt-taskbar-template');
      if (template) {
        this.shadowRoot.appendChild(template.content.cloneNode(true));
      }

      this._startMenuVisible = false;
      this._windowButtons = new Map();
      this._contextMenu = null;
      this._clockInterval = null;
      this._showDate = false;
      this._activeFlyout = null;
      this._volumeLevel = 50;
      this._notifications = [];
      this._notificationCount = 0;
    }

    connectedCallback() {
      this._bindEvents();
      this._startClock();
      this._setupContextMenu();
      this._initWindowManagerListeners();
      this._syncWindowList();
      this._updateNetworkInfo();
    }

    disconnectedCallback() {
      this._stopClock();
      this._unbindWindowManagerListeners();
    }

    /* ── Bind DOM events ── */
    _bindEvents() {
      const root = this.shadowRoot;

      // Start button
      const startBtn = root.getElementById('start-button');
      if (startBtn) {
        startBtn.addEventListener('click', () => this._toggleStartMenu());
      }

      // Terminal quick launch
      const terminalBtn = root.getElementById('tray-terminal');
      if (terminalBtn) {
        terminalBtn.addEventListener('click', () => this._launchTerminal());
      }

      // Network tray icon
      const netBtn = root.getElementById('tray-network');
      if (netBtn) {
        netBtn.addEventListener('click', (e) => this._toggleFlyout('network', e));
      }

      // Volume tray icon
      const volBtn = root.getElementById('tray-volume');
      if (volBtn) {
        volBtn.addEventListener('click', (e) => this._toggleFlyout('volume', e));
      }

      // Notification tray icon
      const notifBtn = root.getElementById('tray-notification');
      if (notifBtn) {
        notifBtn.addEventListener('click', (e) => this._toggleFlyout('notification', e));
      }

      // Clock
      const clockBtn = root.getElementById('tray-clock');
      if (clockBtn) {
        clockBtn.addEventListener('click', () => this._toggleClockDate());
      }

      // Volume slider
      const volSlider = root.getElementById('volume-slider');
      if (volSlider) {
        volSlider.addEventListener('input', (e) => this._onVolumeChange(e.target.value));
      }

      // Clear notifications
      const clearBtn = root.getElementById('clear-notifications');
      if (clearBtn) {
        clearBtn.addEventListener('click', () => this._clearNotifications());
      }

      // Click outside to close flyouts
      document.addEventListener('mousedown', (e) => this._onClickOutside(e));
    }

    /* ── Start / Stop Clock ── */
    _startClock() {
      this._updateClock();
      this._clockInterval = setInterval(() => this._updateClock(), 1000);
    }

    _stopClock() {
      if (this._clockInterval) {
        clearInterval(this._clockInterval);
        this._clockInterval = null;
      }
    }

    _updateClock() {
      const now = new Date();
      const timeStr = this._formatTime(now);
      const dateStr = this._formatDate(now);

      const timeEl = this.shadowRoot.getElementById('clock-time');
      const dateEl = this.shadowRoot.getElementById('clock-date');

      if (timeEl) timeEl.textContent = timeStr;
      if (dateEl) dateEl.textContent = dateStr;
    }

    _formatTime(date) {
      const h = String(date.getHours()).padStart(2, '0');
      const m = String(date.getMinutes()).padStart(2, '0');
      return `${h}:${m}`;
    }

    _formatDate(date) {
      const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
      const months = ['January', 'February', 'March', 'April', 'May', 'June',
        'July', 'August', 'September', 'October', 'November', 'December'];
      return `${days[date.getDay()]}, ${months[date.getMonth()]} ${date.getDate()}, ${date.getFullYear()}`;
    }

    _toggleClockDate() {
      this._showDate = !this._showDate;
      const clockEl = this.shadowRoot.getElementById('tray-clock');
      if (clockEl) {
        if (this._showDate) {
          clockEl.classList.add('show-date');
        } else {
          clockEl.classList.remove('show-date');
        }
      }
    }

    /* ── Start Menu Toggle ── */
    _toggleStartMenu() {
      this._startMenuVisible = !this._startMenuVisible;
      const startBtn = this.shadowRoot.getElementById('start-button');

      if (this._startMenuVisible) {
        startBtn?.classList.add('active');
        this._showStartMenu();
      } else {
        startBtn?.classList.remove('active');
        this._hideStartMenu();
      }
    }

    _showStartMenu() {
      let menu = document.querySelector('nt-startmenu');
      if (!menu) {
        menu = document.createElement('nt-startmenu');
        document.body.appendChild(menu);
      }
      menu.show();
    }

    _hideStartMenu() {
      const menu = document.querySelector('nt-startmenu');
      if (menu && menu.hide) {
        menu.hide();
      }
    }

    /* ── 【对接内核】Window Manager Integration ── */
    _initWindowManagerListeners() {
      const wm = WindowManager.instance;

      this._boundOnWindowCreated = (data) => this._onWindowCreated(data);
      this._boundOnWindowDestroyed = (data) => this._onWindowDestroyed(data);
      this._boundOnWindowFocused = (data) => this._onWindowFocused(data);
      this._boundOnWindowStateChanged = (data) => this._onWindowStateChanged(data);
      this._boundOnWindowMoved = (data) => this._onWindowMoved(data);

      wm.on('window-created', this._boundOnWindowCreated);
      wm.on('window-destroyed', this._boundOnWindowDestroyed);
      wm.on('window-focused', this._boundOnWindowFocused);
      wm.on('window-state-changed', this._boundOnWindowStateChanged);
      wm.on('window-moved', this._boundOnWindowMoved);
    }

    _unbindWindowManagerListeners() {
      const wm = WindowManager.instance;
      if (this._boundOnWindowCreated) wm.off('window-created', this._boundOnWindowCreated);
      if (this._boundOnWindowDestroyed) wm.off('window-destroyed', this._boundOnWindowDestroyed);
      if (this._boundOnWindowFocused) wm.off('window-focused', this._boundOnWindowFocused);
      if (this._boundOnWindowStateChanged) wm.off('window-state-changed', this._boundOnWindowStateChanged);
      if (this._boundOnWindowMoved) wm.off('window-moved', this._boundOnWindowMoved);
    }

    _onWindowCreated(data) {
      if (data && data.window) {
        this._addWindowButton(data.window);
      }
    }

    _onWindowDestroyed(data) {
      if (data && data.windowId) {
        this._removeWindowButton(data.windowId);
      }
    }

    _onWindowFocused(data) {
      if (data && data.window) {
        this._updateWindowButton(data.windowId, data.window);
      }
    }

    _onWindowStateChanged(data) {
      if (data && data.window) {
        this._updateWindowButton(data.windowId, data.window);
      }
    }

    _onWindowMoved(data) {
      // Window position change doesn't affect taskbar button state
    }

    _syncWindowList() {
      const wm = WindowManager.instance;
      const windows = wm.getWindowList();
      for (const win of windows) {
        this._addWindowButton(win);
      }
    }

    /* ── Window Button Management ── */
    _addWindowButton(windowInfo) {
      if (this._windowButtons.has(windowInfo.id)) return;

      const center = this.shadowRoot.getElementById('taskbar-center');
      if (!center) return;

      const btn = document.createElement('div');
      btn.className = 'window-button';
      btn.setAttribute('data-window-id', windowInfo.id);
      btn.title = windowInfo.title;

      if (windowInfo.focused) {
        btn.classList.add('active');
      }
      if (windowInfo.state === 'MINIMIZED') {
        btn.classList.add('minimized');
      }

      // Icon
      const iconWrap = document.createElement('span');
      iconWrap.className = 'btn-icon';
      const iconSvg = APP_ICONS[windowInfo.appId] || APP_ICONS[windowInfo.icon] || APP_ICONS['default'];
      iconWrap.innerHTML = iconSvg;
      btn.appendChild(iconWrap);

      // Title
      const title = document.createElement('span');
      title.className = 'btn-title';
      title.textContent = windowInfo.title;
      btn.appendChild(title);

      // Click handler: focus and bring to front
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const wm = WindowManager.instance;
        const info = wm.getWindowInfo(windowInfo.id);
        if (info) {
          if (info.state === 'MINIMIZED') {
            wm.setWindowState(windowInfo.id, 'NORMAL');
          }
          wm.bringToFront(windowInfo.id);
          wm.setFocus(windowInfo.id);
        }
      });

      // Right-click: context menu
      btn.addEventListener('contextmenu', (e) => {
        e.preventDefault();
        e.stopPropagation();
        this._showWindowContextMenu(e.clientX, e.clientY, windowInfo.id);
      });

      center.appendChild(btn);
      this._windowButtons.set(windowInfo.id, { element: btn, info: windowInfo });
    }

    _removeWindowButton(windowId) {
      const entry = this._windowButtons.get(windowId);
      if (entry) {
        entry.element.remove();
        this._windowButtons.delete(windowId);
      }
    }

    _updateWindowButton(windowId, windowInfo) {
      const entry = this._windowButtons.get(windowId);
      if (!entry) {
        // Button not yet created, add it
        if (windowInfo) {
          this._addWindowButton(windowInfo);
        }
        return;
      }

      const btn = entry.element;
      const title = btn.querySelector('.btn-title');
      if (title) {
        title.textContent = windowInfo.title;
      }

      // Update active state
      if (windowInfo.focused) {
        btn.classList.add('active');
      } else {
        btn.classList.remove('active');
      }

      // Update minimized state
      if (windowInfo.state === 'MINIMIZED') {
        btn.classList.add('minimized');
      } else {
        btn.classList.remove('minimized');
      }

      this._windowButtons.set(windowId, { element: btn, info: windowInfo });
    }

    /* ── Window Context Menu ── */
    _setupContextMenu() {
      this._contextMenu = document.createElement('nt-contextmenu');
      const host = this.shadowRoot.getElementById('context-menu-host');
      if (host) {
        host.appendChild(this._contextMenu);
      }
    }

    _showWindowContextMenu(x, y, windowId) {
      if (!this._contextMenu) return;
      const items = getWindowContextMenuItems(windowId);
      this._contextMenu.show(x, y, items, (action) => this._handleWindowContextAction(action, windowId));
    }

    _handleWindowContextAction(action, windowId) {
      const wm = WindowManager.instance;
      switch (action) {
        case 'restore': {
          const info = wm.getWindowInfo(windowId);
          if (info && info.state === 'MINIMIZED') {
            wm.setWindowState(windowId, 'NORMAL');
          }
          wm.bringToFront(windowId);
          wm.setFocus(windowId);
          break;
        }
        case 'minimize':
          wm.setWindowState(windowId, 'MINIMIZED');
          break;
        case 'maximize':
          wm.setWindowState(windowId, 'MAXIMIZED');
          break;
        case 'close':
          wm.destroyWindow(windowId);
          break;
        case 'move-desktop':
          // Placeholder: move window to virtual desktop
          this._addNotification('Desktop', 'Move to desktop is not yet implemented', 'info');
          break;
        default:
          break;
      }
    }

    /* ── 【对接内核】Terminal Launch ── */
    _launchTerminal() {
      const wm = WindowManager.instance;
      wm.createWindow({
        title: 'Terminal',
        width: 720,
        height: 480,
        icon: 'terminal',
        appId: 'terminal',
        resizable: true,
      });
    }

    /* ── Flyout Management ── */
    _toggleFlyout(panel, event) {
      event.stopPropagation();
      const flyout = this.shadowRoot.getElementById(`flyout-${panel}`);
      if (!flyout) return;

      if (this._activeFlyout === panel && flyout.classList.contains('visible')) {
        flyout.classList.remove('visible');
        this._activeFlyout = null;
        return;
      }

      // Hide all flyouts
      this._hideAllFlyouts();

      // Position and show the flyout
      const trigger = event.currentTarget;
      const triggerRect = trigger.getBoundingClientRect();
      const taskbarRect = this.getBoundingClientRect();

      flyout.style.right = `${window.innerWidth - triggerRect.right}px`;
      flyout.classList.add('visible');
      this._activeFlyout = panel;

      // Update content based on panel type
      switch (panel) {
        case 'network':
          this._updateNetworkInfo();
          break;
        case 'volume':
          this._updateVolumeDisplay();
          break;
        case 'notification':
          this._renderNotifications();
          break;
      }
    }

    _hideAllFlyouts() {
      const panels = ['network', 'volume', 'notification'];
      for (const p of panels) {
        const el = this.shadowRoot.getElementById(`flyout-${p}`);
        if (el) el.classList.remove('visible');
      }
      this._activeFlyout = null;
    }

    _onClickOutside(e) {
      if (!this._activeFlyout) return;
      const path = e.composedPath();
      const flyout = this.shadowRoot.getElementById(`flyout-${this._activeFlyout}`);
      if (flyout && !path.includes(flyout)) {
        // Check if click is on the trigger
        const triggerId = `tray-${this._activeFlyout}`;
        const trigger = this.shadowRoot.getElementById(triggerId);
        if (trigger && !path.includes(trigger)) {
          this._hideAllFlyouts();
        }
      }
    }

    /* ── 【对接内核】Network Info ── */
    async _updateNetworkInfo() {
      try {
        const result = await SysCallBridge.instance.call('NtGetSystemInfo');
        const netStatus = this.shadowRoot.getElementById('net-status');
        const netAdapter = this.shadowRoot.getElementById('net-adapter');
        const netIp = this.shadowRoot.getElementById('net-ip');

        if (netStatus) netStatus.textContent = 'Connected';
        if (netAdapter) netAdapter.textContent = result?.arch || 'web';
        if (netIp) netIp.textContent = '127.0.0.1';
      } catch {
        const netStatus = this.shadowRoot.getElementById('net-status');
        if (netStatus) netStatus.textContent = 'Connected';
      }
    }

    /* ── Volume Control ── */
    _onVolumeChange(value) {
      this._volumeLevel = parseInt(value, 10);
      this._updateVolumeDisplay();
    }

    _updateVolumeDisplay() {
      const volLevel = this.shadowRoot.getElementById('vol-level');
      const volSlider = this.shadowRoot.getElementById('volume-slider');

      if (volLevel) volLevel.textContent = `${this._volumeLevel}%`;
      if (volSlider) volSlider.value = this._volumeLevel;
    }

    /* ── Notifications ── */
    _addNotification(title, message, type = 'info') {
      this._notifications.unshift({ title, message, type, time: Date.now() });
      this._notificationCount++;

      // Update badge
      const badge = this.shadowRoot.getElementById('notification-badge');
      if (badge) {
        badge.classList.add('visible');
      }

      // Re-render if notification panel is open
      if (this._activeFlyout === 'notification') {
        this._renderNotifications();
      }
    }

    _clearNotifications() {
      this._notifications = [];
      this._notificationCount = 0;

      const badge = this.shadowRoot.getElementById('notification-badge');
      if (badge) {
        badge.classList.remove('visible');
      }

      this._renderNotifications();
    }

    _renderNotifications() {
      const list = this.shadowRoot.getElementById('notification-list');
      if (!list) return;

      if (this._notifications.length === 0) {
        list.innerHTML = '<div style="text-align:center;opacity:0.5;padding:16px;">No notifications</div>';
        return;
      }

      list.innerHTML = '';
      for (const notif of this._notifications) {
        const item = document.createElement('div');
        item.className = `notification-item ${notif.type}`;
        item.innerHTML = `
          <div class="notification-title">${this._escapeHtml(notif.title)}</div>
          <div class="notification-message">${this._escapeHtml(notif.message)}</div>
        `;
        list.appendChild(item);
      }
    }

    _escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    /* ── Public API exposed for TaskbarController ── */
    addWindowButton(windowInfo) {
      this._addWindowButton(windowInfo);
    }

    removeWindowButton(windowId) {
      this._removeWindowButton(windowId);
    }

    updateWindowButton(windowId, info) {
      this._updateWindowButton(windowId, info);
    }

    toggleStartMenu() {
      this._toggleStartMenu();
    }

    addNotification(title, message, type) {
      this._addNotification(title, message, type);
    }

    clearNotifications() {
      this._clearNotifications();
    }
  }

  customElements.define('nt-taskbar', NtTaskbar);
</script>

</body>
</html>
