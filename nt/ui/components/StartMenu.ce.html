<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
</head>
<body>
<!-- ============================================================
     StartMenu.ce.html — WebNT-HTML5 Web OS Kernel Start Menu
     Custom Element: <nt-startmenu>
     Uses Shadow DOM (open mode) for style encapsulation.
     【对接内核】Launch apps via WindowManager.createWindow().
     【对接内核】Shutdown/Restart via SysCallBridge.call().
     ============================================================ -->

<template id="nt-startmenu-template">
  <style>
    :host {
      display: none;
      position: fixed;
      bottom: calc(var(--sys-taskbar-height, 48px) + 4px);
      left: 8px;
      z-index: 95000;
      font-family: var(--sys-font-ui, 'Segoe UI', sans-serif);
      font-size: var(--sys-font-size-sm, 12px);
      color: var(--sys-taskbar-text, #e8eaed);
      user-select: none;
      -webkit-user-select: none;
    }

    :host(.visible) {
      display: block;
    }

    .start-menu {
      display: flex;
      width: 580px;
      height: 520px;
      background: rgba(30, 30, 30, 0.92);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.55);
      overflow: hidden;
      animation: startmenu-slide-up var(--sys-transition-slow, 350ms ease) forwards;
    }

    @keyframes startmenu-slide-up {
      from {
        transform: translateY(20px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    /* ── Left Sidebar ────────────────────────────────── */
    .sidebar {
      display: flex;
      flex-direction: column;
      width: 200px;
      min-width: 200px;
      background: rgba(255, 255, 255, 0.03);
      border-right: 1px solid rgba(255, 255, 255, 0.06);
      padding: 16px 0 0 0;
    }

    .user-section {
      display: flex;
      align-items: center;
      padding: 8px 14px;
      gap: 10px;
      margin-bottom: 4px;
    }

    .user-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--sys-accent, #8ab4f8);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 16px;
      color: #1a1c1e;
      flex-shrink: 0;
    }

    .user-name {
      font-weight: 500;
      font-size: var(--sys-font-size-md, 14px);
      color: inherit;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .sidebar-divider {
      height: 1px;
      background: rgba(255, 255, 255, 0.06);
      margin: 8px 12px;
    }

    .sidebar-actions {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 8px;
    }

    .power-button {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 8px;
      cursor: pointer;
      transition: background var(--sys-transition-fast, 100ms ease);
      font-size: var(--sys-font-size-md, 14px);
      color: inherit;
    }

    .power-button:hover {
      background: rgba(255, 255, 255, 0.06);
    }

    .power-button:active {
      background: rgba(255, 255, 255, 0.1);
    }

    .power-button svg {
      width: 18px;
      height: 18px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .power-button.shutdown svg {
      stroke: var(--sys-danger, #f28b82);
    }

    .power-button.shutdown {
      color: var(--sys-danger, #f28b82);
    }

    .power-menu {
      display: none;
      flex-direction: column;
      padding: 4px;
      gap: 2px;
    }

    .power-menu.visible {
      display: flex;
    }

    .power-menu-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      border-radius: 6px;
      cursor: pointer;
      transition: background var(--sys-transition-fast, 100ms ease);
      font-size: var(--sys-font-size-sm, 12px);
      color: inherit;
    }

    .power-menu-item:hover {
      background: rgba(255, 255, 255, 0.06);
    }

    .power-menu-item svg {
      width: 16px;
      height: 16px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* ── Right Panel ─────────────────────────────────── */
    .main-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 12px;
      overflow: hidden;
      min-width: 0;
    }

    .search-box {
      display: flex;
      align-items: center;
      padding: 8px 12px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      margin-bottom: 12px;
      gap: 8px;
      transition: border-color var(--sys-transition-fast, 100ms ease);
    }

    .search-box:focus-within {
      border-color: var(--sys-accent, #8ab4f8);
    }

    .search-box svg {
      width: 16px;
      height: 16px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.5;
      opacity: 0.5;
      flex-shrink: 0;
    }

    .search-box input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: inherit;
      font-size: var(--sys-font-size-md, 14px);
      font-family: inherit;
    }

    .search-box input::placeholder {
      color: rgba(255, 255, 255, 0.3);
    }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      opacity: 0.5;
      padding: 4px 8px;
      margin-bottom: 4px;
    }

    .app-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 1px;
      padding-right: 4px;
    }

    .app-list::-webkit-scrollbar {
      width: 4px;
    }

    .app-list::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
    }

    .app-item {
      display: flex;
      align-items: center;
      padding: 10px 8px;
      border-radius: 8px;
      cursor: pointer;
      gap: 10px;
      transition: background var(--sys-transition-fast, 100ms ease);
    }

    .app-item:hover {
      background: rgba(255, 255, 255, 0.06);
    }

    .app-item:active {
      background: rgba(255, 255, 255, 0.1);
    }

    .app-item.hidden {
      display: none;
    }

    .app-icon {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .app-icon svg {
      width: 20px;
      height: 20px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .app-icon.terminal {
      background: rgba(78, 201, 176, 0.15);
      color: #4ec9b0;
    }

    .app-icon.explorer {
      background: rgba(255, 193, 7, 0.15);
      color: #ffc107;
    }

    .app-icon.settings {
      background: rgba(138, 180, 248, 0.15);
      color: #8ab4f8;
    }

    .app-icon.webview {
      background: rgba(129, 201, 149, 0.15);
      color: #81c995;
    }

    .app-icon.notepad {
      background: rgba(253, 214, 99, 0.15);
      color: #fdd663;
    }

    .app-icon.calculator {
      background: rgba(200, 165, 230, 0.15);
      color: #c8a5e6;
    }

    .app-icon.taskmgr {
      background: rgba(242, 139, 130, 0.15);
      color: #f28b82;
    }

    .app-icon.sysmon {
      background: rgba(129, 212, 250, 0.15);
      color: #81d4fa;
    }

    .app-name {
      flex: 1;
      font-size: var(--sys-font-size-md, 14px);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .app-name .highlight {
      color: var(--sys-accent, #8ab4f8);
      font-weight: 500;
    }

    .no-results {
      text-align: center;
      padding: 24px;
      opacity: 0.5;
      font-size: var(--sys-font-size-md, 14px);
    }

    /* ── Responsive ──────────────────────────────────── */
    @container (max-width: 640px) {
      .start-menu {
        width: 360px;
        height: 440px;
      }
      .sidebar {
        display: none;
      }
      .main-panel {
        padding: 10px;
      }
    }
  </style>

  <div class="start-menu">
    <!-- Left Sidebar -->
    <div class="sidebar">
      <div class="user-section">
        <div class="user-avatar" id="user-avatar">WN</div>
        <div class="user-name">WebNT User</div>
      </div>

      <div class="sidebar-divider"></div>

      <div class="sidebar-actions">
        <div class="power-button" id="power-toggle">
          <svg viewBox="0 0 24 24">
            <path d="M18.36 6.64a9 9 0 1 1-12.73 0"/>
            <line x1="12" y1="2" x2="12" y2="12"/>
          </svg>
          <span>Power</span>
        </div>
        <div class="power-menu" id="power-menu">
          <div class="power-menu-item" data-action="shutdown">
            <svg viewBox="0 0 24 24">
              <path d="M18.36 6.64a9 9 0 1 1-12.73 0"/>
              <line x1="12" y1="2" x2="12" y2="12"/>
            </svg>
            <span>Shut down</span>
          </div>
          <div class="power-menu-item" data-action="restart">
            <svg viewBox="0 0 24 24">
              <polyline points="23 4 23 10 17 10"/>
              <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
            </svg>
            <span>Restart</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Right Main Panel -->
    <div class="main-panel">
      <div class="search-box" id="search-box">
        <svg viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" id="search-input" placeholder="Type to search...">
      </div>

      <div class="section-label">Pinned</div>
      <div class="app-list" id="app-list">
        <!-- App items rendered dynamically -->
      </div>
      <div class="no-results" id="no-results" style="display:none;">No matching apps found</div>
    </div>
  </div>
</template>

<script type="module">
  import WindowManager from '../../subsystem/window-manager/WindowManager.Core.js';
  import SysCallBridge from '../../kernel/syscall/SysCall.Bridge.js';

  /**
   * Pinned application definitions for the start menu.
   */
  const PINNED_APPS = [
    {
      id: 'terminal',
      name: 'Terminal',
      iconClass: 'terminal',
      appId: 'terminal',
      svg: `<svg viewBox="0 0 24 24"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>`,
      width: 720, height: 480,
    },
    {
      id: 'explorer',
      name: 'File Explorer',
      iconClass: 'explorer',
      appId: 'explorer',
      svg: `<svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>`,
      width: 800, height: 560,
    },
    {
      id: 'settings',
      name: 'Settings',
      iconClass: 'settings',
      appId: 'settings',
      svg: `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>`,
      width: 700, height: 520,
    },
    {
      id: 'webview',
      name: 'Web View',
      iconClass: 'webview',
      appId: 'webview',
      svg: `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>`,
      width: 900, height: 600,
    },
    {
      id: 'notepad',
      name: 'Notepad',
      iconClass: 'notepad',
      appId: 'notepad',
      svg: `<svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>`,
      width: 640, height: 480,
    },
    {
      id: 'calculator',
      name: 'Calculator',
      iconClass: 'calculator',
      appId: 'calculator',
      svg: `<svg viewBox="0 0 24 24"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="8" y1="10" x2="16" y2="10"/><line x1="8" y1="14" x2="12" y2="14"/></svg>`,
      width: 320, height: 420,
    },
    {
      id: 'taskmgr',
      name: 'Task Manager',
      iconClass: 'taskmgr',
      appId: 'taskmgr',
      svg: `<svg viewBox="0 0 24 24"><path d="M12 20V10"/><path d="M18 20V4"/><path d="M6 20v-4"/></svg>`,
      width: 600, height: 440,
    },
    {
      id: 'sysmon',
      name: 'System Monitor',
      iconClass: 'sysmon',
      appId: 'sysmon',
      svg: `<svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>`,
      width: 700, height: 500,
    },
  ];

  class NtStartMenu extends HTMLElement {
    constructor() {
      super();
      this.attachShadow({ mode: 'open' });

      const template = document.getElementById('nt-startmenu-template');
      if (template) {
        this.shadowRoot.appendChild(template.content.cloneNode(true));
      }

      this._visible = false;
      this._powerMenuVisible = false;
      this._appElements = new Map();
      this._boundClickOutside = this._onClickOutside.bind(this);
      this._boundKeyDown = this._onKeyDown.bind(this);
    }

    connectedCallback() {
      this._renderAppList();
      this._bindEvents();
    }

    disconnectedCallback() {
      this._unbindGlobalEvents();
    }

    /* ── Show / Hide ── */
    show() {
      this._visible = true;
      this.classList.add('visible');

      // Clear search on show
      const searchInput = this.shadowRoot.getElementById('search-input');
      if (searchInput) {
        searchInput.value = '';
        this._filterApps('');
      }

      // Focus search input
      setTimeout(() => {
        if (searchInput) searchInput.focus();
      }, 100);

      this._bindGlobalEvents();
    }

    hide() {
      this._visible = false;
      this.classList.remove('visible');
      this._powerMenuVisible = false;

      const powerMenu = this.shadowRoot.getElementById('power-menu');
      if (powerMenu) powerMenu.classList.remove('visible');

      this._unbindGlobalEvents();

      // Notify taskbar that start menu is closed
      const startBtn = document.querySelector('nt-taskbar')?.shadowRoot?.getElementById('start-button');
      if (startBtn) startBtn.classList.remove('active');
    }

    _bindGlobalEvents() {
      document.addEventListener('mousedown', this._boundClickOutside);
      document.addEventListener('keydown', this._boundKeyDown);
    }

    _unbindGlobalEvents() {
      document.removeEventListener('mousedown', this._boundClickOutside);
      document.removeEventListener('keydown', this._boundKeyDown);
    }

    /* ── Bind DOM Events ── */
    _bindEvents() {
      const root = this.shadowRoot;

      // Search input
      const searchInput = root.getElementById('search-input');
      if (searchInput) {
        searchInput.addEventListener('input', (e) => {
          this._filterApps(e.target.value);
        });
      }

      // Power toggle
      const powerToggle = root.getElementById('power-toggle');
      if (powerToggle) {
        powerToggle.addEventListener('click', (e) => {
          e.stopPropagation();
          this._togglePowerMenu();
        });
      }

      // Power menu items
      const powerMenu = root.getElementById('power-menu');
      if (powerMenu) {
        powerMenu.addEventListener('click', (e) => {
          e.stopPropagation();
          const item = e.target.closest('.power-menu-item');
          if (item) {
            const action = item.getAttribute('data-action');
            this._handlePowerAction(action);
          }
        });
      }
    }

    /* ── Render App List ── */
    _renderAppList() {
      const appList = this.shadowRoot.getElementById('app-list');
      if (!appList) return;

      appList.innerHTML = '';
      this._appElements.clear();

      for (const app of PINNED_APPS) {
        const item = this._createAppItem(app);
        appList.appendChild(item);
        this._appElements.set(app.id, item);
      }
    }

    _createAppItem(app) {
      const div = document.createElement('div');
      div.className = 'app-item';
      div.setAttribute('data-app-id', app.id);

      const icon = document.createElement('div');
      icon.className = `app-icon ${app.iconClass}`;
      icon.innerHTML = app.svg;
      div.appendChild(icon);

      const name = document.createElement('span');
      name.className = 'app-name';
      name.textContent = app.name;
      div.appendChild(name);

      div.addEventListener('click', (e) => {
        e.stopPropagation();
        this._launchApp(app);
      });

      return div;
    }

    /* ── Search / Filter ── */
    _filterApps(query) {
      const lowerQuery = query.toLowerCase().trim();
      const noResults = this.shadowRoot.getElementById('no-results');
      let anyVisible = false;

      for (const app of PINNED_APPS) {
        const el = this._appElements.get(app.id);
        if (!el) continue;

        const nameEl = el.querySelector('.app-name');
        if (!nameEl) continue;

        if (lowerQuery === '') {
          el.classList.remove('hidden');
          nameEl.innerHTML = app.name;
          anyVisible = true;
        } else if (app.name.toLowerCase().includes(lowerQuery)) {
          el.classList.remove('hidden');
          // Highlight matching text
          const idx = app.name.toLowerCase().indexOf(lowerQuery);
          const before = app.name.slice(0, idx);
          const match = app.name.slice(idx, idx + lowerQuery.length);
          const after = app.name.slice(idx + lowerQuery.length);
          nameEl.innerHTML = `${this._escapeHtml(before)}<span class="highlight">${this._escapeHtml(match)}</span>${this._escapeHtml(after)}`;
          anyVisible = true;
        } else {
          el.classList.add('hidden');
        }
      }

      if (noResults) {
        noResults.style.display = anyVisible ? 'none' : 'block';
      }
    }

    _escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    /* ── 【对接内核】Launch App ── */
    _launchApp(app) {
      const wm = WindowManager.instance;
      wm.createWindow({
        title: app.name,
        width: app.width,
        height: app.height,
        icon: app.iconClass,
        appId: app.appId,
        resizable: true,
      });

      this.hide();
    }

    /* ── Power Menu ── */
    _togglePowerMenu() {
      this._powerMenuVisible = !this._powerMenuVisible;
      const powerMenu = this.shadowRoot.getElementById('power-menu');
      if (powerMenu) {
        if (this._powerMenuVisible) {
          powerMenu.classList.add('visible');
        } else {
          powerMenu.classList.remove('visible');
        }
      }
    }

    /* ── 【对接内核】Power Actions ── */
    async _handlePowerAction(action) {
      switch (action) {
        case 'shutdown':
          try {
            await SysCallBridge.instance.call('NtShutdown');
          } catch (err) {
            console.error('StartMenu: Shutdown failed:', err);
          }
          this.hide();
          break;
        case 'restart':
          try {
            await SysCallBridge.instance.call('NtReboot');
          } catch (err) {
            console.error('StartMenu: Reboot failed:', err);
          }
          this.hide();
          break;
        default:
          break;
      }
    }

    /* ── Click Outside ── */
    _onClickOutside(e) {
      if (!this._visible) return;
      const path = e.composedPath();
      if (!path.includes(this)) {
        this.hide();
      }
    }

    /* ── Keyboard Navigation ── */
    _onKeyDown(e) {
      if (!this._visible) return;

      if (e.key === 'Escape') {
        e.preventDefault();
        this.hide();
      }
    }
  }

  customElements.define('nt-startmenu', NtStartMenu);
</script>

</body>
</html>
