<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
</head>
<body>
<!-- ============================================================
     TerminalWindow.ce.html — WebNT-HTML5 Web OS Kernel Terminal Emulator
     Custom Element: <nt-terminal-window>
     Uses Shadow DOM (open mode) for style encapsulation.
     【对接内核】Command execution via TerminalExecutor.execute()
     【对接内核】Command history from TerminalExecutor.getHistory()
     【对接内核】Autocomplete from CommandRegistry.getAllCommands()
     ============================================================ -->

<template id="nt-terminal-window-template">
  <style>
    :host {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
      font-family: 'Cascadia Code', 'Fira Code', 'JetBrains Mono', 'Consolas', 'Courier New', monospace;
      font-size: 14px;
      background: #0c0c0c;
      color: #cccccc;
      overflow: hidden;
      border-radius: 0;
      user-select: text;
    }

    /* ── Title Bar ──────────────────────────────────── */
    .title-bar {
      display: flex;
      align-items: center;
      height: 32px;
      min-height: 32px;
      background: #1e1e1e;
      border-bottom: 1px solid #2d2d2d;
      padding: 0 8px;
      gap: 8px;
      user-select: none;
      -webkit-user-select: none;
    }

    .title-bar .title {
      flex: 1;
      font-size: 12px;
      color: #999;
      text-align: center;
      pointer-events: none;
    }

    .title-bar .window-controls {
      display: flex;
      gap: 4px;
    }

    .title-bar .ctrl-btn {
      width: 24px;
      height: 24px;
      border: none;
      background: transparent;
      color: #888;
      cursor: pointer;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      transition: background 0.1s, color 0.1s;
      padding: 0;
      line-height: 1;
    }

    .title-bar .ctrl-btn:hover {
      background: rgba(255,255,255,0.1);
      color: #ddd;
    }

    .title-bar .ctrl-btn.close:hover {
      background: #c0392b;
      color: #fff;
    }

    /* ── Tab Bar ────────────────────────────────────── */
    .tab-bar {
      display: flex;
      align-items: center;
      height: 30px;
      min-height: 30px;
      background: #151515;
      border-bottom: 1px solid #2d2d2d;
      padding: 0 4px;
      gap: 2px;
      user-select: none;
      -webkit-user-select: none;
      overflow-x: auto;
      overflow-y: hidden;
    }

    .tab-bar::-webkit-scrollbar {
      height: 2px;
    }

    .tab-bar::-webkit-scrollbar-thumb {
      background: #3a3a3a;
      border-radius: 1px;
    }

    .tab {
      display: flex;
      align-items: center;
      height: 24px;
      padding: 0 10px;
      border-radius: 4px 4px 0 0;
      background: transparent;
      color: #777;
      cursor: pointer;
      font-size: 12px;
      white-space: nowrap;
      gap: 6px;
      transition: background 0.1s, color 0.1s;
      flex-shrink: 0;
    }

    .tab:hover {
      background: rgba(255,255,255,0.05);
      color: #aaa;
    }

    .tab.active {
      background: #0c0c0c;
      color: #ddd;
      border-bottom: 2px solid #4ec9b0;
    }

    .tab .tab-close {
      width: 16px;
      height: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 2px;
      font-size: 14px;
      line-height: 1;
      opacity: 0;
      transition: opacity 0.1s;
      color: #999;
      cursor: pointer;
    }

    .tab:hover .tab-close {
      opacity: 0.6;
    }

    .tab .tab-close:hover {
      opacity: 1;
      background: rgba(255,255,255,0.15);
      color: #fff;
    }

    .tab-bar .new-tab-btn {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      cursor: pointer;
      color: #666;
      font-size: 16px;
      transition: background 0.1s, color 0.1s;
      flex-shrink: 0;
    }

    .tab-bar .new-tab-btn:hover {
      background: rgba(255,255,255,0.08);
      color: #ccc;
    }

    /* ── Output Area ────────────────────────────────── */
    .output-area {
      flex: 1;
      overflow-y: auto;
      padding: 8px 12px;
      background: #0c0c0c;
      line-height: 1.4;
      white-space: pre-wrap;
      word-break: break-all;
    }

    .output-area::-webkit-scrollbar {
      width: 8px;
    }

    .output-area::-webkit-scrollbar-track {
      background: #0c0c0c;
    }

    .output-area::-webkit-scrollbar-thumb {
      background: #333;
      border-radius: 4px;
    }

    .output-area::-webkit-scrollbar-thumb:hover {
      background: #444;
    }

    .output-line {
      min-height: 1.4em;
    }

    .output-line.normal {
      color: #cccccc;
    }

    .output-line.error {
      color: #f28b82;
    }

    .output-line.success {
      color: #81c995;
    }

    .output-line.warning {
      color: #fdd663;
    }

    .output-line.info {
      color: #8ab4f8;
    }

    .output-line.prompt {
      color: #4ec9b0;
    }

    .output-line.command {
      color: #e8eaed;
    }

    /* ── Input Line ─────────────────────────────────── */
    .input-line {
      display: flex;
      align-items: center;
      padding: 4px 12px;
      background: #0c0c0c;
      border-top: 1px solid #1a1a1a;
      min-height: 28px;
    }

    .input-line .prompt {
      color: #4ec9b0;
      white-space: nowrap;
      user-select: none;
      -webkit-user-select: none;
      margin-right: 4px;
      font-size: 14px;
    }

    .input-line .cmd-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #e8eaed;
      font-family: inherit;
      font-size: 14px;
      caret-color: #4ec9b0;
      padding: 0;
      margin: 0;
    }

    .input-line .cmd-input::selection {
      background: rgba(78, 201, 176, 0.3);
    }

    /* ── Blinking Cursor Simulation ─────────────────── */
    .blinking-cursor {
      display: inline-block;
      width: 8px;
      height: 16px;
      background: #4ec9b0;
      animation: blink 1s step-end infinite;
      vertical-align: text-bottom;
      margin-left: 1px;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
  </style>

  <!-- Title Bar -->
  <div class="title-bar">
    <span class="title">Terminal</span>
    <div class="window-controls">
      <button class="ctrl-btn minimize" title="Minimize">&#x2014;</button>
      <button class="ctrl-btn maximize" title="Maximize">&#x25A1;</button>
      <button class="ctrl-btn close" title="Close">&times;</button>
    </div>
  </div>

  <!-- Tab Bar -->
  <div class="tab-bar" id="tab-bar">
    <!-- Tabs rendered dynamically -->
    <button class="new-tab-btn" id="new-tab-btn" title="New Tab">+</button>
  </div>

  <!-- Output Area -->
  <div class="output-area" id="output-area">
    <!-- Output lines rendered dynamically -->
  </div>

  <!-- Input Line -->
  <div class="input-line">
    <span class="prompt" id="prompt-text">webnt@kernel:~$ </span>
    <input type="text" class="cmd-input" id="cmd-input" autocomplete="off" spellcheck="false">
  </div>
</template>

<script type="module">
  import TerminalExecutor from '../../kernel/terminal/Terminal.Executor.js';
  import CommandRegistry from '../../kernel/terminal/Terminal.CommandRegistry.js';
  import TerminalLexer from '../../kernel/terminal/Terminal.Lexer.js';

  const MAX_HISTORY = 500;
  const MAX_OUTPUT_LINES = 5000;

  /**
   * Tab data structure for each terminal tab.
   */
  class TabData {
    constructor(id, name) {
      this.id = id;
      this.name = name;
      this.outputLines = [];
      this.history = [];
      this.historyIndex = -1;
      this.currentInput = '';
      this.cwd = '/';
      this.env = { HOME: '/root', USER: 'webnt', PATH: '/bin:/usr/bin', SHELL: '/bin/sh' };
      this.processId = 0;
    }
  }

  class NtTerminalWindow extends HTMLElement {
    constructor() {
      super();
      this.attachShadow({ mode: 'open' });

      const template = document.getElementById('nt-terminal-window-template');
      if (template) {
        this.shadowRoot.appendChild(template.content.cloneNode(true));
      }

      this._tabs = new Map();
      this._activeTabId = null;
      this._tabCounter = 0;
      this._outputArea = null;
      this._cmdInput = null;
      this._promptEl = null;
      this._tabBar = null;
    }

    connectedCallback() {
      this._outputArea = this.shadowRoot.getElementById('output-area');
      this._cmdInput = this.shadowRoot.getElementById('cmd-input');
      this._promptEl = this.shadowRoot.getElementById('prompt-text');
      this._tabBar = this.shadowRoot.getElementById('tab-bar');

      this._bindEvents();
      this._createTab('tab1');
      this._focusInput();
    }

    disconnectedCallback() {
      this._unbindEvents();
    }

    /* ── Event Binding ── */

    _bindEvents() {
      const root = this.shadowRoot;

      this._boundKeyDown = this._onKeyDown.bind(this);
      this._boundInputChange = this._onInputChange.bind(this);

      if (this._cmdInput) {
        this._cmdInput.addEventListener('keydown', this._boundKeyDown);
        this._cmdInput.addEventListener('input', this._boundInputChange);
      }

      // Window controls
      const minimizeBtn = root.querySelector('.ctrl-btn.minimize');
      const maximizeBtn = root.querySelector('.ctrl-btn.maximize');
      const closeBtn = root.querySelector('.ctrl-btn.close');

      if (minimizeBtn) {
        minimizeBtn.addEventListener('click', () => this._emitWindowAction('minimize'));
      }
      if (maximizeBtn) {
        maximizeBtn.addEventListener('click', () => this._emitWindowAction('maximize'));
      }
      if (closeBtn) {
        closeBtn.addEventListener('click', () => this._emitWindowAction('close'));
      }

      // New tab button
      const newTabBtn = root.getElementById('new-tab-btn');
      if (newTabBtn) {
        newTabBtn.addEventListener('click', () => this._createNewTab());
      }

      // Focus input when clicking output area
      if (this._outputArea) {
        this._outputArea.addEventListener('click', () => this._focusInput());
      }
    }

    _unbindEvents() {
      if (this._cmdInput) {
        this._cmdInput.removeEventListener('keydown', this._boundKeyDown);
        this._cmdInput.removeEventListener('input', this._boundInputChange);
      }
    }

    _emitWindowAction(action) {
      this.dispatchEvent(new CustomEvent('terminal-window-action', {
        detail: { action },
        bubbles: true,
        composed: true,
      }));
    }

    /* ── Tab Management ── */

    _createNewTab() {
      this._tabCounter++;
      const tabName = `tab${this._tabCounter}`;
      this._createTab(tabName);
    }

    /**
     * Create a new terminal tab.
     * @param {string} name - Tab name
     * @returns {string} The tab ID
     */
    createTab(name) {
      return this._createTab(name);
    }

    _createTab(name) {
      const id = `term-tab-${Date.now()}-${Math.random().toString(36).slice(2, 7)}`;
      const tab = new TabData(id, name);
      this._tabs.set(id, tab);

      this._renderTabBar();
      this._switchTab(id);
      return id;
    }

    /**
     * Close a terminal tab.
     * @param {string} tabId - The tab ID to close
     */
    closeTab(tabId) {
      if (this._tabs.size <= 1) {
        // Last tab: emit close action
        this._emitWindowAction('close');
        return;
      }

      const tab = this._tabs.get(tabId);
      if (!tab) return;

      this._tabs.delete(tabId);

      if (this._activeTabId === tabId) {
        // Switch to another tab
        const remaining = [...this._tabs.keys()];
        if (remaining.length > 0) {
          this._switchTab(remaining[remaining.length - 1]);
        }
      }

      this._renderTabBar();
    }

    /**
     * Switch to a specific terminal tab.
     * @param {string} tabId - The tab ID to switch to
     */
    switchTab(tabId) {
      this._switchTab(tabId);
    }

    _switchTab(tabId) {
      const tab = this._tabs.get(tabId);
      if (!tab) return;

      // Save current input state
      if (this._activeTabId) {
        const currentTab = this._tabs.get(this._activeTabId);
        if (currentTab) {
          currentTab.currentInput = this._cmdInput ? this._cmdInput.value : '';
        }
      }

      this._activeTabId = tabId;
      this._renderOutput();
      this._updatePrompt();
      this._renderTabBar();

      if (this._cmdInput) {
        this._cmdInput.value = tab.currentInput;
        this._cmdInput.focus();
      }

      this._scrollToBottom();
    }

    /* ── Tab Bar Rendering ── */

    _renderTabBar() {
      if (!this._tabBar) return;

      // Clear existing tabs (keep the new-tab button)
      const existingTabs = this._tabBar.querySelectorAll('.tab');
      for (const t of existingTabs) {
        t.remove();
      }

      const newTabBtn = this._tabBar.querySelector('.new-tab-btn');

      for (const [id, tab] of this._tabs) {
        const tabEl = document.createElement('div');
        tabEl.className = 'tab';
        if (id === this._activeTabId) {
          tabEl.classList.add('active');
        }
        tabEl.setAttribute('data-tab-id', id);

        const label = document.createElement('span');
        label.textContent = tab.name;
        tabEl.appendChild(label);

        const closeBtn = document.createElement('span');
        closeBtn.className = 'tab-close';
        closeBtn.textContent = '\u00D7';
        closeBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          this.closeTab(id);
        });
        tabEl.appendChild(closeBtn);

        tabEl.addEventListener('click', () => {
          this._switchTab(id);
        });

        if (newTabBtn) {
          this._tabBar.insertBefore(tabEl, newTabBtn);
        } else {
          this._tabBar.appendChild(tabEl);
        }
      }

      // Update tab counter
      this._tabCounter = this._tabs.size;
    }

    /* ── Output Rendering ── */

    _renderOutput() {
      if (!this._outputArea) return;
      const tab = this._getActiveTab();
      if (!tab) return;

      this._outputArea.innerHTML = '';

      for (const line of tab.outputLines) {
        const div = document.createElement('div');
        div.className = `output-line ${line.type}`;
        div.textContent = line.text;
        this._outputArea.appendChild(div);
      }

      this._scrollToBottom();
    }

    /**
     * Write text to the terminal output.
     * @param {string} tabId - The tab ID
     * @param {string} text - The text to write
     * @param {string} type - Output type: 'normal', 'error', 'success', 'warning', 'info', 'prompt', 'command'
     */
    writeOutput(tabId, text, type = 'normal') {
      const tab = this._tabs.get(tabId) || this._getActiveTab();
      if (!tab) return;

      const lines = text.split('\n');
      for (const line of lines) {
        tab.outputLines.push({ text: line, type });
      }

      // Trim excess lines
      while (tab.outputLines.length > MAX_OUTPUT_LINES) {
        tab.outputLines.shift();
      }

      if (tabId === this._activeTabId || !tabId) {
        this._renderOutput();
      }
    }

    /**
     * Clear the terminal screen for a tab.
     * @param {string} tabId - The tab ID
     */
    clearScreen(tabId) {
      const tab = this._tabs.get(tabId) || this._getActiveTab();
      if (!tab) return;

      tab.outputLines = [];

      if (tabId === this._activeTabId || !tabId) {
        this._renderOutput();
      }
    }

    _updatePrompt() {
      const tab = this._getActiveTab();
      if (!tab || !this._promptEl) return;

      const cwd = tab.cwd;
      const user = tab.env.USER || 'webnt';
      const host = 'kernel';
      const promptPath = cwd === '/' ? '/' : cwd === '/root' ? '~' : cwd;

      this._promptEl.textContent = `${user}@${host}:${promptPath}$ `;
    }

    _getActiveTab() {
      return this._activeTabId ? this._tabs.get(this._activeTabId) : null;
    }

    /* ── Input Handling ── */

    _focusInput() {
      if (this._cmdInput) {
        this._cmdInput.focus();
      }
    }

    _onInputChange() {
      const tab = this._getActiveTab();
      if (tab && this._cmdInput) {
        tab.currentInput = this._cmdInput.value;
      }
    }

    async _onKeyDown(e) {
      const tab = this._getActiveTab();
      if (!tab) return;

      switch (e.key) {
        case 'Enter':
          e.preventDefault();
          await this._executeCurrentCommand();
          break;

        case 'ArrowUp':
          e.preventDefault();
          this._navigateHistory(-1);
          break;

        case 'ArrowDown':
          e.preventDefault();
          this._navigateHistory(1);
          break;

        case 'Tab':
          e.preventDefault();
          this._handleAutocomplete();
          break;

        case 'l':
        case 'L':
          if (e.ctrlKey) {
            e.preventDefault();
            this.clearScreen();
            if (this._cmdInput) {
              this._cmdInput.value = '';
            }
          }
          break;

        case 'c':
        case 'C':
          if (e.ctrlKey) {
            e.preventDefault();
            this._interruptCommand();
          }
          break;

        case 'd':
        case 'D':
          if (e.ctrlKey && this._cmdInput && this._cmdInput.value === '') {
            e.preventDefault();
            this.closeTab(this._activeTabId);
          }
          break;

        default:
          break;
      }
    }

    /**
     * 【对接内核】Execute the current command via TerminalExecutor.
     */
    async _executeCurrentCommand() {
      if (!this._cmdInput) return;
      const command = this._cmdInput.value.trim();
      if (command.length === 0) return;

      const tab = this._getActiveTab();
      if (!tab) return;

      // Echo prompt + command
      const promptText = this._promptEl ? this._promptEl.textContent : 'webnt@kernel:~$ ';
      this.writeOutput(this._activeTabId, `${promptText}${command}`, 'command');

      // Add to history
      tab.history.push(command);
      if (tab.history.length > MAX_HISTORY) {
        tab.history.shift();
      }
      tab.historyIndex = -1;

      // Clear input
      this._cmdInput.value = '';
      tab.currentInput = '';

      // 【对接内核】Execute via TerminalExecutor
      try {
        const executor = TerminalExecutor.instance;
        const result = await executor.execute(command, {
          env: { ...tab.env },
          cwd: tab.cwd,
          processId: tab.processId,
        });

        if (result.output && result.output.length > 0) {
          const type = result.exitCode === 0 ? 'normal' : 'error';
          this.writeOutput(this._activeTabId, result.output, type);
        }
      } catch (err) {
        this.writeOutput(this._activeTabId, `Error: ${err.message || 'Unknown error'}`, 'error');
      }
    }

    /**
     * Navigate command history with Up/Down arrows.
     */
    _navigateHistory(direction) {
      const tab = this._getActiveTab();
      if (!tab || !this._cmdInput) return;

      if (tab.history.length === 0) return;

      if (tab.historyIndex === -1 && direction === -1) {
        // Save current input before navigating
        tab._savedInput = this._cmdInput.value;
        tab.historyIndex = tab.history.length - 1;
      } else if (tab.historyIndex === -1 && direction === 1) {
        return; // Already at the bottom
      } else {
        tab.historyIndex += direction;
      }

      if (tab.historyIndex < 0) {
        tab.historyIndex = -1;
        this._cmdInput.value = tab._savedInput || '';
        return;
      }

      if (tab.historyIndex >= tab.history.length) {
        tab.historyIndex = tab.history.length - 1;
      }

      this._cmdInput.value = tab.history[tab.historyIndex] || '';
      // Move cursor to end
      this._cmdInput.setSelectionRange(this._cmdInput.value.length, this._cmdInput.value.length);
    }

    /**
     * 【对接内核】Handle Tab autocomplete via CommandRegistry.
     */
    _handleAutocomplete() {
      const tab = this._getActiveTab();
      if (!tab || !this._cmdInput) return;

      const input = this._cmdInput.value;
      const cursorPos = this._cmdInput.selectionStart || input.length;

      // Find the word being completed
      const beforeCursor = input.slice(0, cursorPos);
      const tokens = beforeCursor.split(/\s+/);
      const currentWord = tokens[tokens.length - 1] || '';

      if (currentWord.length === 0) return;

      // 【对接内核】Get all commands from CommandRegistry
      const registry = CommandRegistry.instance;
      const allCommands = registry.getAllCommands();
      const matches = allCommands
        .filter((cmd) => cmd.name.startsWith(currentWord))
        .map((cmd) => cmd.name);

      if (matches.length === 0) return;

      if (matches.length === 1) {
        // Single match: complete the word
        const before = input.slice(0, cursorPos - currentWord.length);
        const after = input.slice(cursorPos);
        this._cmdInput.value = before + matches[0] + ' ' + after;
        const newCursor = (before + matches[0] + ' ').length;
        this._cmdInput.setSelectionRange(newCursor, newCursor);
      } else {
        // Multiple matches: show options
        this.writeOutput(this._activeTabId, '', 'normal');
        this.writeOutput(this._activeTabId, matches.join('  '), 'info');
        this.writeOutput(this._activeTabId, '', 'normal');

        // Find common prefix
        const commonPrefix = this._findCommonPrefix(matches);
        if (commonPrefix.length > currentWord.length) {
          const before = input.slice(0, cursorPos - currentWord.length);
          const after = input.slice(cursorPos);
          this._cmdInput.value = before + commonPrefix + after;
          const newCursor = (before + commonPrefix).length;
          this._cmdInput.setSelectionRange(newCursor, newCursor);
        }
      }
    }

    _findCommonPrefix(strings) {
      if (strings.length === 0) return '';
      let prefix = strings[0];
      for (let i = 1; i < strings.length; i++) {
        while (strings[i].indexOf(prefix) !== 0) {
          prefix = prefix.slice(0, -1);
          if (prefix.length === 0) return '';
        }
      }
      return prefix;
    }

    /**
     * Interrupt current command (Ctrl+C).
     */
    _interruptCommand() {
      if (this._cmdInput) {
        this._cmdInput.value = '';
      }
      const tab = this._getActiveTab();
      if (tab) {
        tab.currentInput = '';
      }
      this.writeOutput(this._activeTabId, '^C', 'warning');
    }

    /**
     * 【对接内核】Execute a command in a specific tab.
     * @param {string} command - The command to execute
     * @param {string} tabId - The tab ID
     */
    async executeCommand(command, tabId) {
      const targetTabId = tabId || this._activeTabId;
      if (!targetTabId) return;

      const tab = this._tabs.get(targetTabId);
      if (!tab) return;

      tab.history.push(command);
      if (tab.history.length > MAX_HISTORY) {
        tab.history.shift();
      }
      tab.historyIndex = -1;

      this.writeOutput(targetTabId, `${this._promptEl ? this._promptEl.textContent : 'webnt@kernel:~$ '}${command}`, 'command');

      try {
        const executor = TerminalExecutor.instance;
        const result = await executor.execute(command, {
          env: { ...tab.env },
          cwd: tab.cwd,
          processId: tab.processId,
        });

        if (result.output && result.output.length > 0) {
          const type = result.exitCode === 0 ? 'normal' : 'error';
          this.writeOutput(targetTabId, result.output, type);
        }
      } catch (err) {
        this.writeOutput(targetTabId, `Error: ${err.message || 'Unknown error'}`, 'error');
      }
    }

    /**
     * Get command history for a tab.
     * @param {string} tabId - The tab ID (optional, defaults to active tab)
     * @returns {string[]} Command history
     */
    getHistory(tabId) {
      const tab = this._tabs.get(tabId) || this._getActiveTab();
      return tab ? [...tab.history] : [];
    }

    /**
     * 【对接内核】Handle tab completion for a given input.
     * @param {string} input - The current input text
     * @param {string} tabId - The tab ID
     * @returns {string[]} Matching command names
     */
    handleTabComplete(input, tabId) {
      const tokens = input.split(/\s+/);
      const currentWord = tokens[tokens.length - 1] || '';

      if (currentWord.length === 0) return [];

      const registry = CommandRegistry.instance;
      const allCommands = registry.getAllCommands();
      return allCommands
        .filter((cmd) => cmd.name.startsWith(currentWord))
        .map((cmd) => cmd.name);
    }

    _scrollToBottom() {
      if (this._outputArea) {
        requestAnimationFrame(() => {
          this._outputArea.scrollTop = this._outputArea.scrollHeight;
        });
      }
    }

    /* ── Public API ── */

    /**
     * Get the list of all tab IDs.
     * @returns {string[]} Array of tab IDs
     */
    getTabIds() {
      return [...this._tabs.keys()];
    }

    /**
     * Get the active tab ID.
     * @returns {string|null}
     */
    getActiveTabId() {
      return this._activeTabId;
    }

    /**
     * Set the current working directory for a tab.
     * @param {string} tabId - The tab ID
     * @param {string} cwd - The new working directory
     */
    setCwd(tabId, cwd) {
      const tab = this._tabs.get(tabId) || this._getActiveTab();
      if (tab) {
        tab.cwd = cwd;
        if (tabId === this._activeTabId || !tabId) {
          this._updatePrompt();
        }
      }
    }

    /**
     * Set an environment variable for a tab.
     * @param {string} tabId - The tab ID
     * @param {string} key - The variable name
     * @param {string} value - The variable value
     */
    setEnv(tabId, key, value) {
      const tab = this._tabs.get(tabId) || this._getActiveTab();
      if (tab) {
        tab.env[key] = value;
      }
    }
  }

  customElements.define('nt-terminal-window', NtTerminalWindow);
</script>
