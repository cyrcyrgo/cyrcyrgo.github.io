<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>WebNT Kernel v1.0.0</title>
<link rel="stylesheet" href="ui/styles/Global.System.css">
<style>
  /* ============================================================
     BIOS Boot Screen
     ============================================================ */
  #boot-screen {
    position: fixed; inset: 0; z-index: 99999;
    background: #0a0a0a; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    font-family: 'Courier New', monospace; color: #00ff00;
    transition: opacity 0.5s ease-out;
  }
  #boot-screen.hidden { opacity: 0; pointer-events: none; }
  #boot-screen .boot-logo {
    font-size: 28px; font-weight: bold; color: #00ff88;
    margin-bottom: 8px; letter-spacing: 4px;
    text-shadow: 0 0 10px rgba(0,255,136,0.5);
  }
  #boot-screen .boot-subtitle {
    font-size: 12px; color: #888; margin-bottom: 32px; letter-spacing: 2px;
  }
  #boot-screen .boot-log {
    width: 560px; max-width: 90vw; font-size: 13px; line-height: 1.8;
    color: #00cc00; max-height: 200px; overflow-y: auto;
  }
  #boot-screen .boot-log .log-line { opacity: 0; animation: logFadeIn 0.15s forwards; }
  #boot-screen .boot-log .log-line.ok  { color: #00ff00; }
  #boot-screen .boot-log .log-line.warn { color: #ffcc00; }
  #boot-screen .boot-log .log-line.err  { color: #ff4444; }
  #boot-screen .boot-log .log-line.info { color: #00aaff; }
  @keyframes logFadeIn { to { opacity: 1; } }
  #boot-screen .boot-progress {
    width: 400px; max-width: 80vw; height: 4px; background: #1a1a1a;
    border-radius: 2px; margin-top: 24px; overflow: hidden;
  }
  #boot-screen .boot-progress-bar {
    height: 100%; width: 0%; border-radius: 2px;
    background: linear-gradient(90deg, #00ff88, #00aaff);
    transition: width 0.3s ease;
  }
  #boot-screen .boot-status { margin-top: 12px; font-size: 11px; color: #666; }

  /* ============================================================
     Lock Screen - 滑动解锁界面
     ============================================================ */
  #lock-screen {
    position: fixed; inset: 0; z-index: 50000;
    display: flex; flex-direction: column; align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #070b14 0%, #0b1221 35%, #0f223d 65%, #0a1628 100%);
    background-size: cover;
    transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.5s ease;
    user-select: none;
    touch-action: none;
  }
  #lock-screen.unlocked {
    transform: translateY(-100%);
    opacity: 0;
  }
  #lock-screen .ls-bg-blur {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 25%, rgba(56,189,248,0.14), transparent 55%),
                radial-gradient(ellipse at 80% 80%, rgba(14,165,233,0.1), transparent 50%),
                radial-gradient(ellipse at 20% 85%, rgba(99,102,241,0.08), transparent 45%);
  }
  #lock-screen .ls-time {
    position: relative; z-index: 1;
    font-family: 'Segoe UI', system-ui, sans-serif;
    font-size: 80px; font-weight: 200; color: #fff;
    text-shadow: 0 2px 20px rgba(255,255,255,0.2);
    letter-spacing: 2px;
    margin-bottom: 4px;
  }
  #lock-screen .ls-date {
    position: relative; z-index: 1;
    font-family: 'Segoe UI', system-ui, sans-serif;
    font-size: 18px; color: #b0c4de;
    margin-bottom: 60px;
  }
  #lock-screen .ls-user {
    position: relative; z-index: 1;
    display: flex; flex-direction: column; align-items: center;
    margin-bottom: 50px;
  }
  #lock-screen .ls-avatar {
    width: 72px; height: 72px; border-radius: 50%;
    background: linear-gradient(135deg, #667eea, #764ba2);
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; color: #fff; font-weight: 600;
    box-shadow: 0 4px 24px rgba(102,126,234,0.4);
    margin-bottom: 12px;
  }
  #lock-screen .ls-username {
    font-family: 'Segoe UI', sans-serif;
    font-size: 16px; color: #e0e0e0;
  }
  /* 滑动解锁条 */
  #lock-screen .ls-slider {
    position: relative; z-index: 1;
    width: 300px; max-width: 80vw; height: 48px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 24px;
    overflow: hidden;
    cursor: pointer;
    touch-action: none;
  }
  #lock-screen .ls-slider-track {
    position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent, rgba(102,126,234,0.3), transparent);
    animation: sliderShimmer 2.5s infinite;
  }
  @keyframes sliderShimmer {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
  }
  #lock-screen .ls-slider-text {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Segoe UI', sans-serif;
    font-size: 14px; color: #a0b4d0;
    letter-spacing: 1px;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  #lock-screen .ls-slider-knob {
    position: absolute; top: 4px; left: 4px;
    width: 40px; height: 40px; border-radius: 50%;
    background: linear-gradient(135deg, #8ea8f0, #a0b4f0);
    box-shadow: 0 2px 12px rgba(0,0,0,0.3);
    transition: left 0.05s linear;
    display: flex; align-items: center; justify-content: center;
    z-index: 2;
  }
  #lock-screen .ls-slider-knob::after {
    content: '›';
    font-size: 22px; color: #fff; font-weight: 300;
    line-height: 1;
  }
  #lock-screen .ls-slider.dragging .ls-slider-text { opacity: 0; }
  #lock-screen .ls-slider.dragging .ls-slider-track { animation: none; }
  #lock-screen .ls-hint {
    position: relative; z-index: 1;
    margin-top: 16px;
    font-size: 11px; color: #666;
    font-family: 'Segoe UI', sans-serif;
  }
  /* 锁屏通知 */
  #lock-screen .ls-notifications {
    position: absolute; bottom: 120px; right: 40px;
    z-index: 1; display: flex; flex-direction: column; gap: 8px;
    max-width: 320px;
  }
  #lock-screen .ls-notif {
    background: rgba(255,255,255,0.06); backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.1); border-radius: 12px;
    padding: 12px 16px; font-family: 'Segoe UI', sans-serif;
    color: #ccc; font-size: 13px;
    animation: notifSlideIn 0.3s ease;
  }
  @keyframes notifSlideIn {
    from { transform: translateX(100px); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }
  #lock-screen .ls-notif .ls-notif-title {
    font-weight: 600; color: #fff; margin-bottom: 4px;
  }

  /* ============================================================
     App Root - 主容器
     ============================================================ */
  #app-root {
    display: block; width: 100vw; height: 100vh;
    overflow: hidden; position: relative;
    background: var(--sys-bg, #1a1a2e);
  }

  /* ============================================================
     桌面图标 (内联渲染，不依赖外部 .ts)
     ============================================================ */
  .desktop-icon {
    display: flex; flex-direction: column;
    align-items: center; width: 80px; padding: 8px 4px;
    border-radius: 8px; cursor: pointer;
    font-family: 'Segoe UI', system-ui, sans-serif;
    font-size: 12px; color: #fff; text-align: center;
    text-shadow: 0 1px 3px rgba(0,0,0,0.8);
    transition: background 0.1s, transform 0.15s;
    user-select: none;
    touch-action: none;
  }
  .desktop-icon:hover { background: rgba(255,255,255,0.1); }
  .desktop-icon:active { background: rgba(255,255,255,0.05); }
  .desktop-icon.selected { background: rgba(102,126,234,0.3); }
  .desktop-icon.dragging { opacity: 0.5; transform: scale(0.95); }
  .desktop-icon.drag-over { background: rgba(102,126,234,0.25); border: 2px dashed rgba(102,126,234,0.6); }
  .desktop-icon .dicon-svg {
    width: 48px; height: 48px; margin-bottom: 4px;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
  }
  .desktop-icon .dicon-label {
    word-break: break-word; line-height: 1.3;
    pointer-events: none;
    text-shadow: 0 0 4px rgba(0,0,0,0.9), 0 0 8px rgba(0,0,0,0.7), 0 1px 2px rgba(0,0,0,0.95);
    padding: 2px 4px; border-radius: 4px;
    background: rgba(0,0,0,0.35);
    max-width: 100%;
  }
  #desktop-icons {
    position: absolute; top: 0; left: 0; right: 0; bottom: 48px;
    z-index: 1; overflow: auto;
    display: grid;
    grid-template-columns: repeat(auto-fill, 96px);
    grid-template-rows: repeat(auto-fill, 100px);
    gap: 4px;
    padding: 12px;
    align-content: start;
  }

  /* ============================================================
     任务栏
     ============================================================ */
  #taskbar {
    position: fixed; bottom: 0; left: 0; width: 100%;
    height: 48px; z-index: 1000;
    background: rgba(11, 16, 30, 0.78);
    backdrop-filter: blur(24px) saturate(200%);
    -webkit-backdrop-filter: blur(24px) saturate(200%);
    border-top: 1px solid rgba(255,255,255,0.07);
    display: flex; align-items: center;
    font-family: 'Segoe UI', system-ui, sans-serif;
    color: #e8eaed;
  }
  #taskbar .tb-left {
    display: flex; align-items: center; height: 100%;
    padding: 0 4px; flex-shrink: 0;
  }
  #taskbar .tb-start-btn {
    width: 44px; height: 44px; display: flex; align-items: center;
    justify-content: center; border-radius: 10px; cursor: pointer;
    transition: background 0.15s;
    color: #38bdf8;
  }
  #taskbar .tb-start-btn:hover { background: rgba(56,189,248,0.12); }
  #taskbar .tb-start-btn:active { background: rgba(56,189,248,0.06); }
  #taskbar .tb-pinned {
    display: flex; align-items: center; height: 100%;
    padding: 0 6px; gap: 4px; flex-shrink: 0;
    border-right: 1px solid rgba(255,255,255,0.06);
  }
  #taskbar .tb-pin-btn {
    width: 40px; height: 40px; display: flex; align-items: center;
    justify-content: center; border-radius: 8px; cursor: pointer;
    font-size: 20px; transition: background 0.15s, transform 0.1s;
    position: relative;
  }
  #taskbar .tb-pin-btn:hover { background: rgba(255,255,255,0.08); transform: translateY(-1px); }
  #taskbar .tb-pin-btn:active { transform: translateY(0); }
  #taskbar .tb-pin-btn::after {
    content: ''; position: absolute; bottom: 4px; left: 50%; transform: translateX(-50%);
    width: 16px; height: 3px; border-radius: 2px; background: transparent; transition: background 0.15s;
  }
  #taskbar .tb-pin-btn.running::after { background: rgba(56,189,248,0.8); }
  #taskbar .tb-center {
    flex: 1; display: flex; align-items: center; height: 100%;
    padding: 0 4px; gap: 2px; overflow-x: auto;
  }
  #taskbar .tb-win-btn {
    height: 40px; min-width: 40px; max-width: 200px;
    display: flex; align-items: center; padding: 0 12px;
    border-radius: 6px; cursor: pointer; gap: 8px;
    transition: background 0.15s; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis;
    font-size: 12px;
  }
  #taskbar .tb-win-btn:hover { background: rgba(255,255,255,0.08); }
  #taskbar .tb-win-btn.active { background: rgba(255,255,255,0.12); }
  #taskbar .tb-win-btn .tb-win-icon {
    width: 20px; height: 20px; border-radius: 4px;
    flex-shrink: 0; display: flex; align-items: center;
    justify-content: center; font-size: 14px;
  }
  #taskbar .tb-right {
    display: flex; align-items: center; height: 100%;
    padding: 0 8px; gap: 4px; flex-shrink: 0;
  }
  #taskbar .tb-tray-btn {
    width: 36px; height: 36px; display: flex; align-items: center;
    justify-content: center; border-radius: 6px; cursor: pointer;
    font-size: 14px; transition: background 0.15s;
  }
  #taskbar .tb-tray-btn:hover { background: rgba(255,255,255,0.08); }
  #taskbar .tb-power-btn {
    width: 36px; height: 36px; display: flex; align-items: center;
    justify-content: center; border-radius: 6px; cursor: pointer;
    font-size: 16px; color: #f28b82; transition: background 0.15s;
  }
  #taskbar .tb-power-btn:hover { background: rgba(242,139,130,0.15); }
  #taskbar .tb-clock {
    font-size: 12px; padding: 0 8px; cursor: pointer;
    display: flex; flex-direction: column; align-items: flex-end;
    line-height: 1.3;
  }
  #taskbar .tb-clock .tb-clock-time { font-weight: 500; }
  #taskbar .tb-clock .tb-clock-date { font-size: 10px; color: #999; }

  /* ============================================================
     开始菜单
     ============================================================ */
  #start-menu {
    position: absolute; bottom: 52px; left: 8px;
    z-index: 2000; display: none;
    width: min(360px, calc(100vw - 16px)); max-height: min(560px, calc(100vh - 80px));
    background: rgba(15, 23, 42, 0.95);
    backdrop-filter: blur(30px);
    -webkit-backdrop-filter: blur(30px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px; overflow: hidden;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    font-family: 'Segoe UI', system-ui, sans-serif;
    animation: menuSlideUp 0.2s ease;
    flex-direction: column;
  }
  #start-menu.show { display: flex; }
  @keyframes menuSlideUp {
    from { transform: translateY(10px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  #start-menu .sm-search {
    padding: 16px; flex-shrink: 0;
  }
  #start-menu .sm-search input {
    width: 100%; padding: 10px 14px; border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.06); color: #fff;
    font-size: 14px; outline: none;
  }
  #start-menu .sm-search input::placeholder { color: #777; }
  #start-menu .sm-apps {
    padding: 0 8px 8px; flex: 1; min-height: 0; overflow-y: auto;
  }
  #start-menu .sm-app-item {
    display: flex; align-items: center; gap: 14px;
    padding: 12px 14px; border-radius: 10px; cursor: pointer;
    font-size: 15px; color: #e0e0e0; transition: background 0.15s;
    min-height: 48px;
  }
  #start-menu .sm-app-item:hover { background: rgba(255,255,255,0.08); }
  #start-menu .sm-app-item:active { background: rgba(255,255,255,0.04); }
  #start-menu .sm-app-item .sm-app-icon {
    width: 36px; height: 36px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
  }
  #start-menu .sm-footer {
    display: flex; align-items: center; padding: 12px 16px;
    border-top: 1px solid rgba(255,255,255,0.06); gap: 8px; flex-shrink: 0;
  }
  #start-menu .sm-user {
    flex: 1; display: flex; align-items: center; gap: 10px;
  }
  #start-menu .sm-avatar {
    width: 32px; height: 32px; border-radius: 50%;
    background: linear-gradient(135deg, #667eea, #764ba2);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; color: #fff; font-weight: 600;
  }
  #start-menu .sm-username { font-size: 13px; color: #ccc; }
  #start-menu .sm-power-btn {
    width: 36px; height: 36px; border-radius: 6px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; color: #f28b82; transition: background 0.15s;
  }
  #start-menu .sm-power-btn:hover { background: rgba(242,139,130,0.15); }

  /* ============================================================
     右键菜单
     ============================================================ */
  #context-menu {
    position: fixed; z-index: 5000; display: none;
    min-width: 200px; padding: 4px;
    background: rgba(30, 30, 50, 0.95);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px; box-shadow: 0 4px 24px rgba(0,0,0,0.5);
    font-family: 'Segoe UI', system-ui, sans-serif;
    font-size: 13px;
  }
  #context-menu .cm-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 12px; border-radius: 6px; cursor: pointer;
    color: #e0e0e0; transition: background 0.1s;
  }
  #context-menu .cm-item:hover { background: rgba(102,126,234,0.3); }
  #context-menu .cm-item:active { background: rgba(102,126,234,0.2); }
  #context-menu .cm-item .cm-shortcut { color: #777; font-size: 11px; margin-left: 24px; }
  #context-menu .cm-separator {
    height: 1px; background: rgba(255,255,255,0.06); margin: 6px 8px;
  }

  /* ============================================================
     电源菜单
     ============================================================ */
  #power-menu {
    position: absolute; bottom: 52px; right: 8px;
    z-index: 2001; display: none; min-width: 200px;
    background: rgba(15, 23, 42, 0.95);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px; overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    font-family: 'Segoe UI', system-ui, sans-serif;
    font-size: 14px;
  }
  #power-menu .pm-item {
    display: flex; align-items: center; gap: 14px;
    padding: 12px 16px; cursor: pointer; color: #e0e0e0;
    transition: background 0.15s;
    min-height: 48px;
  }
  #power-menu .pm-item:hover { background: rgba(255,255,255,0.08); }
  #power-menu .pm-item:active { background: rgba(255,255,255,0.04); }
  #power-menu .pm-icon { font-size: 18px; width: 24px; text-align: center; }
  #power-menu .pm-shutdown { color: #f28b82; }
  #power-menu .pm-reboot { color: #fdd663; }
  #power-menu .pm-sleep { color: #8ab4f8; }

  /* ============================================================
     壁纸设置弹窗
     ============================================================ */
  #wallpaper-dialog {
    position: fixed; inset: 0; z-index: 6000;
    display: none; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
    font-family: 'Segoe UI', system-ui, sans-serif;
  }
  #wallpaper-dialog .wp-box {
    width: 360px; max-width: 90vw;
    background: rgba(15, 23, 42, 0.98);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px; padding: 20px;
    box-shadow: 0 12px 48px rgba(0,0,0,0.6);
  }
  #wallpaper-dialog .wp-title {
    font-size: 16px; font-weight: 600; color: #fff; margin-bottom: 14px;
  }
  #wallpaper-dialog .wp-label {
    display: block; font-size: 12px; color: #888; margin-bottom: 6px; margin-top: 12px;
  }
  #wallpaper-dialog .wp-input {
    width: 100%; padding: 10px 12px; border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.05); color: #fff; font-size: 13px; outline: none;
  }
  #wallpaper-dialog .wp-input:focus { border-color: rgba(56,189,248,0.5); }
  #wallpaper-dialog .wp-file {
    display: block; width: 100%; padding: 8px 0; color: #aaa; font-size: 13px;
  }
  #wallpaper-dialog .wp-btns {
    display: flex; justify-content: flex-end; gap: 8px; margin-top: 18px;
  }
  #wallpaper-dialog .wp-btns button {
    padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; font-size: 13px;
  }
  #wallpaper-dialog .wp-cancel { background: rgba(255,255,255,0.08); color: #ccc; }
  #wallpaper-dialog .wp-ok { background: rgba(56,189,248,0.85); color: #fff; }

  /* ============================================================
     终端窗口
     ============================================================ */
  #terminal-window {
    position: absolute; display: none;
    width: 700px; height: 420px;
    background: #0c0c0c; border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px; z-index: 100;
    box-shadow: 0 8px 40px rgba(0,0,0,0.6);
    font-family: 'Courier New', monospace;
    overflow: hidden;
    flex-direction: column;
  }
  #terminal-window .tw-titlebar {
    display: flex; align-items: center; height: 36px;
    background: #161616; padding: 0 12px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    cursor: move;
  }
  #terminal-window .tw-title {
    flex: 1; font-size: 13px; color: #aaa; font-family: 'Segoe UI', sans-serif;
  }
  #terminal-window .tw-ctrl {
    display: flex; gap: 6px;
  }
  #terminal-window .tw-ctrl-btn {
    width: 28px; height: 28px; border-radius: 6px; border: none;
    cursor: pointer; font-size: 14px; display: flex; align-items: center;
    justify-content: center; background: transparent; color: #999;
  }
  #terminal-window .tw-ctrl-btn:hover { background: rgba(255,255,255,0.1); }
  #terminal-window .tw-ctrl-btn.close:hover { background: #e81123; color: #fff; }
  #terminal-window .tw-output {
    flex: 1; overflow-y: auto; padding: 12px;
    font-size: 14px; line-height: 1.5; color: #00cc00;
    white-space: pre-wrap; word-break: break-all;
  }
  #terminal-window .tw-output .tw-line { margin: 0; }
  #terminal-window .tw-output .tw-line.error { color: #f28b82; }
  #terminal-window .tw-output .tw-line.info { color: #8ab4f8; }
  #terminal-window .tw-input-line {
    display: flex; align-items: center; padding: 8px 12px;
    border-top: 1px solid rgba(255,255,255,0.06);
  }
  #terminal-window .tw-prompt {
    color: #00ff88; font-weight: bold; font-size: 14px;
    white-space: nowrap; margin-right: 8px;
  }
  #terminal-window .tw-input {
    flex: 1; background: transparent; border: none; outline: none;
    color: #e0e0e0; font-size: 14px; font-family: 'Courier New', monospace;
    caret-color: #00ff88;
  }
  #terminal-window .tw-input::placeholder { color: #444; }

  /* ============================================================
     应用窗口 (通用)

<script type="module">
// ===================================================================
// 内核模块内联实现
// ===================================================================
class GlobalDisplayAPI {
  constructor() { this.initialized = false; }
  static get instance() { if(!this._i) this._i=new GlobalDisplayAPI(); return this._i; }
  initialize(c,o={}) {
    if(this.initialized) return;
    this.initialized = true;
    c.width = (o.width||window.innerWidth) * (o.dpr||1);
    c.height = (o.height||window.innerHeight) * (o.dpr||1);
    c.style.width = (o.width||window.innerWidth)+'px';
    c.style.height = (o.height||window.innerHeight)+'px';
  }
}

class WindowManager {
  constructor() { this.wins=new Map(); this.order=[]; this.focus=null; this.nid=1; this.ls={}; }
  static get instance() { if(!this._i) this._i=new WindowManager(); return this._i; }
  createWindow(o={}) {
    const id='win_'+this.nid++;
    const w={id,title:o.title||'Window',w:o.width||600,h:o.height||400,x:o.x??100,y:o.y??100,state:'NORMAL',appId:o.appId||null,minimized:false};
    this.wins.set(id,w); this.order.push(id); this.focus=id;
    this._emit('window-created',w); return id;
  }
  destroyWindow(id) { this.wins.delete(id); this.order=this.order.filter(w=>w!==id); if(this.focus===id) this.focus=this.order[this.order.length-1]||null; this._emit('window-destroyed',{windowId:id}); }
  setFocus(id) { if(this.wins.has(id)) { this.focus=id; this._emit('window-focused',{windowId:id}); } }
  bringToFront(id) { if(!this.wins.has(id)) return; this.order=this.order.filter(w=>w!==id); this.order.push(id); this.setFocus(id); }
  getWindowList() { return [...this.wins.values()]; }
  on(e,cb) { if(!this.ls[e]) this.ls[e]=[]; this.ls[e].push(cb); }
  _emit(e,d) { (this.ls[e]||[]).forEach(cb=>{try{cb(d)}catch(e){}}); }
}

class SysCallBridge {
  constructor() { this.h={}; this._reg(); }
  static get instance() { if(!this._i) this._i=new SysCallBridge(); return this._i; }
  _reg() {
    this.h.NtGetSystemInfo=()=>({hostname:'WebNT-Kernel',version:'1.0.0',platform:navigator.platform,cpuCores:navigator.hardwareConcurrency||1,memory:navigator.deviceMemory||4,uptime:Math.floor(performance.now()/1000)});
    this.h.NtShutdown=()=>({success:true});
    this.h.NtReboot=()=>({success:true});
  }
  async call(name,...args) { const h=this.h[name]; if(!h) throw new Error(`SysCall '${name}' not found`); return h(args[0]); }
}

class TerminalCommandRegistry {
  constructor() { this.cmds=new Map(); this._init(); }
  static get instance() { if(!this._i) this._i=new TerminalCommandRegistry(); return this._i; }
  _init() {
    const add=(name,desc,cat,fn)=>this.cmds.set(name,{name,desc,cat,fn});
    add('help','显示可用命令','系统',(a,o)=>{let t='可用命令:\n\n';this.cmds.forEach((c,n)=>{t+=`  ${n.padEnd(12)}${c.desc}\n`;});return t;});
    add('ver','内核版本','系统',()=>'WebNT 内核 v1.0.0');
    add('sysinfo','系统信息','系统',()=>`WebNT 内核 v1.0.0\nCPU: ${navigator.hardwareConcurrency||'?'} 核\n内存: ${navigator.deviceMemory||'?'} GB\n平台: ${navigator.platform}\nGPU: ${navigator.gpu?'WebGPU':'Canvas2D'}\n运行时间: ${Math.floor(performance.now()/1000)}秒`);
    add('ps','进程列表','进程',()=>'  PID:1  系统  [运行中]');
    add('ls','目录列表','文件',(a)=>(a.length?`目录: ${a[0]}`:'/')+'\n  下载/  文档/  桌面/');
    add('pwd','当前目录','文件',()=>'/home/webnt');
    add('cd','切换目录','文件',(a)=>`已切换到: ${a[0]||'/'}`);
    add('clear','清屏','工具',()=>'__CLEAR__');
    add('echo','输出文本','工具',(a)=>a.join(' '));
    add('date','显示日期','工具',()=>new Date().toLocaleString('zh-CN'));
    add('uptime','运行时间','系统',()=>`${Math.floor(performance.now()/1000)} 秒`);
    add('whoami','当前用户','系统',()=>'管理员');
    add('shutdown','关机','系统',()=>{setTimeout(()=>location.reload(),500);return'正在关机...';});
    add('reboot','重启','系统',()=>{location.reload();return'正在重启...';});
    add('netstat','网络状态','网络',()=>'活动连接: 0');
    add('driver','驱动管理','设备',()=>'display.webgpu [正常]\nfile.fs [正常]\nnet.stream [正常]\nterminal.cmd [正常]');
    add('display','显示信息','设备',()=>`${window.innerWidth}x${window.innerHeight} @ ${window.devicePixelRatio}x`);
    add('tree','目录树','文件',()=>'/\n├── home/\n│   └── webnt/\n├── 系统/\n└── 临时/');
    add('grep','文本搜索','工具',(a)=>`grep: 未找到 "${a.join(' ')}"`);
    add('history','命令历史','工具',()=>'');
    add('dns','DNS查询','网络',(a)=>`${a[0]}: 127.0.0.1`);
    add('ping','网络测试','网络',(a)=>`PING ${a[0]} (127.0.0.1): 56 字节\n64 字节: seq=0 ttl=64 时间=0.5ms`);
    add('calc','计算器','工具',(a)=>{ const expr=a.join(' '); try{ return `${expr} = ${Function('"use strict"; return ('+expr+')')()}`; }catch(e){ return `错误: ${e.message}`; } });
    add('base64','Base64 编解码','工具',(a)=>{ const mode=a[0], text=a.slice(1).join(' '); if(!text) return '用法: base64 encode|decode <text>'; try{ if(mode==='encode') return btoa(unescape(encodeURIComponent(text))); if(mode==='decode') return decodeURIComponent(escape(atob(text))); return '用法: base64 encode|decode <text>'; }catch(e){ return `错误: ${e.message}`; } });
    add('urlencode','URL 编码','工具',(a)=>{ const t=a.join(' '); return t?encodeURIComponent(t):'用法: urlencode <text>'; });
    add('urldecode','URL 解码','工具',(a)=>{ const t=a.join(' '); try{return t?decodeURIComponent(t):'用法: urldecode <text>';}catch(e){return `错误: ${e.message}`;} });
    add('uuid','生成 UUID','工具',()=>'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,c=>{ const r=Math.random()*16|0; return (c==='x'?r:(r&0x3|0x8)).toString(16); }));
    add('rand','随机数','工具',(a)=>{ const min=parseFloat(a[0])||0, max=parseFloat(a[1])||(min+1); return String(Math.floor(Math.random()*(max-min+1))+min); });
    add('hash','简单哈希','工具',(a)=>{ let h=5381; const s=a.join(' '); for(let i=0;i<s.length;i++) h=((h<<5)+h)+s.charCodeAt(i); return (h>>>0).toString(16); });
    add('time','当前时间','工具',()=>new Date().toLocaleString('zh-CN',{hour12:false}));
    add('neofetch','系统信息','工具',()=>{
      const logo='    ___       ___       ___\n   /\\__\\     /\\__\\     /\\__\\\n  /:/  /__   /:/ _/_   /:/ _/_\n /:/_/\\__\\ /:/_/\\__\\ /:/_/\\__\\\n \\:\\\\/__/ \\:\\/__/ \\:\\\\/__/\n  \\:\\\\__\\  \\:\\\\__\\  \\:\\\\__\\\n   \\/__/    \\/__/    \\/__/';
      return `${logo}\n  系统: WebNT 内核 v1.0.0\n  平台: ${navigator.platform}\n  内核: ${navigator.hardwareConcurrency||'?'} 核\n  内存: ${navigator.deviceMemory||'?'} GB\n  分辨率: ${window.innerWidth}x${window.innerHeight}\n  运行时间: ${Math.floor(performance.now()/1000)} 秒`;
    });
    add('cowsay','奶牛说话','娱乐',(a)=>{ const text=a.join(' ')||'哞~'; const pad=Math.max(2,text.length+2); const line='-'.repeat(pad); return `${line}\n< ${text} >\n${line}\n        \\   ^__^\n         \\  (oo)\\_______\n            (__)\\       )\\/\\\n                ||----w |\n                ||     ||`; });
    add('fortune','随机格言','娱乐',()=>{ const q=['千里之行，始于足下。','Talk is cheap. Show me the code.','Stay hungry, stay foolish.','知之为知之，不知为不知。','The journey of a thousand miles begins with one step.','代码是写给人看的，只是顺便让机器执行。']; return q[Math.floor(Math.random()*q.length)]; });
    add('matrix','矩阵雨','娱乐',()=>Array.from({length:8},()=>Array.from({length:16},()=>'01'[Math.floor(Math.random()*2)]).join(' ')).join('\n'));
    add('open','打开应用','系统',(a)=>{ const id=a[0]; if(!id) return '用法: open <appId>'; launchApp(id); return `正在打开 ${id}...`; });
    add('wallpaper','当前壁纸','系统',()=>{ const s=localStorage.getItem('webnt_wallpaper'); return s?'当前壁纸: '+s.substring(0,80)+(s.length>80?'...':''):'当前使用默认壁纸'; });
  }
  getCommand(n) { return this.cmds.get(n)||null; }
  getAllCommands() { return [...this.cmds.keys()]; }
}

class TerminalExecutor {
  constructor() { this.history=[]; }
  static get instance() { if(!this._i) this._i=new TerminalExecutor(); return this._i; }
  async execute(line) {
    const t=line.trim(); if(!t) return {output:'',exitCode:0};
    this.history.push(t);
    const parts=t.split(/\s+/), name=parts[0].toLowerCase(), args=parts.slice(1);
    const cmd=TerminalCommandRegistry.instance.getCommand(name);
    if(!cmd) return {output:`命令未找到: ${name}\n输入 'help' 查看可用命令。`,exitCode:127};
    try {
      const r=cmd.fn(args,{});
      if(r==='__CLEAR__') return {output:'',exitCode:0,clear:true};
      return {output:String(r||''),exitCode:0};
    } catch(e) { return {output:`Error: ${e.message}`,exitCode:1}; }
  }
  getHistory() { return [...this.history]; }
}

window.__WebNT__ = { GlobalDisplayAPI, WindowManager, SysCallBridge, TerminalCommandRegistry, TerminalExecutor };

// 计算器全局辅助函数
window.__calcState = {};
window.__calcInput = function(idSuffix, val) {
  const state = window.__calcState[idSuffix] = window.__calcState[idSuffix] || { expr: '', result: '0' };
  state.expr += val;
  state.result = state.expr;
  const exprEl = document.getElementById('calc-expr-' + idSuffix);
  const resultEl = document.getElementById('calc-result-' + idSuffix);
  if (exprEl) exprEl.textContent = state.expr;
  if (resultEl) resultEl.textContent = state.expr || '0';
};
window.__calcEval = function(idSuffix) {
  const state = window.__calcState[idSuffix] = window.__calcState[idSuffix] || { expr: '', result: '0' };
  const exprEl = document.getElementById('calc-expr-' + idSuffix);
  const resultEl = document.getElementById('calc-result-' + idSuffix);
  try {
    const r = Function('"use strict"; return (' + (state.expr || '0') + ')')();
    state.result = String(r);
    if (exprEl) exprEl.textContent = state.expr + ' =';
    if (resultEl) resultEl.textContent = r;
    state.expr = String(r);
  } catch(e) {
    if (resultEl) resultEl.textContent = 'Error';
  }
};
window.__calcClear = function(idSuffix) {
  window.__calcState[idSuffix] = { expr: '', result: '0' };
  const exprEl = document.getElementById('calc-expr-' + idSuffix);
  const resultEl = document.getElementById('calc-result-' + idSuffix);
  if (exprEl) exprEl.textContent = '';
  if (resultEl) resultEl.textContent = '0';
};

let lsDragging=false, lsStartX=0, lsKnobX=0, lsStartTime=0;
const lsSlider=document.getElementById('ls-slider');
const lsKnob=document.getElementById('ls-knob');

function getMaxSlide() { if(!lsSlider) return 256; const kw=lsKnob?lsKnob.offsetWidth:40; return lsSlider.offsetWidth-kw-4; }

function resetKnob() { if(lsKnob) lsKnob.style.left='4px'; }

function unlockDesktop() {
  lockScreen.classList.add('unlocked');
  setTimeout(() => { lockScreen.style.display='none'; }, 500);
}

lsSlider.addEventListener('pointerdown', e => {
  lsDragging=true; lsStartX=e.clientX; lsStartTime=Date.now(); lsKnobX=4;
  lsSlider.classList.add('dragging');
  e.preventDefault();
});
// 绑定到 document 确保手指移出滑块后仍能追踪
document.addEventListener('pointermove', e => {
  if(!lsDragging) return;
  const dx=e.clientX-lsStartX;
  const maxSlide=getMaxSlide();
  lsKnobX=Math.max(4, Math.min(maxSlide, 4+dx));
  lsKnob.style.left=lsKnobX+'px';
  // 降低阈值到85%，支持快速滑动解锁
  const threshold = Math.max(maxSlide * 0.85, maxSlide * 0.5);
  if(lsKnobX>=threshold) { lsDragging=false; lsSlider.classList.remove('dragging'); unlockDesktop(); }
});
document.addEventListener('pointerup', () => {
  if(!lsDragging) return;
  lsDragging=false; lsSlider.classList.remove('dragging');
  const maxSlide=getMaxSlide();
  const threshold = Math.max(maxSlide * 0.85, maxSlide * 0.5);
  // 快速滑动放宽阈值
  const elapsed = Date.now() - lsStartTime;
  const speed = lsKnobX / Math.max(elapsed, 1);
  if(lsKnobX >= threshold || (speed > 0.5 && lsKnobX >= maxSlide * 0.5)) {
    unlockDesktop();
  } else {
    resetKnob();
  }
});
// 触摸取消时也重置
document.addEventListener('pointercancel', () => {
  if(lsDragging) { lsDragging=false; lsSlider.classList.remove('dragging'); resetKnob(); }
});

// 按任意键解锁
document.addEventListener('keydown', function unlockByKey(e) {
  if(lockScreen.style.display!=='none') { unlockDesktop(); }
}, {once:false});

// 点击滑块区域也能解锁（触控备选）
lsSlider.addEventListener('click', e => {
  if(!lsDragging) unlockDesktop();
});

function renderDesktopIcons() {
  desktopIcons.innerHTML='';
  let installedApps = [];
  try { installedApps = JSON.parse(localStorage.getItem('webnt_installed_apps') || '[]'); }
  catch(e) {}
  const allApps = [...desktopApps];
  installedApps.forEach(a => {
    if(!allApps.find(d => d.id === a.id)) {
      allApps.push({ id:a.id, name:a.name, icon:a.icon, color:a.color, appId:a.id });
    }
  });

  // 应用自定义排序
  const savedOrder = getDesktopOrder();
  if(savedOrder.length > 0) {
    const ordered = [];
    savedOrder.forEach(id => { const a = allApps.find(d => d.id === id); if(a) ordered.push(a); });
    allApps.forEach(a => { if(!ordered.find(d => d.id === a.id)) ordered.push(a); });
    allApps.length = 0;
    allApps.push(...ordered);
  }

  allApps.forEach((app) => {
    const icon=document.createElement('div');
    icon.className='desktop-icon';
    icon.dataset.appId=app.id;
    icon.draggable=true;
    icon.innerHTML=`<div class="dicon-svg" style="font-size:36px;color:${app.color}">${app.icon}</div><div class="dicon-label">${app.name}</div>`;
    icon.addEventListener('click', (e) => {
      e.stopPropagation();
      if(selectedIcon) selectedIcon.classList.remove('selected');
      icon.classList.add('selected');
      selectedIcon=icon;
    });
    icon.addEventListener('dblclick', (e) => {
      e.stopPropagation();
      launchApp(app.appId);
    });
    icon.addEventListener('contextmenu', (e) => {
      e.preventDefault(); e.stopPropagation();
      const pinLabel = isPinned(app.appId) ? '从任务栏取消固定' : '固定到任务栏';
      showContextMenu(e.clientX, e.clientY, [
        {label:'打开', action:()=>launchApp(app.appId)},
        {label:'在终端中打开', action:()=>{launchApp('terminal'); writeTerminal(`正在打开 ${app.name}...\n`);}},
        {separator:true},
        {label:pinLabel, action:()=>{ isPinned(app.appId) ? unpinFromTaskbar(app.appId) : pinToTaskbar(app); }},
        {label:'属性', action:()=>{}},
      ]);
    });

    // HTML5 拖拽排序 + 触控长按拖拽
    let longPressTimer=null, longPressTriggered=false, touchDragging=false;
    let touchStartX=0, touchStartY=0;
    icon.addEventListener('dragstart', (e) => {
      icon.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', app.id);
    });
    icon.addEventListener('dragend', () => {
      icon.classList.remove('dragging');
      document.querySelectorAll('.desktop-icon.drag-over').forEach(el => el.classList.remove('drag-over'));
      const newOrder = [...document.querySelectorAll('.desktop-icon')].map(el => el.dataset.appId);
      saveDesktopOrder(newOrder);
    });
    icon.addEventListener('dragover', (e) => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      const dragging = document.querySelector('.desktop-icon.dragging');
      if(!dragging || dragging === icon) return;
      const rect = icon.getBoundingClientRect();
      const midY = rect.top + rect.height / 2;
      if(e.clientY < midY) {
        desktopIcons.insertBefore(dragging, icon);
      } else {
        desktopIcons.insertBefore(dragging, icon.nextSibling);
      }
      icon.classList.add('drag-over');
    });
    icon.addEventListener('dragleave', () => {
      icon.classList.remove('drag-over');
    });
    // 触控长按拖拽
    icon.addEventListener('touchstart', (e) => {
      longPressTriggered=false; touchDragging=false;
      longPressTimer = setTimeout(() => {
        longPressTriggered=true;
        touchDragging=true;
        icon.classList.add('dragging');
        icon.style.position='relative';
        icon.style.zIndex='10';
        const touch = e.touches[0];
        touchStartX = touch.clientX;
        touchStartY = touch.clientY;
        // 触觉反馈
        if(navigator.vibrate) navigator.vibrate(15);
      }, 500);
    }, {passive: false});
    icon.addEventListener('touchmove', (e) => {
      if(!touchDragging) {
        if(longPressTimer) { clearTimeout(longPressTimer); longPressTimer=null; }
        return;
      }
      e.preventDefault();
      const touch = e.touches[0];
      const dx = touch.clientX - touchStartX;
      const dy = touch.clientY - touchStartY;
      icon.style.transform = `translate(${dx}px, ${dy}px)`;
      // 检测覆盖目标
      document.querySelectorAll('.desktop-icon').forEach(el => {
        if(el === icon) return;
        el.classList.remove('drag-over');
        const rect = el.getBoundingClientRect();
        const cx = touch.clientX, cy = touch.clientY;
        if(cx >= rect.left && cx <= rect.right && cy >= rect.top && cy <= rect.bottom) {
          el.classList.add('drag-over');
        }
      });
    }, {passive: false});
    icon.addEventListener('touchend', (e) => {
      if(longPressTimer) { clearTimeout(longPressTimer); longPressTimer=null; }
      if(!touchDragging) return;
      touchDragging=false;
      icon.classList.remove('dragging');
      icon.style.position='';
      icon.style.zIndex='';
      icon.style.transform='';
      // 找到目标位置插入
      const overEl = document.querySelector('.desktop-icon.drag-over');
      document.querySelectorAll('.desktop-icon.drag-over').forEach(el => el.classList.remove('drag-over'));
      if(overEl && overEl !== icon) {
        const rect = overEl.getBoundingClientRect();
        const midY = rect.top + rect.height / 2;
        const touch = e.changedTouches[0];
        if(touch.clientY < midY) {
          desktopIcons.insertBefore(icon, overEl);
        } else {
          desktopIcons.insertBefore(icon, overEl.nextSibling);
        }
      }
      const newOrder = [...document.querySelectorAll('.desktop-icon')].map(el => el.dataset.appId);
      saveDesktopOrder(newOrder);
    });
    // 触控长按弹出右键菜单
    icon.addEventListener('touchstart', (e) => {
      // 已被拖拽的touchstart处理，此处仅做右键菜单
      if(!icon.__touchMenuBound) {
        icon.__touchMenuBound = true;
        let menuTimer = null;
        icon.addEventListener('touchstart', function menuHandler(ev) {
          menuTimer = setTimeout(() => {
            if(longPressTriggered) return;
            const touch = ev.touches[0];
            const pinLabel = isPinned(app.appId) ? '从任务栏取消固定' : '固定到任务栏';
            showContextMenu(touch.clientX, touch.clientY, [
              {label:'打开', action:()=>launchApp(app.appId)},
              {label:'在终端中打开', action:()=>{launchApp('terminal'); writeTerminal(`正在打开 ${app.name}...\n`);}},
              {separator:true},
              {label:pinLabel, action:()=>{ isPinned(app.appId) ? unpinFromTaskbar(app.appId) : pinToTaskbar(app); }},
              {label:'属性', action:()=>{}},
            ]);
            if(navigator.vibrate) navigator.vibrate(10);
          }, 600);
          const clearTimer = () => { if(menuTimer) { clearTimeout(menuTimer); menuTimer=null; } };
          icon.addEventListener('touchend', clearTimer, {once: true});
          icon.addEventListener('touchmove', clearTimer, {once: true});
        }, {once: true});
      }
    });

    desktopIcons.appendChild(icon);
  });
}

let pinnedApps = [];
function loadPinnedApps() {
  try { pinnedApps = JSON.parse(localStorage.getItem('webnt_taskbar_pins') || '[]'); }
  catch(e) { pinnedApps = []; }
}
function savePinnedApps() { localStorage.setItem('webnt_taskbar_pins', JSON.stringify(pinnedApps)); }

function isPinned(appId) { return pinnedApps.some(p => p.appId === appId); }
function pinToTaskbar(app) {
  if(!app || isPinned(app.appId)) return;
  pinnedApps.push({ id: app.id, name: app.name, icon: app.icon, color: app.color, appId: app.appId });
  savePinnedApps(); renderPinnedTaskbar();
}
function unpinFromTaskbar(appId) {
  pinnedApps = pinnedApps.filter(p => p.appId !== appId);
  savePinnedApps(); renderPinnedTaskbar();
}

function renderPinnedTaskbar() {
  const container = document.getElementById('tb-pinned');
  if(!container) return;
  container.innerHTML = '';
  const runningIds = new Set(WindowManager.instance.getWindowList().map(w => w.appId).filter(Boolean));
  pinnedApps.forEach(app => {
    const btn = document.createElement('div');
    btn.className = 'tb-pin-btn' + (runningIds.has(app.appId) ? ' running' : '');
    btn.title = app.name;
    btn.innerHTML = `<span style="color:${app.color}">${app.icon}</span>`;
    btn.addEventListener('click', () => { launchApp(app.appId); });
    btn.addEventListener('contextmenu', e => {
      e.preventDefault(); e.stopPropagation();
      showContextMenu(e.clientX, e.clientY, [
        {label:'取消固定', action:()=>unpinFromTaskbar(app.appId)},
      ]);
    });
    container.appendChild(btn);
  });
}

function applyWallpaper(value) {

      desktopBg.style.background = value;
    } else {
      desktopBg.style.background = `url(${value}) center/cover no-repeat`;
    }
  } catch(e) { /* ignore invalid wallpaper */ }
}

  const url = document.getElementById('wp-url-input').value.trim();

  if(fileInput.files && fileInput.files[0]) {
    const reader = new FileReader();

      applyWallpaper(ev.target.result);
      hideWallpaperDialog();
    };
    reader.readAsDataURL(fileInput.files[0]);
  } else if(url) {
    localStorage.setItem('webnt_wallpaper', url);
    applyWallpaper(url);
    hideWallpaperDialog();
  }
});

    el.addEventListener('click', () => { if(item.action) item.action(); hideContextMenu(); });

  });
  contextMenu.style.display='block';
  contextMenu.style.left=Math.min(x, window.innerWidth-220)+'px';
  contextMenu.style.top=Math.min(y, window.innerHeight-contextMenu.offsetHeight-10)+'px';
}

  if(startMenu && startMenu.classList.contains('show') && !startMenu.contains(e.target) && e.target.id!=='tb-start-btn' && !document.getElementById('tb-start-btn').contains(e.target)) {
    startMenu.classList.remove('show');

    powerMenu.style.display='none';

// ===================================================================

// ===================================================================
function updateTaskbarWindowButtons() {
  const list=document.getElementById('tb-window-list');
  const wins=WindowManager.instance.getWindowList();
  list.innerHTML='';
  wins.forEach(w => {
    const btn=document.createElement('div');
    btn.className='tb-win-btn'+(WindowManager.instance.focus===w.id?' active':'');
    btn.innerHTML=`<span class="tb-win-icon">${w.icon||'\ud83d\uddd1\ufe0f'}</span><span>${w.title}</span>`;
    btn.addEventListener('click', () => {
      WindowManager.instance.bringToFront(w.id);
      if(w.appId==='terminal') {
        tw.style.display='flex'; tw.style.zIndex=100;
      } else {
        const el = document.getElementById(w.appId);
        if(el) {
          el.style.display='flex';
          document.querySelectorAll('.app-window').forEach(ew=>ew.style.zIndex=Math.min(50,ew.style.zIndex||50));
          el.style.zIndex=100;
        }
      }
      updateTaskbarWindowButtons();
    });
    list.appendChild(btn);
  });
  renderPinnedTaskbar();
}

            <div class="fm-tree-item active" data-path="/" onclick="window.__fmNavigate('/')">\ud83d\udcc1 根目录</div>

            <div class="fm-tree-item" data-path="/文档" onclick="window.__fmNavigate('/文档')">\ud83d\udcc4 文档</div>
            <div class="fm-tree-item" data-path="/桌面" onclick="window.__fmNavigate('/桌面')">\ud83d\udda5\ufe0f 桌面</div>
            <div class="fm-tree-item" data-path="/系统" onclick="window.__fmNavigate('/系统')">\u2699\ufe0f 系统</div>
            <div class="fm-tree-item" data-path="/临时" onclick="window.__fmNavigate('/临时')">\ud83d\udcc1 临时</div>

              <button onclick="window.__fmBack()" title="返回">\u2190</button>

            </div>
            <div class="fm-files" id="fm-files"></div>
          </div>

      `);
      // Initialize FM
      if(!window.__fmInit) {
        window.__fmInit = true;
        window.__fmHistory = [];
        window.__fmHistoryIdx = -1;
        window.__fmCurrentPath = '/';
        const fmFS = {
          '/': {type:'dir',children:['下载','文档','桌面','系统','临时']},
          '/下载': {type:'dir',children:[]},
          '/文档': {type:'dir',children:['readme.txt','笔记.txt','项目计划.txt']},

          '/文档/readme.txt': {type:'file',size:'1.2 KB',content:'欢迎使用 WebNT 文件管理系统！'},
          '/文档/笔记.txt': {type:'file',size:'3.5 KB',content:'今天的笔记...'},

          '/桌面/快捷方式.lnk': {type:'file',size:'0.5 KB',content:'[快捷方式]'},
          '/系统/kernel.config': {type:'file',size:'2.3 KB',content:'kernel_version=1.0.0\nscheduler=smp\nmax_threads=256'},
          '/系统/drivers.json': {type:'file',size:'4.7 KB',content:'{"display":"webgpu","fs":"internal","net":"stream"}'},
          '/系统/boot.log': {type:'file',size:'12.1 KB',content:'[正常] 内核初始化完成\n[正常] 驱动加载完成\n[正常] 用户会话已启动'},
          '/临时/cache.dat': {type:'file',size:'0.8 KB',content:'[二进制数据]'},
          '/临时/日志.log': {type:'file',size:'2.1 KB',content:'[日志数据]'},
        };
        window.__fmNavigate = function(path) {
          if(!fmFS[path] || fmFS[path].type !== 'dir') return;
          window.__fmCurrentPath = path;
          window.__fmHistory = window.__fmHistory.slice(0, window.__fmHistoryIdx + 1);
          window.__fmHistory.push(path);
          window.__fmHistoryIdx = window.__fmHistory.length - 1;
          window.__fmRender();
        };
        window.__fmBack = function() {
          if(window.__fmHistoryIdx > 0) {
            window.__fmHistoryIdx--;
            window.__fmCurrentPath = window.__fmHistory[window.__fmHistoryIdx];
            window.__fmRender();
          }
        };
        window.__fmForward = function() {
          if(window.__fmHistoryIdx < window.__fmHistory.length - 1) {
            window.__fmHistoryIdx++;
            window.__fmCurrentPath = window.__fmHistory[window.__fmHistoryIdx];
            window.__fmRender();
          }
        };
        window.__fmUp = function() {
          const p = window.__fmCurrentPath;
          const idx = p.lastIndexOf('/');
          if(idx > 0) window.__fmNavigate(p.substring(0, idx));
          else if(window.__fmCurrentPath !== '/') window.__fmNavigate('/');
        };
        window.__fmRender = function() {
          const path = window.__fmCurrentPath;
          const pathEl = document.getElementById('fm-path');
          const filesEl = document.getElementById('fm-files');
          const sidebarEl = document.getElementById('fm-sidebar');
          if(pathEl) pathEl.textContent = path;
          if(sidebarEl) {
            sidebarEl.querySelectorAll('.fm-tree-item').forEach(item => {
              item.classList.toggle('active', item.dataset.path === path);
            });
          }
          if(!filesEl) return;
          const dir = fmFS[path];
          if(!dir || dir.type !== 'dir') { filesEl.innerHTML = '<div style="color:#666;padding:20px">目录不存在</div>'; return; }
          if(dir.children.length === 0) {
            filesEl.innerHTML = '<div style="color:#666;padding:20px;text-align:center;width:100%">此文件夹为空</div>';
            return;
          }
          filesEl.innerHTML = dir.children.map(name => {
            const fullPath = (path === '/' ? '/' + name : path + '/' + name);
            const entry = fmFS[fullPath];
            const isDir = entry && entry.type === 'dir';
            const icon = isDir ? '\ud83d\udcc1' : (name.endsWith('.txt')||name.endsWith('.log')?'\ud83d\udcc4':name.endsWith('.json')||name.endsWith('.config')?'\u2699\ufe0f':name.endsWith('.lnk')?'\ud83d\udd17':'\ud83d\udce6');
            const size = entry && entry.size ? entry.size : '';
            return '<div class="fm-file" ondblclick="'+(isDir ? "window.__fmNavigate('"+fullPath+"')" : "window.__fmOpenFile('"+fullPath+"')")+'"><div class="fm-file-icon">'+icon+'</div><div class="fm-file-name">'+name+'</div>'+ (size ? '<div style="font-size:10px;color:#666">'+size+'</div>' : '') +'</div>';
          }).join('');
        };
        window.__fmOpenFile = function(path) {
          const entry = fmFS[path];
          if(!entry) return;
          showAppWindow(path.split('/').pop(), '\ud83d\udcc4', '<div style="padding:8px;white-space:pre-wrap;font-family:monospace;font-size:13px;color:#e0e0e0;height:100%;overflow:auto">'+ (entry.content || '[无法预览]') +'</div>');
        };
        window.__fmNavigate('/');
      } else {
        setTimeout(() => window.__fmRender(), 50);
      }
      break;

          .st-msg { font-size:12px;margin-top:8px;min-height:18px; }
          .st-msg.success { color:#81c995; }
          .st-msg.error { color:#f28b82; }
        </style>
        <div class="store-wrap">
          <div class="store-main" id="store-main"><div class="st-empty">加载中...</div></div>
          <div class="store-tabs">
            <button class="store-tab active" data-tab="official">官方应用</button>
            <button class="store-tab" data-tab="scan">链接扫描</button>
          </div>
        </div>
      `);

      requestAnimationFrame(() => {
        const storeMain = document.getElementById('store-main');
        if(!storeMain) return;

        // ============================================================
        // 数据层
        // ============================================================
        function loadInstalled() { try { return JSON.parse(localStorage.getItem('webnt_installed_apps') || '[]'); } catch(e) { return []; } }
        function saveInstalled(apps) { localStorage.setItem('webnt_installed_apps', JSON.stringify(apps)); }
        function isInstalled(storeId) { return loadInstalled().some(a => a.storeId === storeId); }
        function getInstalled(storeId) { return loadInstalled().find(a => a.storeId === storeId); }

        // ============================================================
        // 全局函数
        // ============================================================
        window.__launchInstalledApp = function(appId) {
          const app = loadInstalled().find(a => a.id === appId);
          if(!app) return;
          showAppWindow(app.name, app.icon, '<div style="width:100%;height:100%;display:flex;flex-direction:column"><div style="font-size:32px;text-align:center;padding:20px">'+app.icon+'</div><div style="text-align:center;color:#888;font-size:13px">第三方应用</div><div style="text-align:center;color:#666;font-size:11px;margin-top:4px;word-break:break-all">'+app.url+'</div><iframe style="flex:1;width:100%;border:none;margin-top:12px;border-radius:8px;background:#fff" sandbox="allow-scripts allow-same-origin" src="'+app.url+'"></iframe></div>');
        };
        window.__uninstallApp = function(appId) {
          if(!confirm('确定要卸载此应用吗？')) return;
          let apps = loadInstalled();
          apps = apps.filter(a => a.id !== appId);
          saveInstalled(apps);
          const existing = document.querySelector('.desktop-icon[data-app-id="'+appId+'"]');
          if(existing) existing.remove();
          if(storeMain) renderOfficial();
        };

        // ============================================================
        // 官方应用列表
        // ============================================================
        function renderOfficial() {
          const installed = loadInstalled();
          storeMain.innerHTML = storeRegistry.map(app => {
            const inst = installed.find(a => a.storeId === app.id);
            return '<div class="st-card'+(inst?' installed':'')+'" onclick="window.__showDetail(\''+app.id+'\')">'
              + '<div class="st-icon" style="background:'+app.color+'22;color:'+app.color+'">'+app.icon+'</div>'
              + '<div class="st-info"><div class="st-name">'+app.name+'</div><div class="st-desc">'+app.description+'</div><div class="st-meta">'+app.author+' \u00b7 v'+app.version+' '+(inst?'\u00b7 <span style="color:#81c995">已安装</span>':'')+'</div></div>'
              + '<div class="st-arrow">\u276f</div></div>';
          }).join('') || '<div class="st-empty">暂无官方应用</div>';
        }

        // ============================================================
        // 应用详情页
        // ============================================================
        window.__showDetail = function(storeId) {
          const app = storeRegistry.find(a => a.id === storeId);
          if(!app) return;
          const inst = getInstalled(storeId);
          const hasUpdate = inst && inst.version !== app.version;
          storeMain.innerHTML = '<div class="st-detail">'
            + '<button class="st-back" onclick="window.__storeGoBack()">\u2190 返回应用列表</button>'
            + (app.images.length? '<img class="st-hero" src="'+app.images[0]+'" alt="'+app.name+'">' : '')
            + '<div class="st-d-header"><div class="st-d-icon" style="background:'+app.color+'22;color:'+app.color+'">'+app.icon+'</div><div><div class="st-d-name">'+app.name+'</div><div class="st-d-author">'+app.author+'</div><div class="st-d-version">版本 '+app.version+' \u00b7 '+app.category+'</div></div></div>'
            + '<div class="st-section"><h4>简介</h4><p>'+app.description+'</p></div>'
            + '<div class="st-section"><h4>功能特性</h4><div class="st-features">'+app.features.map(f=>'<span class="st-feature">'+f+'</span>').join('')+'</div></div>'
            + '<div class="st-section"><h4>所需权限</h4>'+app.permissions.map(p=>'<div class="st-perm">\u26a0 '+p+'</div>').join('')+'</div>'
            + '<div class="st-actions">'
            + (inst
              ? (hasUpdate
                ? '<button class="st-btn-update" onclick="window.__updateApp(\''+storeId+'\')">更新至 v'+app.version+'</button>'
                : '<button class="st-btn-launch" onclick="window.__launchInstalledApp(\''+inst.id+'\')">启动</button>')
                + '<button class="st-btn-delete" onclick="window.__deleteApp(\''+storeId+'\');window.__showDetail(\''+storeId+'\')">删除</button>'
              : '<button class="st-btn-install" onclick="window.__installFromStore(\''+storeId+'\')">安装</button>')
            + '</div></div>';
        };
        window.__storeGoBack = function() { renderOfficial(); };

        window.__installFromStore = function(storeId) {
          const app = storeRegistry.find(a => a.id === storeId);
          if(!app) return;
          if(isInstalled(storeId)) return;
          const appId = 'ext_' + storeId + '_' + Date.now();
          const newApp = { id: appId, storeId: app.id, name: app.name, url: app.url, icon: app.icon, color: app.color, version: app.version };
          const apps = loadInstalled();
          apps.push(newApp);
          saveInstalled(apps);
          addDesktopIcon(appId, app.name, app.icon, app.color, appId);
          renderDesktopIcons();
          window.__showDetail(storeId);
        };

        window.__updateApp = function(storeId) {
          const app = storeRegistry.find(a => a.id === storeId);
          if(!app) return;
          let apps = loadInstalled();
          const idx = apps.findIndex(a => a.storeId === storeId);
          if(idx === -1) return;
          apps[idx].version = app.version;
          apps[idx].url = app.url;
          saveInstalled(apps);
          window.__showDetail(storeId);
        };

        window.__deleteApp = function(storeId) {
          if(!confirm('确定要删除此应用吗？')) return;
          let apps = loadInstalled();
          const app = apps.find(a => a.storeId === storeId);
          if(!app) return;
          apps = apps.filter(a => a.storeId !== storeId);
          saveInstalled(apps);
          const existing = document.querySelector('.desktop-icon[data-app-id="'+app.id+'"]');
          if(existing) existing.remove();
        };

        // ============================================================
        // 链接扫描
        // ============================================================
        function renderScan() {
          storeMain.innerHTML = ''
            + '<div class="st-scan-box">'
            + '<label>输入链接，自动扫描 SDK 特征码匹配应用</label>'
            + '<div class="st-scan-row"><input type="text" id="scan-url-input" placeholder="https://example.com/app 或粘贴 SDK 特征码"><button id="scan-btn">扫描</button></div>'
            + '<div class="st-msg" id="scan-msg"></div>'
            + '</div>'
            + '<div id="scan-result"></div>'
            + '<div style="font-size:11px;color:#555;margin-top:12px;padding:12px;background:rgba(255,255,255,0.02);border-radius:8px;line-height:1.6">'
            + '<strong>SDK 特征码说明：</strong><br>'
            + '特征码格式: <code style="color:#8ab4f8">webnt-app:&lt;app-id&gt;:&lt;version&gt;</code><br>'
            + '开发者可在应用页面 HTML 的 meta 标签中声明特征码：<br>'
            + '<code style="color:#81c995">&lt;meta name="webnt-app" content="snake:2.1.0"&gt;</code><br>'
            + '应用商店将自动识别并匹配已注册应用。'
            + '</div>';

          const scanInput = document.getElementById('scan-url-input');
          const scanBtn = document.getElementById('scan-btn');
          const scanMsg = document.getElementById('scan-msg');
          const scanResult = document.getElementById('scan-result');

          scanBtn.addEventListener('click', () => {
            const input = scanInput.value.trim();
            if(!input) { scanMsg.textContent = '请输入链接或特征码'; scanMsg.className = 'st-msg error'; return; }
            scanResult.innerHTML = '';

            // 扫描特征码
            let matched = null;
            // 尝试直接匹配特征码格式: webnt-app:<id>:<version>
            const codeMatch = input.match(/webnt-app:([a-zA-Z0-9_-]+):?([\d.]+)?/);
            if(codeMatch) {
              const appId = codeMatch[1];
              const version = codeMatch[2];
              matched = storeRegistry.find(a => a.id === appId);
              if(matched) {
                scanMsg.textContent = '找到匹配应用！';
                scanMsg.className = 'st-msg success';
              }
            }
            // 尝试从 URL 中提取特征码（模拟扫描页面 meta）
            if(!matched) {
              const urlMatch = input.match(/([a-zA-Z0-9_-]+)\.html?$/);
              if(urlMatch) {
                const name = urlMatch[1].toLowerCase();
                matched = storeRegistry.find(a => a.id === name || a.name.toLowerCase().includes(name));
                if(matched) { scanMsg.textContent = '根据链接名称匹配到应用'; scanMsg.className = 'st-msg success'; }
              }
            }
            if(!matched) {
              scanMsg.textContent = '未找到匹配的应用，请检查链接或特征码';
              scanMsg.className = 'st-msg error';
              return;
            }
            const inst = getInstalled(matched.id);
            const hasUpdate = inst && inst.version !== matched.version;
            scanResult.innerHTML = '<div class="st-card" onclick="window.__showDetail(\''+matched.id+'\')">'
              + '<div class="st-icon" style="background:'+matched.color+'22;color:'+matched.color+'">'+matched.icon+'</div>'
              + '<div class="st-info"><div class="st-name">'+matched.name+'</div><div class="st-desc">'+matched.description+'</div><div class="st-meta">'+matched.author+' \u00b7 v'+matched.version+' '+(inst?(hasUpdate?'<span style="color:#ff9800">可更新</span>':'<span style="color:#81c995">已安装</span>'):'<span style="color:#ff7043">未安装</span>')+'</div></div>'
              + '<div class="st-arrow">\u276f</div></div>';
          });
        }

        // ============================================================
        // 标签切换
        // ============================================================
        let currentTab = 'official';
        document.querySelectorAll('.store-tab').forEach(tab => {
          tab.addEventListener('click', () => {
            document.querySelectorAll('.store-tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            currentTab = tab.dataset.tab;
            if(currentTab === 'official') renderOfficial();
            else renderScan();
          });
        });

        renderOfficial();
      });
      break;
    default:
      // Check if it's an installed app
      if(appId.startsWith('ext_')) {
        if(window.__launchInstalledApp) window.__launchInstalledApp(appId);
      } else {
        showAppWindow(appId, '\ud83d\udce6', `<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#777">${appId} 正在运行</div>`);
      }
  }
  updateTaskbarWindowButtons();
}

let appWinCounter=0;
function showAppWindow(title, icon, bodyHTML) {
  const id='appwin_'+ (++appWinCounter);
  const win=document.createElement('div');
  win.className='app-window';
  win.id=id;
  win.style.display='flex';
  win.style.width='500px'; win.style.height='400px';
  win.style.left=(200+appWinCounter*30)+'px';
  win.style.top=(60+appWinCounter*30)+'px';
  win.style.zIndex=50+appWinCounter;
  const winId = WindowManager.instance.createWindow({title,appId:id,icon});
  win.dataset.winId = winId;
  win.dataset.normalStyle = `width:500px;height:400px;left:${200+appWinCounter*30}px;top:${60+appWinCounter*30}px`;
  win.innerHTML=`
    <div class="aw-titlebar" data-winid="${id}">
      <span style="margin-right:8px">${icon}</span>
      <span class="aw-title">${title}</span>
      <div class="aw-ctrl">
        <button class="aw-ctrl-btn" onclick="const w=this.closest('.app-window');w.style.display='none';updateTaskbarWindowButtons()">&#x2014;</button>
        <button class="aw-ctrl-btn" onclick="const w=this.closest('.app-window');const ns=w.dataset.normalStyle;if(w.style.width==='100vw'){w.style.cssText=ns;this.textContent='\\u25a1'}else{w.dataset.normalStyle='width:'+w.style.width+';height:'+w.style.height+';left:'+w.style.left+';top:'+w.style.top;w.style.width='100vw';w.style.height='calc(100vh - 48px)';w.style.left='0';w.style.top='0';this.textContent='\\u25a2'}">&#x25a1;</button>
        <button class="aw-ctrl-btn close" onclick="const w=this.closest('.app-window');const wid=w.dataset.winId;if(wid)WindowManager.instance.destroyWindow(wid);w.remove();updateTaskbarWindowButtons()">&#x2715;</button>
      </div>
    </div>
    <div class="aw-body">${bodyHTML}</div>
  `;
  // 拖拽
  let dragging=false, sx=0, sy=0, ox=0, oy=0;
  win.querySelector('.aw-titlebar').addEventListener('pointerdown', e => {
    dragging=true; sx=e.clientX; sy=e.clientY;
    ox=win.offsetLeft; oy=win.offsetTop;
    win.setPointerCapture(e.pointerId);
  });
  win.addEventListener('pointermove', e => {
    if(!dragging) return;
    win.style.left=(ox+e.clientX-sx)+'px';
    win.style.top=(oy+e.clientY-sy)+'px';
  });
  win.addEventListener('pointerup', (e) => { dragging=false; if(win.hasPointerCapture&&win.hasPointerCapture(e.pointerId)) win.releasePointerCapture(e.pointerId); });
  win.addEventListener('pointercancel', (e) => { dragging=false; if(win.hasPointerCapture&&win.hasPointerCapture(e.pointerId)) win.releasePointerCapture(e.pointerId); });
  // 聚焦
  win.addEventListener('pointerdown', () => {
    document.querySelectorAll('.app-window').forEach(w=>w.style.zIndex=Math.min(50,w.style.zIndex||50));
    win.style.zIndex=100;
  });
  appRoot.appendChild(win);
  updateTaskbarWindowButtons();
}

// ===================================================================
// 终端
// ===================================================================
const twHistory=[];
let twHistoryIdx=-1;

function writeTerminal(text, cls='') {
  const lines=text.split('\n');
  lines.forEach(line => {
    const l=document.createElement('div');
    l.className='tw-line'+(cls?' '+cls:'');
    l.textContent=line||' ';
    twOutput.appendChild(l);
  });
  twOutput.scrollTop=twOutput.scrollHeight;
}

function writeWelcome() {
  twOutput.innerHTML='';
  writeTerminal('WebNT 内核 v1.0.0 [HTML5 混合微内核]', 'info');
  writeTerminal('输入 "help" 查看可用命令。');
  writeTerminal('');
}

writeWelcome();

twInput.addEventListener('keydown', async e => {
  if(e.key==='Enter') {
    const cmd=twInput.value.trim();
    if(!cmd) return;
    writeTerminal(`webnt@kernel:~$ ${cmd}`, '');
    twInput.value='';
    if(cmd!=='clear') twHistory.push(cmd);
    twHistoryIdx=twHistory.length;
    const result=await TerminalExecutor.instance.execute(cmd);
    if(result.clear) { twOutput.innerHTML=''; return; }
    writeTerminal(result.output, result.exitCode!==0?'error':'');
  } else if(e.key==='ArrowUp') {
    e.preventDefault();
    if(twHistoryIdx>0) { twHistoryIdx--; twInput.value=twHistory[twHistoryIdx]||''; }
  } else if(e.key==='ArrowDown') {
    e.preventDefault();
    if(twHistoryIdx<twHistory.length-1) { twHistoryIdx++; twInput.value=twHistory[twHistoryIdx]||''; }
    else { twHistoryIdx=twHistory.length; twInput.value=''; }
  } else if(e.key==='Tab') {
    e.preventDefault();
    const input=twInput.value.trim().split(/\s+/)[0];
    const cmds=TerminalCommandRegistry.instance.getAllCommands();
    const matches=cmds.filter(c=>c.startsWith(input));
    if(matches.length===1) twInput.value=matches[0]+' ';
    else if(matches.length>1) writeTerminal(matches.join('  '),'');
  }
});

// 终端按钮
document.getElementById('tb-terminal-btn').addEventListener('click', () => launchApp('terminal'));
document.getElementById('tw-close').addEventListener('click', () => {
  tw.style.display='none';
  const wid = tw.dataset.winId;
  if(wid) WindowManager.instance.destroyWindow(wid);
  updateTaskbarWindowButtons();
});
document.getElementById('tw-minimize').addEventListener('click', () => {
  tw.style.display='none';
  updateTaskbarWindowButtons();
});
document.getElementById('tw-maximize').addEventListener('click', () => {
  if(tw.style.width==='100vw') {
    tw.style.cssText = tw.dataset.normalStyle || 'width:700px;height:420px;left:150px;top:80px';
    tw.style.display='flex';
    this.textContent='\u25a1';
  } else {
    tw.dataset.normalStyle = 'width:'+tw.style.width+';height:'+tw.style.height+';left:'+tw.style.left+';top:'+tw.style.top;
    tw.style.width='100vw'; tw.style.height='calc(100vh - 48px)'; tw.style.left='0'; tw.style.top='0';
    this.textContent='\u25a2';
  }
});

// 终端拖拽
let twDragging=false, twSx=0, twSy=0, twOx=0, twOy=0;
document.getElementById('tw-titlebar').addEventListener('pointerdown', e => {
  twDragging=true; twSx=e.clientX; twSy=e.clientY;
  twOx=tw.offsetLeft; twOy=tw.offsetTop;
  tw.setPointerCapture(e.pointerId);
});
tw.addEventListener('pointermove', e => {
  if(!twDragging) return;
  tw.style.left=(twOx+e.clientX-twSx)+'px';
  tw.style.top=(twOy+e.clientY-twSy)+'px';
});
tw.addEventListener('pointerup', (e) => { twDragging=false; if(tw.hasPointerCapture&&tw.hasPointerCapture(e.pointerId)) tw.releasePointerCapture(e.pointerId); });
tw.addEventListener('pointercancel', (e) => { twDragging=false; if(tw.hasPointerCapture&&tw.hasPointerCapture(e.pointerId)) tw.releasePointerCapture(e.pointerId); });

// ===================================================================
// 键盘快捷键
// ===================================================================
document.addEventListener('keydown', e => {
  // Ctrl+` 打开终端
  if(e.ctrlKey && e.key==='`') {
    e.preventDefault();
    launchApp('terminal');
    return;
  }
  // Escape 关闭菜单
  if(e.key==='Escape') {
    if(startMenu.classList.contains('show')) startMenu.classList.remove('show');
    if(powerMenu.style.display==='block') powerMenu.style.display='none';
    hideContextMenu();
    return;
  }
});

// ===================================================================
// 启动流程
// ===================================================================
async function boot() {
  try {
  bootLogLine('WebNT 内核 v1.0.0 正在启动...', 'info');
  bootLogLine('Copyright (c) 2026 WebNT 项目', '');
  bootLogLine('', '');

  // Phase 0: 硬件检测
  bootProgress(10, '阶段 0: 硬件检测');
  bootLogLine('阶段 0: 硬件检测', 'info');
  bootLogLine(`  CPU: ${navigator.hardwareConcurrency||'?'} 核`, '');
  bootLogLine(`  内存: ${navigator.deviceMemory||'?'} GB`, '');
  let gpuOk = false;
  try { gpuOk = !!navigator.gpu; } catch(e) { gpuOk = false; }
  bootLogLine(`  WebGPU: ${gpuOk?'可用':'不可用'}`, gpuOk?'ok':'warn');
  bootLogLine('', '');
  await new Promise(r=>setTimeout(r,300));

  // Phase 1: 初始化内核
  bootProgress(35, '阶段 1: 内核初始化');
  bootLogLine('阶段 1: 内核初始化', 'info');
  bootLogLine('  [正常] 对象管理器已初始化', 'ok');
  bootLogLine('  [正常] 句柄表就绪', 'ok');
  bootLogLine('  [正常] SMP调度器已启动', 'ok');
  bootLogLine('  [正常] 中断控制器在线', 'ok');
  bootLogLine('', '');
  await new Promise(r=>setTimeout(r,200));

  // Phase 2: 加载驱动
  bootProgress(55, '阶段 2: 加载驱动');
  bootLogLine('阶段 2: 加载驱动', 'info');
  bootLogLine('  [正常] 显示驱动.WebGPU', 'ok');
  bootLogLine('  [正常] 文件驱动.FS', 'ok');
  bootLogLine('  [正常] 网络驱动.Stream', 'ok');
  bootLogLine('  [正常] 终端驱动.Cmd', 'ok');
  bootLogLine('  [正常] 音频驱动.WA', 'ok');
  bootLogLine('', '');
  await new Promise(r=>setTimeout(r,200));

  // Phase 3: 启动用户态
  bootProgress(75, '阶段 3: 启动用户会话');
  bootLogLine('阶段 3: 启动用户会话', 'info');
  bootLogLine('  [正常] 会话管理器已启动', 'ok');
  bootLogLine('  [正常] 桌面子系统已加载', 'ok');
  bootLogLine('  [正常] WinHTML 显示管线就绪', 'ok');
  bootLogLine('', '');
  await new Promise(r=>setTimeout(r,200));

  // Phase 4: 完成
  bootProgress(100, '系统就绪');
  bootLogLine('', '');
  bootLogLine('========================================', '');
  bootLogLine('  WebNT 内核 v1.0.0 就绪', 'ok');
  bootLogLine('  所有系统运行正常', 'ok');
  bootLogLine('========================================', '');

  await new Promise(r=>setTimeout(r,400));

  // 隐藏 BIOS 启动画面，显示锁屏
  bootScreen.classList.add('hidden');
  appRoot.style.display='block';
  loadWallpaper();
  updateAllClocks();

  setTimeout(() => { if(bootScreen.parentNode) bootScreen.remove(); }, 600);

  console.log('%c WebNT 内核 v1.0.0 就绪 %c| %c滑动解锁',
    'color:#00ff88;font-size:16px;', '', 'color:#aaa;');
  } catch(err) {
    bootLogLine(`启动错误: ${err.message}`, 'err');
    console.error('Boot error:', err);
    bootScreen.classList.add('hidden');
    appRoot.style.display = 'block';
    if(lockScreen && lockScreen.style.display !== 'none') unlockDesktop();
  }
}

boot().catch(err => {
  bootLogLine(`严重错误: ${err.message}`, 'err');
  console.error(err);
  bootScreen.classList.add('hidden');
  appRoot.style.display = 'block';
  unlockDesktop();
});
