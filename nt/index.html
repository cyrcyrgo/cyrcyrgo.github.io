<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebNT Kernel v1.0.0</title>
<link rel="stylesheet" href="ui/styles/Global.System.css">
<style>
  /* ============================================================
     BIOS Boot Screen
     ============================================================ */
  #boot-screen {
    position: fixed; inset: 0; z-index: 99999;
    background: #0a0a0a; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    font-family: 'Courier New', monospace; color: #00ff00;
    transition: opacity 0.5s ease-out;
  }
  #boot-screen.hidden { opacity: 0; pointer-events: none; }
  #boot-screen .boot-logo {
    font-size: 28px; font-weight: bold; color: #00ff88;
    margin-bottom: 8px; letter-spacing: 4px;
    text-shadow: 0 0 10px rgba(0,255,136,0.5);
  }
  #boot-screen .boot-subtitle {
    font-size: 12px; color: #888; margin-bottom: 32px; letter-spacing: 2px;
  }
  #boot-screen .boot-log {
    width: 560px; max-width: 90vw; font-size: 13px; line-height: 1.8;
    color: #00cc00; max-height: 200px; overflow-y: auto;
  }
  #boot-screen .boot-log .log-line { opacity: 0; animation: logFadeIn 0.15s forwards; }
  #boot-screen .boot-log .log-line.ok  { color: #00ff00; }
  #boot-screen .boot-log .log-line.warn { color: #ffcc00; }
  #boot-screen .boot-log .log-line.err  { color: #ff4444; }
  #boot-screen .boot-log .log-line.info { color: #00aaff; }
  @keyframes logFadeIn { to { opacity: 1; } }
  #boot-screen .boot-progress {
    width: 400px; max-width: 80vw; height: 4px; background: #1a1a1a;
    border-radius: 2px; margin-top: 24px; overflow: hidden;
  }
  #boot-screen .boot-progress-bar {
    height: 100%; width: 0%; border-radius: 2px;
    background: linear-gradient(90deg, #00ff88, #00aaff);
    transition: width 0.3s ease;
  }
  #boot-screen .boot-status { margin-top: 12px; font-size: 11px; color: #666; }

  /* ============================================================
     Lock Screen - 滑动解锁界面
     ============================================================ */
  #lock-screen {
    position: fixed; inset: 0; z-index: 50000;
    display: flex; flex-direction: column; align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #0c0c1d 0%, #1a1a35 30%, #1a2a4a 70%, #0d1b2a 100%);
    background-size: cover;
    transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.5s ease;
    user-select: none;
    touch-action: none;
  }
  #lock-screen.unlocked {
    transform: translateY(-100%);
    opacity: 0;
  }
  #lock-screen .ls-bg-blur {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 30%, rgba(100,149,237,0.15), transparent 60%),
                radial-gradient(ellipse at 80% 80%, rgba(0,180,216,0.1), transparent 50%);
  }
  #lock-screen .ls-time {
    position: relative; z-index: 1;
    font-family: 'Segoe UI', system-ui, sans-serif;
    font-size: 80px; font-weight: 200; color: #fff;
    text-shadow: 0 2px 20px rgba(255,255,255,0.2);
    letter-spacing: 2px;
    margin-bottom: 4px;
  }
  #lock-screen .ls-date {
    position: relative; z-index: 1;
    font-family: 'Segoe UI', system-ui, sans-serif;
    font-size: 18px; color: #b0c4de;
    margin-bottom: 60px;
  }
  #lock-screen .ls-user {
    position: relative; z-index: 1;
    display: flex; flex-direction: column; align-items: center;
    margin-bottom: 50px;
  }
  #lock-screen .ls-avatar {
    width: 72px; height: 72px; border-radius: 50%;
    background: linear-gradient(135deg, #667eea, #764ba2);
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; color: #fff; font-weight: 600;
    box-shadow: 0 4px 24px rgba(102,126,234,0.4);
    margin-bottom: 12px;
  }
  #lock-screen .ls-username {
    font-family: 'Segoe UI', sans-serif;
    font-size: 16px; color: #e0e0e0;
  }
  /* 滑动解锁条 */
  #lock-screen .ls-slider {
    position: relative; z-index: 1;
    width: 300px; max-width: 80vw; height: 48px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 24px;
    overflow: hidden;
    cursor: pointer;
    touch-action: none;
  }
  #lock-screen .ls-slider-track {
    position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent, rgba(102,126,234,0.3), transparent);
    animation: sliderShimmer 2.5s infinite;
  }
  @keyframes sliderShimmer {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
  }
  #lock-screen .ls-slider-text {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Segoe UI', sans-serif;
    font-size: 14px; color: #a0b4d0;
    letter-spacing: 1px;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  #lock-screen .ls-slider-knob {
    position: absolute; top: 4px; left: 4px;
    width: 40px; height: 40px; border-radius: 50%;
    background: linear-gradient(135deg, #8ea8f0, #a0b4f0);
    box-shadow: 0 2px 12px rgba(0,0,0,0.3);
    transition: left 0.05s linear;
    display: flex; align-items: center; justify-content: center;
    z-index: 2;
  }
  #lock-screen .ls-slider-knob::after {
    content: '›';
    font-size: 22px; color: #fff; font-weight: 300;
    line-height: 1;
  }
  #lock-screen .ls-slider.dragging .ls-slider-text { opacity: 0; }
  #lock-screen .ls-slider.dragging .ls-slider-track { animation: none; }
  #lock-screen .ls-hint {
    position: relative; z-index: 1;
    margin-top: 16px;
    font-size: 11px; color: #666;
    font-family: 'Segoe UI', sans-serif;
  }
  /* 锁屏通知 */
  #lock-screen .ls-notifications {
    position: absolute; bottom: 120px; right: 40px;
    z-index: 1; display: flex; flex-direction: column; gap: 8px;
    max-width: 320px;
  }
  #lock-screen .ls-notif {
    background: rgba(255,255,255,0.06); backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.1); border-radius: 12px;
    padding: 12px 16px; font-family: 'Segoe UI', sans-serif;
    color: #ccc; font-size: 13px;
    animation: notifSlideIn 0.3s ease;
  }
  @keyframes notifSlideIn {
    from { transform: translateX(100px); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }
  #lock-screen .ls-notif .ls-notif-title {
    font-weight: 600; color: #fff; margin-bottom: 4px;
  }

  /* ============================================================
     App Root - 主容器
     ============================================================ */
  #app-root {
    display: block; width: 100vw; height: 100vh;
    overflow: hidden; position: relative;
    background: var(--sys-bg, #1a1a2e);
  }

  /* ============================================================
     桌面图标 (内联渲染，不依赖外部 .ts)
     ============================================================ */
  .desktop-icon {
    position: absolute; display: flex; flex-direction: column;
    align-items: center; width: 80px; padding: 8px 4px;
    border-radius: 8px; cursor: pointer;
    font-family: 'Segoe UI', system-ui, sans-serif;
    font-size: 12px; color: #fff; text-align: center;
    text-shadow: 0 1px 3px rgba(0,0,0,0.8);
    transition: background 0.1s;
    user-select: none;
  }
  .desktop-icon:hover { background: rgba(255,255,255,0.1); }
  .desktop-icon:active { background: rgba(255,255,255,0.05); }
  .desktop-icon.selected { background: rgba(102,126,234,0.3); }
  .desktop-icon .dicon-svg {
    width: 48px; height: 48px; margin-bottom: 4px;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
  }
  .desktop-icon .dicon-label {
    word-break: break-word; line-height: 1.3;
    pointer-events: none;
  }

  /* ============================================================
     任务栏
     ============================================================ */
  #taskbar {
    position: absolute; bottom: 0; left: 0; width: 100%;
    height: 48px; z-index: 1000;
    background: rgba(20, 20, 35, 0.75);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    border-top: 1px solid rgba(255,255,255,0.08);
    display: flex; align-items: center;
    font-family: 'Segoe UI', system-ui, sans-serif;
    color: #e8eaed;
  }
  #taskbar .tb-left {
    display: flex; align-items: center; height: 100%;
    padding: 0 4px;
  }
  #taskbar .tb-start-btn {
    width: 44px; height: 44px; display: flex; align-items: center;
    justify-content: center; border-radius: 8px; cursor: pointer;
    transition: background 0.15s;
  }
  #taskbar .tb-start-btn:hover { background: rgba(255,255,255,0.1); }
  #taskbar .tb-start-btn:active { background: rgba(255,255,255,0.05); }
  #taskbar .tb-center {
    flex: 1; display: flex; align-items: center; height: 100%;
    padding: 0 4px; gap: 2px; overflow-x: auto;
  }
  #taskbar .tb-win-btn {
    height: 40px; min-width: 40px; max-width: 200px;
    display: flex; align-items: center; padding: 0 12px;
    border-radius: 6px; cursor: pointer; gap: 8px;
    transition: background 0.15s; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis;
    font-size: 12px;
  }
  #taskbar .tb-win-btn:hover { background: rgba(255,255,255,0.08); }
  #taskbar .tb-win-btn.active { background: rgba(255,255,255,0.12); }
  #taskbar .tb-win-btn .tb-win-icon {
    width: 20px; height: 20px; border-radius: 4px;
    flex-shrink: 0; display: flex; align-items: center;
    justify-content: center; font-size: 14px;
  }
  #taskbar .tb-right {
    display: flex; align-items: center; height: 100%;
    padding: 0 8px; gap: 4px;
  }
  #taskbar .tb-tray-btn {
    width: 36px; height: 36px; display: flex; align-items: center;
    justify-content: center; border-radius: 6px; cursor: pointer;
    font-size: 14px; transition: background 0.15s;
  }
  #taskbar .tb-tray-btn:hover { background: rgba(255,255,255,0.08); }
  #taskbar .tb-clock {
    font-size: 12px; padding: 0 8px; cursor: pointer;
    display: flex; flex-direction: column; align-items: flex-end;
    line-height: 1.3;
  }
  #taskbar .tb-clock .tb-clock-time { font-weight: 500; }
  #taskbar .tb-clock .tb-clock-date { font-size: 10px; color: #999; }

  /* ============================================================
     开始菜单
     ============================================================ */
  #start-menu {
    position: absolute; bottom: 52px; left: 8px;
    z-index: 2000; display: none;
    width: 360px; max-height: 560px;
    background: rgba(30, 30, 50, 0.92);
    backdrop-filter: blur(30px);
    -webkit-backdrop-filter: blur(30px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px; overflow: hidden;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    font-family: 'Segoe UI', system-ui, sans-serif;
    animation: menuSlideUp 0.2s ease;
  }
  @keyframes menuSlideUp {
    from { transform: translateY(10px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  #start-menu .sm-search {
    padding: 16px;
  }
  #start-menu .sm-search input {
    width: 100%; padding: 10px 14px; border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.06); color: #fff;
    font-size: 14px; outline: none;
  }
  #start-menu .sm-search input::placeholder { color: #777; }
  #start-menu .sm-apps {
    padding: 0 8px 8px; max-height: 320px; overflow-y: auto;
  }
  #start-menu .sm-app-item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 12px; border-radius: 8px; cursor: pointer;
    font-size: 14px; color: #e0e0e0; transition: background 0.1s;
  }
  #start-menu .sm-app-item:hover { background: rgba(255,255,255,0.08); }
  #start-menu .sm-app-item .sm-app-icon {
    width: 32px; height: 32px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }
  #start-menu .sm-footer {
    display: flex; align-items: center; padding: 12px 16px;
    border-top: 1px solid rgba(255,255,255,0.06); gap: 8px;
  }
  #start-menu .sm-user {
    flex: 1; display: flex; align-items: center; gap: 10px;
  }
  #start-menu .sm-avatar {
    width: 32px; height: 32px; border-radius: 50%;
    background: linear-gradient(135deg, #667eea, #764ba2);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; color: #fff; font-weight: 600;
  }
  #start-menu .sm-username { font-size: 13px; color: #ccc; }
  #start-menu .sm-power-btn {
    width: 36px; height: 36px; border-radius: 6px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; color: #f28b82; transition: background 0.15s;
  }
  #start-menu .sm-power-btn:hover { background: rgba(242,139,130,0.15); }

  /* ============================================================
     右键菜单
     ============================================================ */
  #context-menu {
    position: fixed; z-index: 5000; display: none;
    min-width: 200px; padding: 4px;
    background: rgba(30, 30, 50, 0.95);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px; box-shadow: 0 4px 24px rgba(0,0,0,0.5);
    font-family: 'Segoe UI', system-ui, sans-serif;
    font-size: 13px;
  }
  #context-menu .cm-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 12px; border-radius: 6px; cursor: pointer;
    color: #e0e0e0; transition: background 0.1s;
  }
  #context-menu .cm-item:hover { background: rgba(102,126,234,0.3); }
  #context-menu .cm-item .cm-shortcut { color: #777; font-size: 11px; margin-left: 24px; }
  #context-menu .cm-separator {
    height: 1px; background: rgba(255,255,255,0.06); margin: 4px 8px;
  }

  /* ============================================================
     终端窗口
     ============================================================ */
  #terminal-window {
    position: absolute; display: none;
    width: 700px; height: 420px;
    background: #0c0c0c; border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px; z-index: 100;
    box-shadow: 0 8px 40px rgba(0,0,0,0.6);
    font-family: 'Courier New', monospace;
    overflow: hidden;
    flex-direction: column;
  }
  #terminal-window .tw-titlebar {
    display: flex; align-items: center; height: 36px;
    background: #161616; padding: 0 12px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    cursor: move;
  }
  #terminal-window .tw-title {
    flex: 1; font-size: 13px; color: #aaa; font-family: 'Segoe UI', sans-serif;
  }
  #terminal-window .tw-ctrl {
    display: flex; gap: 6px;
  }
  #terminal-window .tw-ctrl-btn {
    width: 28px; height: 28px; border-radius: 6px; border: none;
    cursor: pointer; font-size: 14px; display: flex; align-items: center;
    justify-content: center; background: transparent; color: #999;
  }
  #terminal-window .tw-ctrl-btn:hover { background: rgba(255,255,255,0.1); }
  #terminal-window .tw-ctrl-btn.close:hover { background: #e81123; color: #fff; }
  #terminal-window .tw-output {
    flex: 1; overflow-y: auto; padding: 12px;
    font-size: 14px; line-height: 1.5; color: #00cc00;
    white-space: pre-wrap; word-break: break-all;
  }
  #terminal-window .tw-output .tw-line { margin: 0; }
  #terminal-window .tw-output .tw-line.error { color: #f28b82; }
  #terminal-window .tw-output .tw-line.info { color: #8ab4f8; }
  #terminal-window .tw-input-line {
    display: flex; align-items: center; padding: 8px 12px;
    border-top: 1px solid rgba(255,255,255,0.06);
  }
  #terminal-window .tw-prompt {
    color: #00ff88; font-weight: bold; font-size: 14px;
    white-space: nowrap; margin-right: 8px;
  }
  #terminal-window .tw-input {
    flex: 1; background: transparent; border: none; outline: none;
    color: #e0e0e0; font-size: 14px; font-family: 'Courier New', monospace;
    caret-color: #00ff88;
  }
  #terminal-window .tw-input::placeholder { color: #444; }

  /* ============================================================
     应用窗口 (通用)
     ============================================================ */
  .app-window {
    position: absolute; border-radius: 12px; overflow: hidden;
    background: rgba(20, 20, 35, 0.95);
    border: 1px solid rgba(255,255,255,0.1);
    box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    z-index: 50; display: none; flex-direction: column;
    font-family: 'Segoe UI', system-ui, sans-serif;
    resize: both; min-width: 300px; min-height: 200px;
  }
  .app-window .aw-titlebar {
    display: flex; align-items: center; height: 36px;
    background: rgba(0,0,0,0.3); padding: 0 12px;
    cursor: move;
  }
  .app-window .aw-title { flex: 1; font-size: 13px; color: #ccc; }
  .app-window .aw-ctrl { display: flex; gap: 4px; }
  .app-window .aw-ctrl-btn {
    width: 28px; height: 28px; border-radius: 6px; border: none;
    cursor: pointer; font-size: 14px; background: transparent; color: #999;
    display: flex; align-items: center; justify-content: center;
  }
  .app-window .aw-ctrl-btn:hover { background: rgba(255,255,255,0.1); }
  .app-window .aw-ctrl-btn.close:hover { background: #e81123; color: #fff; }
  .app-window .aw-body {
    flex: 1; overflow: auto; padding: 16px; color: #e0e0e0;
  }

  /* ============================================================
     响应式
     ============================================================ */
  @media (max-width: 768px) {
    /* 锁屏 */
    #lock-screen .ls-time { font-size: clamp(40px, 12vw, 60px); }
    #lock-screen .ls-date { font-size: 14px; margin-bottom: 40px; }
    #lock-screen .ls-avatar { width: 56px; height: 56px; font-size: 22px; }
    #lock-screen .ls-username { font-size: 14px; }
    #lock-screen .ls-user { margin-bottom: 32px; }
    #lock-screen .ls-slider { width: 260px; max-width: 80vw; }
    #lock-screen .ls-hint { font-size: 10px; }
    #lock-screen .ls-notifications {
      bottom: 100px; right: 12px; left: 12px;
      max-width: none; font-size: 12px;
    }
    /* 桌面图标缩小 */
    #desktop-icons { bottom: 44px; }
    .desktop-icon { width: 68px; font-size: 11px; padding: 6px 2px; }
    .desktop-icon .dicon-svg { width: 40px; height: 40px; font-size: 28px !important; }
    /* 任务栏 */
    #taskbar { height: 44px; }
    #taskbar .tb-win-btn { font-size: 11px; padding: 0 8px; min-width: 32px; }
    #taskbar .tb-clock { font-size: 11px; }
    #taskbar .tb-clock .tb-clock-date { font-size: 9px; }
    /* 开始菜单 */
    #start-menu { width: 280px; max-height: 420px; left: 4px; }
    #start-menu .sm-app-item { font-size: 13px; padding: 8px 10px; }
    /* 终端 */
    #terminal-window { width: 100vw; height: 100vh; border-radius: 0; left: 0 !important; top: 0 !important; }
    /* 应用窗口 */
    .app-window { width: 100vw !important; height: calc(100vh - 44px) !important; left: 0 !important; top: 0 !important; border-radius: 0; min-width: auto; min-height: auto; }
    /* 右键菜单 */
    #context-menu { min-width: 180px; font-size: 12px; }
  }

  @media (max-width: 400px) {
    #lock-screen .ls-time { font-size: clamp(32px, 10vw, 48px); }
    #lock-screen .ls-date { font-size: 12px; margin-bottom: 28px; }
    #lock-screen .ls-avatar { width: 44px; height: 44px; font-size: 18px; }
    #lock-screen .ls-username { font-size: 12px; }
    #lock-screen .ls-user { margin-bottom: 24px; }
    #lock-screen .ls-slider { width: 220px; height: 42px; }
    #lock-screen .ls-slider-knob { width: 34px; height: 34px; top: 4px; left: 4px; }
    #lock-screen .ls-slider-text { font-size: 12px; }
    #lock-screen .ls-hint { font-size: 9px; margin-top: 12px; }
    #lock-screen .ls-notifications { bottom: 80px; right: 8px; left: 8px; }
    #lock-screen .ls-notif { padding: 10px 12px; font-size: 11px; }
    /* 桌面 */
    #desktop-icons { bottom: 40px; }
    .desktop-icon { width: 60px; font-size: 10px; padding: 4px 2px; }
    .desktop-icon .dicon-svg { width: 34px; height: 34px; font-size: 24px !important; }
    /* 任务栏 */
    #taskbar { height: 40px; }
    #taskbar .tb-start-btn { width: 36px; height: 36px; }
    #taskbar .tb-win-btn { font-size: 10px; padding: 0 6px; min-width: 28px; max-width: 100px; }
    #taskbar .tb-tray-btn { width: 28px; height: 28px; font-size: 12px; }
    #taskbar .tb-clock { font-size: 10px; padding: 0 4px; }
    #taskbar .tb-clock .tb-clock-date { font-size: 8px; }
    /* 开始菜单 */
    #start-menu { width: 240px; max-height: 360px; left: 2px; }
    #start-menu .sm-search input { font-size: 13px; padding: 8px 12px; }
    #start-menu .sm-app-item { font-size: 12px; padding: 6px 8px; gap: 8px; }
  }
</style>
</head>
<body>

<!-- ============================================================ -->
<!-- BIOS Boot Screen -->
<!-- ============================================================ -->
<div id="boot-screen">
  <div class="boot-logo">WebNT 内核</div>
  <div class="boot-subtitle">HTML5 混合微内核操作系统 v1.0.0</div>
  <div class="boot-log" id="boot-log"></div>
  <div class="boot-progress"><div class="boot-progress-bar" id="boot-progress-bar"></div></div>
  <div class="boot-status" id="boot-status">正在初始化...</div>
</div>

<!-- ============================================================ -->
<!-- Lock Screen - 滑动解锁界面 -->
<!-- ============================================================ -->
<div id="lock-screen">
  <div class="ls-bg-blur"></div>

<script type="module">
// ===================================================================
// 内核模块内联实现
// ===================================================================
class GlobalDisplayAPI {
  constructor() { this.initialized = false; }
  static get instance() { if(!this._i) this._i=new GlobalDisplayAPI(); return this._i; }
  initialize(c,o={}) {
    if(this.initialized) return;
    this.initialized = true;
    c.width = (o.width||window.innerWidth) * (o.dpr||1);
    c.height = (o.height||window.innerHeight) * (o.dpr||1);
    c.style.width = (o.width||window.innerWidth)+'px';
    c.style.height = (o.height||window.innerHeight)+'px';
  }
}

class WindowManager {
  constructor() { this.wins=new Map(); this.order=[]; this.focus=null; this.nid=1; this.ls={}; }
  static get instance() { if(!this._i) this._i=new WindowManager(); return this._i; }
  createWindow(o={}) {
    const id='win_'+this.nid++;
    const w={id,title:o.title||'Window',w:o.width||600,h:o.height||400,x:o.x??100,y:o.y??100,state:'NORMAL',appId:o.appId||null,minimized:false};
    this.wins.set(id,w); this.order.push(id); this.focus=id;
    this._emit('window-created',w); return id;
  }
  destroyWindow(id) { this.wins.delete(id); this.order=this.order.filter(w=>w!==id); if(this.focus===id) this.focus=this.order[this.order.length-1]||null; this._emit('window-destroyed',{windowId:id}); }
  setFocus(id) { if(this.wins.has(id)) { this.focus=id; this._emit('window-focused',{windowId:id}); } }
  bringToFront(id) { if(!this.wins.has(id)) return; this.order=this.order.filter(w=>w!==id); this.order.push(id); this.setFocus(id); }
  getWindowList() { return [...this.wins.values()]; }
  on(e,cb) { if(!this.ls[e]) this.ls[e]=[]; this.ls[e].push(cb); }
  _emit(e,d) { (this.ls[e]||[]).forEach(cb=>{try{cb(d)}catch(e){}}); }
}

class SysCallBridge {
  constructor() { this.h={}; this._reg(); }
  static get instance() { if(!this._i) this._i=new SysCallBridge(); return this._i; }
  _reg() {
    this.h.NtGetSystemInfo=()=>({hostname:'WebNT-Kernel',version:'1.0.0',platform:navigator.platform,cpuCores:navigator.hardwareConcurrency||1,memory:navigator.deviceMemory||4,uptime:Math.floor(performance.now()/1000)});
    this.h.NtShutdown=()=>({success:true});
    this.h.NtReboot=()=>({success:true});
  }
  async call(name,...args) { const h=this.h[name]; if(!h) throw new Error(`SysCall '${name}' not found`); return h(args[0]); }
}

class TerminalCommandRegistry {
  constructor() { this.cmds=new Map(); this._init(); }
  static get instance() { if(!this._i) this._i=new TerminalCommandRegistry(); return this._i; }
  _init() {
    const add=(name,desc,cat,fn)=>this.cmds.set(name,{name,desc,cat,fn});
    add('help','显示可用命令','系统',(a,o)=>{let t='可用命令:\n\n';this.cmds.forEach((c,n)=>{t+=`  ${n.padEnd(12)}${c.desc}\n`;});return t;});
    add('ver','内核版本','系统',()=>'WebNT 内核 v1.0.0');
    add('sysinfo','系统信息','系统',()=>`WebNT 内核 v1.0.0\nCPU: ${navigator.hardwareConcurrency||'?'} 核\n内存: ${navigator.deviceMemory||'?'} GB\n平台: ${navigator.platform}\nGPU: ${navigator.gpu?'WebGPU':'Canvas2D'}\n运行时间: ${Math.floor(performance.now()/1000)}秒`);
    add('ps','进程列表','进程',()=>'  PID:1  系统  [运行中]');
    add('ls','目录列表','文件',(a)=>(a.length?`目录: ${a[0]}`:'/')+'\n  下载/  文档/  桌面/');
    add('pwd','当前目录','文件',()=>'/home/webnt');
    add('cd','切换目录','文件',(a)=>`已切换到: ${a[0]||'/'}`);
    add('clear','清屏','工具',()=>'__CLEAR__');
    add('echo','输出文本','工具',(a)=>a.join(' '));
    add('date','显示日期','工具',()=>new Date().toLocaleString('zh-CN'));
    add('uptime','运行时间','系统',()=>`${Math.floor(performance.now()/1000)} 秒`);
    add('whoami','当前用户','系统',()=>'管理员');
    add('shutdown','关机','系统',()=>{setTimeout(()=>location.reload(),500);return'正在关机...';});
    add('reboot','重启','系统',()=>{location.reload();return'正在重启...';});
    add('netstat','网络状态','网络',()=>'活动连接: 0');
    add('driver','驱动管理','设备',()=>'display.webgpu [正常]\nfile.fs [正常]\nnet.stream [正常]\nterminal.cmd [正常]');
    add('display','显示信息','设备',()=>`${window.innerWidth}x${window.innerHeight} @ ${window.devicePixelRatio}x`);
    add('tree','目录树','文件',()=>'/\n├── home/\n│   └── webnt/\n├── 系统/\n└── 临时/');
    add('grep','文本搜索','工具',(a)=>`grep: 未找到 "${a.join(' ')}"`);
    add('history','命令历史','工具',()=>'');
    add('dns','DNS查询','网络',(a)=>`${a[0]}: 127.0.0.1`);
    add('ping','网络测试','网络',(a)=>`PING ${a[0]} (127.0.0.1): 56 字节\n64 字节: seq=0 ttl=64 时间=0.5ms`);
  }
  getCommand(n) { return this.cmds.get(n)||null; }
  getAllCommands() { return [...this.cmds.keys()]; }
}

class TerminalExecutor {
  constructor() { this.history=[]; }
  static get instance() { if(!this._i) this._i=new TerminalExecutor(); return this._i; }
  async execute(line) {
    const t=line.trim(); if(!t) return {output:'',exitCode:0};
    this.history.push(t);
    const parts=t.split(/\s+/), name=parts[0].toLowerCase(), args=parts.slice(1);
    const cmd=TerminalCommandRegistry.instance.getCommand(name);
    if(!cmd) return {output:`命令未找到: ${name}\n输入 'help' 查看可用命令。`,exitCode:127};
    try {
      const r=cmd.fn(args,{});
      if(r==='__CLEAR__') return {output:'',exitCode:0,clear:true};
      return {output:String(r||''),exitCode:0};
    } catch(e) { return {output:`Error: ${e.message}`,exitCode:1}; }
  }
  getHistory() { return [...this.history]; }
}

window.__WebNT__ = { GlobalDisplayAPI, WindowManager, SysCallBridge, TerminalCommandRegistry, TerminalExecutor };

// 计算器全局辅助函数
window.__calcState = {};
window.__calcInput = function(idSuffix, val) {
  const state = window.__calcState[idSuffix] = window.__calcState[idSuffix] || { expr: '', result: '0' };
  state.expr += val;
  state.result = state.expr;
  const exprEl = document.getElementById('calc-expr-' + idSuffix);
  const resultEl = document.getElementById('calc-result-' + idSuffix);
  if (exprEl) exprEl.textContent = state.expr;
  if (resultEl) resultEl.textContent = state.expr || '0';
};
window.__calcEval = function(idSuffix) {
  const state = window.__calcState[idSuffix] = window.__calcState[idSuffix] || { expr: '', result: '0' };
  const exprEl = document.getElementById('calc-expr-' + idSuffix);
  const resultEl = document.getElementById('calc-result-' + idSuffix);
  try {
    const r = Function('"use strict"; return (' + (state.expr || '0') + ')')();
    state.result = String(r);
    if (exprEl) exprEl.textContent = state.expr + ' =';
    if (resultEl) resultEl.textContent = r;
    state.expr = String(r);
  } catch(e) {
    if (resultEl) resultEl.textContent = 'Error';
  }
};
window.__calcClear = function(idSuffix) {
  window.__calcState[idSuffix] = { expr: '', result: '0' };
  const exprEl = document.getElementById('calc-expr-' + idSuffix);
  const resultEl = document.getElementById('calc-result-' + idSuffix);
  if (exprEl) exprEl.textContent = '';
  if (resultEl) resultEl.textContent = '0';
};

function updateAllClocks() {

  // 锁屏时钟

}

// ===================================================================
// 锁屏滑动解锁
// ===================================================================
let lsDragging=false, lsStartX=0, lsKnobX=0;
const lsSlider=document.getElementById('ls-slider');
const lsKnob=document.getElementById('ls-knob');

function getMaxSlide() { if(!lsSlider) return 256; const kw=lsKnob?lsKnob.offsetWidth:40; return lsSlider.offsetWidth-kw-4; }

function resetKnob() { if(lsKnob) lsKnob.style.left='4px'; }

function unlockDesktop() {
  lockScreen.classList.add('unlocked');
  setTimeout(() => { lockScreen.style.display='none'; }, 500);
}

lsSlider.addEventListener('pointerdown', e => {
  lsDragging=true; lsStartX=e.clientX; lsKnobX=4;
  lsSlider.classList.add('dragging');
  e.preventDefault();
});
// 绑定到 document 确保手指移出滑块后仍能追踪
document.addEventListener('pointermove', e => {
  if(!lsDragging) return;
  const dx=e.clientX-lsStartX;
  const maxSlide=getMaxSlide();
  lsKnobX=Math.max(4, Math.min(maxSlide, 4+dx));
  lsKnob.style.left=lsKnobX+'px';
  if(lsKnobX>=maxSlide-10) { lsDragging=false; lsSlider.classList.remove('dragging'); unlockDesktop(); }
});
document.addEventListener('pointerup', () => {
  if(!lsDragging) return;
  lsDragging=false; lsSlider.classList.remove('dragging');
  const maxSlide=getMaxSlide();
  if(lsKnobX<maxSlide-10) resetKnob();
});
// 触摸取消时也重置
document.addEventListener('pointercancel', () => {
  if(lsDragging) { lsDragging=false; lsSlider.classList.remove('dragging'); resetKnob(); }
});

// 按任意键解锁
document.addEventListener('keydown', function unlockByKey(e) {
  if(lockScreen.style.display!=='none') { unlockDesktop(); }
}, {once:false});

function addDesktopIcon(id, name, icon, color, appId) {
  if(!desktopApps.find(d => d.id === id)) {
    desktopApps.push({ id, name, icon, color, appId });
  }
}

function renderDesktopIcons() {
  desktopIcons.innerHTML='';
  // Load installed apps from localStorage
  let installedApps = [];
  try { installedApps = JSON.parse(localStorage.getItem('webnt_installed_apps') || '[]'); }
  catch(e) {}
  const allApps = [...desktopApps];
  installedApps.forEach(a => {
    if(!allApps.find(d => d.id === a.id)) {
      allApps.push({ id:a.id, name:a.name, icon:a.icon, color:a.color, appId:a.id });
    }
  });
  allApps.forEach((app, i) => {
    const icon=document.createElement('div');
    icon.className='desktop-icon';
    icon.style.left=(20+(i%4)*100)+'px';
    icon.style.top=(20+Math.floor(i/4)*100)+'px';
    icon.dataset.appId=app.id;
    icon.innerHTML=`<div class="dicon-svg" style="font-size:36px;color:${app.color}">${app.icon}</div><div class="dicon-label">${app.name}</div>`;
    icon.addEventListener('click', (e) => {
      e.stopPropagation();
      if(selectedIcon) selectedIcon.classList.remove('selected');
      icon.classList.add('selected');
      selectedIcon=icon;
    });
    icon.addEventListener('dblclick', (e) => {
      e.stopPropagation();
      launchApp(app.appId);
    });
    icon.addEventListener('contextmenu', (e) => {
      e.preventDefault(); e.stopPropagation();
      showContextMenu(e.clientX, e.clientY, [
        {label:'打开', action:()=>launchApp(app.appId)},
        {label:'在终端中打开', action:()=>{launchApp('terminal'); writeTerminal(`正在打开 ${app.name}...\n`);}},
        {separator:true},
        {label:'固定到开始', action:()=>{}},
        {label:'属性', action:()=>{}},
      ]);
    });
    // 拖拽
    let dragging=false, sx=0, sy=0, ox=0, oy=0;
    icon.addEventListener('pointerdown', ed => {
      if(ed.button!==0) return;
      dragging=true; sx=ed.clientX; sy=ed.clientY;
      ox=icon.offsetLeft; oy=icon.offsetTop;
      icon.setPointerCapture(ed.pointerId);
    });
    icon.addEventListener('pointermove', ed => {
      if(!dragging) return;
      icon.style.left=(ox+ed.clientX-sx)+'px';
      icon.style.top=(oy+ed.clientY-sy)+'px';
    });
    icon.addEventListener('pointerup', () => { dragging=false; });
    desktopIcons.appendChild(icon);
  });
}
renderDesktopIcons();

function showContextMenu(x, y, items) {
  contextMenu.innerHTML='';
  items.forEach(item => {
    if(item.separator) { const s=document.createElement('div'); s.className='cm-separator'; contextMenu.appendChild(s); return; }
    const el=document.createElement('div');
    el.className='cm-item';
    el.innerHTML=`<span>${item.label}</span>${item.shortcut?`<span class="cm-shortcut">${item.shortcut}</span>`:''}`;
    el.addEventListener('click', () => { if(item.action) item.action(); hideContextMenu(); });
    contextMenu.appendChild(el);
  });
  contextMenu.style.display='block';
  contextMenu.style.left=Math.min(x, window.innerWidth-220)+'px';
  contextMenu.style.top=Math.min(y, window.innerHeight-contextMenu.offsetHeight-10)+'px';
}
function hideContextMenu() { contextMenu.style.display='none'; }
document.addEventListener('click', () => hideContextMenu());

  apps.forEach(app => {

    el.className='sm-app-item';
    el.innerHTML=`<span class="sm-app-icon" style="background:${app.color}22;color:${app.color}">${app.icon}</span>${app.name}`;

  });

renderStartMenu();

function toggleStartMenu() {
  startMenu.style.display=(startMenu.style.display==='block')?'none':'block';
}
document.getElementById('tb-start-btn').addEventListener('click', e => { e.stopPropagation(); toggleStartMenu(); });
document.getElementById('sm-shutdown').addEventListener('click', () => {
  if(confirm('确定要关闭 WebNT 吗？')) location.reload();
});

// 搜索过滤
document.getElementById('sm-search-input').addEventListener('input', e => {
  const q=e.target.value.toLowerCase();
  smAppList.querySelectorAll('.sm-app-item').forEach(el => {
    el.style.display=el.textContent.toLowerCase().includes(q)?'flex':'none';
  });
});

// 点击其他地方关闭开始菜单
document.addEventListener('click', e => {
  if(!startMenu.contains(e.target) && e.target.id!=='tb-start-btn' && !document.getElementById('tb-start-btn').contains(e.target)) {
    startMenu.style.display='none';
  }
});

// ===================================================================
// 任务栏窗口按钮
// ===================================================================
function updateTaskbarWindowButtons() {
  const list=document.getElementById('tb-window-list');
  const wins=WindowManager.instance.getWindowList();
  list.innerHTML='';
  wins.forEach(w => {
    const btn=document.createElement('div');
    btn.className='tb-win-btn'+(WindowManager.instance.focus===w.id?' active':'');
    btn.innerHTML=`<span class="tb-win-icon">${w.icon||'\ud83d\uddd1\ufe0f'}</span><span>${w.title}</span>`;
    btn.addEventListener('click', () => {
      WindowManager.instance.bringToFront(w.id);
      if(w.appId==='terminal') { tw.style.display='flex'; tw.style.zIndex=100; }
    });
    list.appendChild(btn);
  });
}

          canvas.width = wrap.clientWidth;

let appWinCounter=0;
function showAppWindow(title, icon, bodyHTML) {
  const id='appwin_'+ (++appWinCounter);
  const win=document.createElement('div');
  win.className='app-window';
  win.id=id;
  win.style.display='flex';
  win.style.width='500px'; win.style.height='400px';
  win.style.left=(200+appWinCounter*30)+'px';
  win.style.top=(60+appWinCounter*30)+'px';
  win.style.zIndex=50+appWinCounter;
  win.innerHTML=`
    <div class="aw-titlebar" data-winid="${id}">
      <span style="margin-right:8px">${icon}</span>
      <span class="aw-title">${title}</span>
      <div class="aw-ctrl">
        <button class="aw-ctrl-btn" onclick="this.closest('.app-window').style.display='none'">&#x2014;</button>
        <button class="aw-ctrl-btn" onclick="const w=this.closest('.app-window');w.style.width='100vw';w.style.height='calc(100vh - 48px)';w.style.left='0';w.style.top='0'">&#x25a1;</button>
        <button class="aw-ctrl-btn close" onclick="this.closest('.app-window').remove();updateTaskbarWindowButtons()">&#x2715;</button>
      </div>
    </div>
    <div class="aw-body">${bodyHTML}</div>
  `;
  // 拖拽
  let dragging=false, sx=0, sy=0, ox=0, oy=0;
  win.querySelector('.aw-titlebar').addEventListener('pointerdown', e => {
    dragging=true; sx=e.clientX; sy=e.clientY;
    ox=win.offsetLeft; oy=win.offsetTop;
    win.setPointerCapture(e.pointerId);
  });
  win.addEventListener('pointermove', e => {
    if(!dragging) return;
    win.style.left=(ox+e.clientX-sx)+'px';
    win.style.top=(oy+e.clientY-sy)+'px';
  });
  win.addEventListener('pointerup', () => { dragging=false; });
  // 聚焦
  win.addEventListener('pointerdown', () => {
    document.querySelectorAll('.app-window').forEach(w=>w.style.zIndex=Math.min(50,w.style.zIndex||50));
    win.style.zIndex=100;
  });
  appRoot.appendChild(win);
  WindowManager.instance.createWindow({title,appId:id,icon});
  updateTaskbarWindowButtons();
}

// ===================================================================
// 终端
// ===================================================================
const twHistory=[];
let twHistoryIdx=-1;

function writeTerminal(text, cls='') {
  const lines=text.split('\n');
  lines.forEach(line => {
    const l=document.createElement('div');
    l.className='tw-line'+(cls?' '+cls:'');
    l.textContent=line||' ';
    twOutput.appendChild(l);
  });
  twOutput.scrollTop=twOutput.scrollHeight;
}

function writeWelcome() {
  twOutput.innerHTML='';
  writeTerminal('WebNT 内核 v1.0.0 [HTML5 混合微内核]', 'info');
  writeTerminal('输入 "help" 查看可用命令。');
  writeTerminal('');
}

writeWelcome();

twInput.addEventListener('keydown', async e => {
  if(e.key==='Enter') {
    const cmd=twInput.value.trim();
    if(!cmd) return;
    writeTerminal(`webnt@kernel:~$ ${cmd}`, '');
    twInput.value='';
    if(cmd!=='clear') twHistory.push(cmd);
    twHistoryIdx=twHistory.length;
    const result=await TerminalExecutor.instance.execute(cmd);
    if(result.clear) { twOutput.innerHTML=''; return; }
    writeTerminal(result.output, result.exitCode!==0?'error':'');
  } else if(e.key==='ArrowUp') {
    e.preventDefault();
    if(twHistoryIdx>0) { twHistoryIdx--; twInput.value=twHistory[twHistoryIdx]||''; }
  } else if(e.key==='ArrowDown') {
    e.preventDefault();
    if(twHistoryIdx<twHistory.length-1) { twHistoryIdx++; twInput.value=twHistory[twHistoryIdx]||''; }
    else { twHistoryIdx=twHistory.length; twInput.value=''; }
  } else if(e.key==='Tab') {
    e.preventDefault();
    const input=twInput.value.trim().split(/\s+/)[0];
    const cmds=TerminalCommandRegistry.instance.getAllCommands();
    const matches=cmds.filter(c=>c.startsWith(input));
    if(matches.length===1) twInput.value=matches[0]+' ';
    else if(matches.length>1) writeTerminal(matches.join('  '),'');
  }
});

// 终端按钮
document.getElementById('tb-terminal-btn').addEventListener('click', () => launchApp('terminal'));
document.getElementById('tw-close').addEventListener('click', () => tw.style.display='none');
document.getElementById('tw-minimize').addEventListener('click', () => tw.style.display='none');
document.getElementById('tw-maximize').addEventListener('click', () => {
  if(tw.style.width==='100vw') {
    tw.style.width='700px'; tw.style.height='420px'; tw.style.left='150px'; tw.style.top='80px';
  } else {
    tw.style.width='100vw'; tw.style.height='calc(100vh - 48px)'; tw.style.left='0'; tw.style.top='0';
  }
});

// 终端拖拽
let twDragging=false, twSx=0, twSy=0, twOx=0, twOy=0;
document.getElementById('tw-titlebar').addEventListener('pointerdown', e => {
  twDragging=true; twSx=e.clientX; twSy=e.clientY;
  twOx=tw.offsetLeft; twOy=tw.offsetTop;
  tw.setPointerCapture(e.pointerId);
});
tw.addEventListener('pointermove', e => {
  if(!twDragging) return;
  tw.style.left=(twOx+e.clientX-twSx)+'px';
  tw.style.top=(twOy+e.clientY-twSy)+'px';
});
tw.addEventListener('pointerup', () => { twDragging=false; });

// ===================================================================
// 启动流程
// ===================================================================
async function boot() {
  bootLogLine('WebNT 内核 v1.0.0 正在启动...', 'info');
  bootLogLine('Copyright (c) 2026 WebNT 项目', '');
  bootLogLine('', '');

  // Phase 0: 硬件检测
  bootProgress(10, '阶段 0: 硬件检测');
  bootLogLine('阶段 0: 硬件检测', 'info');
  bootLogLine(`  CPU: ${navigator.hardwareConcurrency||'?'} 核`, '');
  bootLogLine(`  内存: ${navigator.deviceMemory||'?'} GB`, '');
  bootLogLine(`  WebGPU: ${navigator.gpu?'可用':'不可用'}`, navigator.gpu?'ok':'warn');
  bootLogLine('', '');
  await new Promise(r=>setTimeout(r,300));

  // Phase 1: 初始化内核
  bootProgress(35, '阶段 1: 内核初始化');
  bootLogLine('阶段 1: 内核初始化', 'info');
  bootLogLine('  [正常] 对象管理器已初始化', 'ok');
  bootLogLine('  [正常] 句柄表就绪', 'ok');
  bootLogLine('  [正常] SMP调度器已启动', 'ok');
  bootLogLine('  [正常] 中断控制器在线', 'ok');
  bootLogLine('', '');
  await new Promise(r=>setTimeout(r,200));

  // Phase 2: 加载驱动
  bootProgress(55, '阶段 2: 加载驱动');
  bootLogLine('阶段 2: 加载驱动', 'info');
  bootLogLine('  [正常] 显示驱动.WebGPU', 'ok');
  bootLogLine('  [正常] 文件驱动.FS', 'ok');
  bootLogLine('  [正常] 网络驱动.Stream', 'ok');
  bootLogLine('  [正常] 终端驱动.Cmd', 'ok');
  bootLogLine('  [正常] 音频驱动.WA', 'ok');
  bootLogLine('', '');
  await new Promise(r=>setTimeout(r,200));

  // Phase 3: 启动用户态
  bootProgress(75, '阶段 3: 启动用户会话');
  bootLogLine('阶段 3: 启动用户会话', 'info');
  bootLogLine('  [正常] 会话管理器已启动', 'ok');
  bootLogLine('  [正常] 桌面子系统已加载', 'ok');
  bootLogLine('  [正常] WinHTML 显示管线就绪', 'ok');
  bootLogLine('', '');
  await new Promise(r=>setTimeout(r,200));

  // Phase 4: 完成
  bootProgress(100, '系统就绪');
  bootLogLine('', '');
  bootLogLine('========================================', '');
  bootLogLine('  WebNT 内核 v1.0.0 就绪', 'ok');
  bootLogLine('  所有系统运行正常', 'ok');
  bootLogLine('========================================', '');

  await new Promise(r=>setTimeout(r,400));

  // 隐藏 BIOS 启动画面，显示锁屏
  bootScreen.classList.add('hidden');
  appRoot.style.display='block';
  updateAllClocks();

  setTimeout(() => { if(bootScreen.parentNode) bootScreen.remove(); }, 600);

  console.log('%c WebNT 内核 v1.0.0 就绪 %c| %c滑动解锁',
    'color:#00ff88;font-size:16px;', '', 'color:#aaa;');
}

boot().catch(err => {
  bootLogLine(`严重错误: ${err.message}`, 'err');
  console.error(err);
  bootScreen.classList.add('hidden');
  unlockDesktop();
});
</script>
