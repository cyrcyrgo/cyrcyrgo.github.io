<!-- 计算器全局辅助函数 -->
<!-- ============================================================ -->
<script>
window.__calcState = {};
window.__calcInput = function(idSuffix, val) {
  const state = window.__calcState[idSuffix] = window.__calcState[idSuffix] || { expr: '', result: '0' };
  state.expr += val;
  state.result = state.expr;
  const exprEl = document.getElementById('calc-expr-' + idSuffix);
  const resultEl = document.getElementById('calc-result-' + idSuffix);
  if (exprEl) exprEl.textContent = state.expr;
  if (resultEl) resultEl.textContent = state.expr || '0';
};
window.__calcEval = function(idSuffix) {
  const state = window.__calcState[idSuffix] = window.__calcState[idSuffix] || { expr: '', result: '0' };
  const exprEl = document.getElementById('calc-expr-' + idSuffix);
  const resultEl = document.getElementById('calc-result-' + idSuffix);
  try {
    const r = Function('"use strict"; return (' + (state.expr || '0') + ')')();
    state.result = String(r);
    if (exprEl) exprEl.textContent = state.expr + ' =';
    if (resultEl) resultEl.textContent = r;
    state.expr = String(r);
  } catch(e) {
    if (resultEl) resultEl.textContent = 'Error';
  }
};
window.__calcClear = function(idSuffix) {
  window.__calcState[idSuffix] = { expr: '', result: '0' };
  const exprEl = document.getElementById('calc-expr-' + idSuffix);
  const resultEl = document.getElementById('calc-result-' + idSuffix);
  if (exprEl) exprEl.textContent = '';
  if (resultEl) resultEl.textContent = '0';
};
</script>

<!-- ============================================================ -->
<!-- 系统脚本 -->
<!-- ============================================================ -->
<script type="module">
import { EventBus, WindowManager, SysCallBridge, GlobalDisplayAPI } from './core/Kernel.js';
import { TerminalCommandRegistry, TerminalExecutor } from './core/Terminal.js';
import SystemMonitor from './system/SystemMonitor.js';
import { bootLogLine, bootProgress, runBootSequence } from './system/BootSequence.js';
import { initUI } from './ui/UIMain.js';
import { initAppLauncher } from './apps/AppLauncher.js';
import WebNT from './sdk/WebNT.API.js';

// 全局版本常量
window.__WebNT_VERSION = '2.01';
window.__WebNT_BUILD = '20260718';

// 暴露到全局
window.__WebNT__ = { GlobalDisplayAPI, WindowManager, SysCallBridge, TerminalCommandRegistry, TerminalExecutor };
window.WindowManager = WindowManager;

// ===================================================================
// DOM Refs
// ===================================================================
const bootScreen = document.getElementById('boot-screen');
const appRoot = document.getElementById('app-root');
const lockScreen = document.getElementById('lock-screen');
const tw = document.getElementById('terminal-window');
const twOutput = document.getElementById('tw-output');
const twInput = document.getElementById('tw-input');

// ===================================================================
// 时间更新
// ===================================================================
function updateAllClocks() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0'), m = String(now.getMinutes()).padStart(2,'0');
  const lsTime = document.getElementById('ls-time'), lsDate = document.getElementById('ls-date');
  if (lsTime) lsTime.textContent = `${h}:${m}`;
  if (lsDate) lsDate.textContent = now.toLocaleDateString('zh-CN',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  const tbc = document.querySelector('#taskbar .tb-clock-time'), tbcd = document.querySelector('#taskbar .tb-clock-date');
  if (tbc) tbc.textContent = `${h}:${m}`;
  if (tbcd) tbcd.textContent = `${now.getMonth()+1}/${now.getDate()}`;
}
updateAllClocks();
setInterval(updateAllClocks, 1000);

// 点击任务栏时钟显示同步时间弹窗
document.getElementById('tb-clock').addEventListener('click', () => {
  let popup = document.getElementById('clock-sync-popup');
  if (popup) { popup.remove(); return; }
  const server = localStorage.getItem('webnt_time_server') || 'time.windows.com';
  popup = document.createElement('div');
  popup.id = 'clock-sync-popup';
  popup.style.cssText = 'position:fixed;bottom:48px;right:8px;background:rgba(15,23,42,0.95);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:16px;z-index:2500;width:280px;box-shadow:0 8px 32px rgba(0,0,0,0.5);';
  popup.innerHTML = `
    <div style="font-size:14px;color:#fff;margin-bottom:12px;font-weight:500;">时间同步</div>
    <div style="font-size:12px;color:#888;margin-bottom:8px;">当前时间服务器</div>
    <input type="text" id="clock-server-input" value="${server}" style="width:100%;padding:8px 12px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:6px;color:#e0e0e0;font-size:13px;outline:none;margin-bottom:12px;box-sizing:border-box;">
    <button id="clock-sync-btn" style="width:100%;padding:10px;background:#667eea;border:none;border-radius:6px;color:#fff;font-size:13px;cursor:pointer;transition:background 0.2s;">立即同步时间</button>
    <div id="clock-sync-status" style="margin-top:8px;font-size:12px;color:#888;text-align:center;"></div>
  `;
  document.body.appendChild(popup);
  document.getElementById('clock-sync-btn').addEventListener('click', () => {
    const newServer = document.getElementById('clock-server-input').value.trim();
    if (newServer) localStorage.setItem('webnt_time_server', newServer);
    const status = document.getElementById('clock-sync-status');
    status.textContent = '正在同步...';
    status.style.color = '#8ab4f8';
    setTimeout(() => {
      status.textContent = '✓ 时间已同步 (' + newServer + ')';
      status.style.color = '#81c995';
      updateAllClocks();
    }, 800);
  });
  const closePopup = (e) => {
    if (!popup.contains(e.target) && e.target.id !== 'tb-clock') {
      popup.remove();
      document.removeEventListener('click', closePopup);
    }
  };
  setTimeout(() => document.addEventListener('click', closePopup), 0);
});

// ===================================================================
// 终端
// ===================================================================
const twHistory = [];
let twHistoryIdx = -1;

function writeTerminal(text, cls) {
  cls = cls || '';
  if (!twOutput) return;
  const lines = text.split('\n');
  lines.forEach(line => {
    const l = document.createElement('div');
    l.className = 'tw-line' + (cls ? ' ' + cls : '');
    l.textContent = line || ' ';
    twOutput.appendChild(l);
  });
  twOutput.scrollTop = twOutput.scrollHeight;
}

function writeWelcome() {
  if (!twOutput) return;
  twOutput.innerHTML = '';
  const version = window.__WebNT_VERSION || '2.01';
  writeTerminal('WebNT 内核 v' + version + ' [HTML5 混合微内核]', 'info');
  writeTerminal('输入 "help" 查看可用命令。');
  writeTerminal('');
}

writeWelcome();

// 暴露到全局
window.writeTerminal = writeTerminal;

if (twInput) {
  twInput.addEventListener('keydown', async e => {
    if (e.key === 'Enter') {
      const cmd = twInput.value.trim();
      if (!cmd) return;
      // 访客权限检查
      const restrictedCmds = ['shutdown', 'reboot', 'rm', 'sudo', 'format', 'kill'];
      const cmdBase = cmd.split(/\s+/)[0];
      if (window.__WebNT_isGuest && restrictedCmds.includes(cmdBase)) {
        if (window.showToast) window.showToast('访客模式下此操作受限', 'warning');
        const cwd2 = TerminalCommandRegistry.instance.getCwd ? TerminalCommandRegistry.instance.getCwd() : '/home/webnt';
        const promptPath2 = cwd2 === '/' ? '/' : (cwd2.startsWith('/home/webnt') ? '~' + cwd2.replace('/home/webnt', '') : cwd2);
        writeTerminal(`webnt@kernel:${promptPath2}$ ${cmd}`, '');
        writeTerminal('权限不足: 访客模式下无法执行此命令', 'error');
        twInput.value = '';
        return;
      }
      const cwd = TerminalCommandRegistry.instance.getCwd ? TerminalCommandRegistry.instance.getCwd() : '/home/webnt';
      const promptPath = cwd === '/' ? '/' : (cwd.startsWith('/home/webnt') ? '~' + cwd.replace('/home/webnt', '') : cwd);
      writeTerminal(`webnt@kernel:${promptPath}$ ${cmd}`, '');
      twInput.value = '';
      if (cmd !== 'clear') twHistory.push(cmd);
      twHistoryIdx = twHistory.length;
      const result = await TerminalExecutor.instance.execute(cmd);
      if (result.clear) { twOutput.innerHTML = ''; return; }
      writeTerminal(result.output, result.exitCode !== 0 ? 'error' : '');
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      if (twHistoryIdx > 0) { twHistoryIdx--; twInput.value = twHistory[twHistoryIdx] || ''; }
    } else if (e.key === 'ArrowDown') {
      e.preventDefault();
      if (twHistoryIdx < twHistory.length - 1) { twHistoryIdx++; twInput.value = twHistory[twHistoryIdx] || ''; }
      else { twHistoryIdx = twHistory.length; twInput.value = ''; }
    } else if (e.key === 'Tab') {
      e.preventDefault();
      const input = twInput.value.trim().split(/\s+/)[0];
      const cmds = TerminalCommandRegistry.instance.getAllCommands();
      const matches = cmds.filter(c => c.startsWith(input));
      if (matches.length === 1) twInput.value = matches[0] + ' ';
      else if (matches.length > 1) writeTerminal(matches.join('  '), '');
    }
  });
}

// 终端按钮
document.getElementById('tb-terminal-btn').addEventListener('click', () => {
  if (window.launchApp) window.launchApp('terminal');
});
document.getElementById('tw-close').addEventListener('click', () => {
  if (!tw) return;
  tw.style.display = 'none';
  const wid = tw.dataset.winId;
  if (wid) WindowManager.instance.destroyWindow(wid);
  if (window.updateTaskbarWindowButtons) window.updateTaskbarWindowButtons();
});
document.getElementById('tw-minimize').addEventListener('click', () => {
  if (!tw) return;
  tw.style.display = 'none';
  if (window.updateTaskbarWindowButtons) window.updateTaskbarWindowButtons();
});
document.getElementById('tw-maximize').addEventListener('click', function() {
  if (!tw) return;
  if (tw.style.width === '100vw') {
    tw.style.cssText = tw.dataset.normalStyle || 'width:700px;height:420px;left:150px;top:80px';
    tw.style.display = 'flex';
    this.textContent = '\u25a1';
  } else {
    tw.dataset.normalStyle = 'width:' + tw.style.width + ';height:' + tw.style.height + ';left:' + tw.style.left + ';top:' + tw.style.top;
    tw.style.width = '100vw'; tw.style.height = 'calc(100vh - 48px)'; tw.style.left = '0'; tw.style.top = '0';
    this.textContent = '\u25a2';
  }
});

// 终端拖拽
let twDragging = false, twSx = 0, twSy = 0, twOx = 0, twOy = 0;
document.getElementById('tw-titlebar').addEventListener('pointerdown', e => {
  if (!tw) return;
  twDragging = true; twSx = e.clientX; twSy = e.clientY;
  twOx = tw.offsetLeft; twOy = tw.offsetTop;
  tw.setPointerCapture(e.pointerId);
});
if (tw) {
  tw.addEventListener('pointermove', e => {
    if (!twDragging) return;
    tw.style.left = (twOx + e.clientX - twSx) + 'px';
    tw.style.top = (twOy + e.clientY - twSy) + 'px';
  });
  tw.addEventListener('pointerup', (e) => { twDragging = false; if (tw.hasPointerCapture(e.pointerId)) tw.releasePointerCapture(e.pointerId); });
  tw.addEventListener('pointercancel', (e) => { twDragging = false; if (tw.hasPointerCapture(e.pointerId)) tw.releasePointerCapture(e.pointerId); });
}

// ===================================================================
// 键盘快捷键
// ===================================================================
document.addEventListener('keydown', e => {
  if (e.ctrlKey && e.key === '`') {
    e.preventDefault();
    if (window.launchApp) window.launchApp('terminal');
    return;
  }
  if (e.key === 'Escape') {
    const startMenu = document.getElementById('start-menu');
    const powerMenu = document.getElementById('power-menu');
    if (startMenu && startMenu.classList.contains('show')) startMenu.classList.remove('show');
    if (powerMenu && powerMenu.style.display === 'block') powerMenu.style.display = 'none';
    if (window.hideContextMenu) window.hideContextMenu();
    return;
  }
});

// ===================================================================
// 启动流程
// ===================================================================
async function boot() {
  if (!bootScreen || !appRoot) {
    console.error('Boot: 缺少必要的 DOM 元素');
    return;
  }
  const version = window.__WebNT_VERSION || '2.01';
  try {
    bootLogLine('WebNT 内核 v' + version + ' 正在启动...', 'info');
    bootLogLine('Copyright (c) 2026 WebNT 项目', '');
    bootLogLine('', '');

    // Phase 0: 硬件检测
    bootProgress(10, '阶段 0: 硬件检测');
    bootLogLine('阶段 0: 硬件检测', 'info');
    bootLogLine(`  CPU: ${navigator.hardwareConcurrency || '?'} 核`, '');
    bootLogLine(`  内存: ${navigator.deviceMemory || '?'} GB`, '');
    let gpuOk = false;
    try { gpuOk = !!navigator.gpu; } catch(e) { gpuOk = false; }
    bootLogLine(`  WebGPU: ${gpuOk ? '可用' : '不可用'}`, gpuOk ? 'ok' : 'warn');
    bootLogLine('', '');
    await new Promise(r => setTimeout(r, 300));

    // Phase 1: 初始化内核
    bootProgress(35, '阶段 1: 内核初始化');
    bootLogLine('阶段 1: 内核初始化', 'info');
    bootLogLine('  [正常] 对象管理器已初始化', 'ok');
    bootLogLine('  [正常] 句柄表就绪', 'ok');
    bootLogLine('  [正常] SMP调度器已启动', 'ok');
    bootLogLine('  [正常] 中断控制器在线', 'ok');
    bootLogLine('', '');
    await new Promise(r => setTimeout(r, 200));

    // Phase 2: 加载驱动
    bootProgress(55, '阶段 2: 加载驱动');
    bootLogLine('阶段 2: 加载驱动', 'info');
    bootLogLine('  [正常] 显示驱动.WebGPU', 'ok');
    bootLogLine('  [正常] 文件驱动.FS', 'ok');
    bootLogLine('  [正常] 网络驱动.Stream', 'ok');
    bootLogLine('  [正常] 终端驱动.Cmd', 'ok');
    bootLogLine('  [正常] 音频驱动.WA', 'ok');
    bootLogLine('', '');
    await new Promise(r => setTimeout(r, 200));

    // Phase 3: 启动用户态
    bootProgress(75, '阶段 3: 启动用户会话');
    bootLogLine('阶段 3: 启动用户会话', 'info');
    bootLogLine('  [正常] 会话管理器已启动', 'ok');
    bootLogLine('  [正常] 桌面子系统已加载', 'ok');
    bootLogLine('  [正常] WinHTML 显示管线就绪', 'ok');
    bootLogLine('', '');
    await new Promise(r => setTimeout(r, 200));

    // Phase 4: 完成
    bootProgress(100, '系统就绪');
    bootLogLine('', '');
    bootLogLine('========================================', '');
    bootLogLine('  WebNT 内核 v' + version + ' 就绪', 'ok');
    bootLogLine('  所有系统运行正常', 'ok');
    bootLogLine('========================================', '');

    await new Promise(r => setTimeout(r, 400));

    // 隐藏 BIOS 启动画面，显示锁屏
    if (bootScreen) bootScreen.classList.add('hidden');
    if (appRoot) appRoot.style.display = 'block';

    // 更新锁屏版本号
    const lsVersionEl = document.getElementById('ls-version-text');
    if (lsVersionEl) lsVersionEl.textContent = 'v' + version;

    // 初始化 UI 组件
    initUI();

    // 加载壁纸
    if (window.loadWallpaper) window.loadWallpaper();

    updateAllClocks();

    setTimeout(() => { if (bootScreen && bootScreen.parentNode) bootScreen.remove(); }, 600);

    console.log('%c WebNT 内核 v' + version + ' 就绪 %c| %c滑动解锁',
      'color:#00ff88;font-size:16px;', '', 'color:#aaa;');
  } catch(err) {
    if (bootLogLine) bootLogLine(`启动错误: ${err.message}`, 'err');
    console.error('Boot error:', err);
    if (bootScreen) bootScreen.classList.add('hidden');
    if (appRoot) appRoot.style.display = 'block';
    if (lockScreen && lockScreen.style.display !== 'none' && window.unlockDesktop) {
      window.unlockDesktop();
    }
  }
}

// ===================================================================
// Toast 通知系统
// ===================================================================
function showToast(message, type = 'info') {
  const toast = document.createElement('div');
  const colors = { info: '#667eea', success: '#81c995', error: '#f28b82', warning: '#fdd663' };
  toast.style.cssText = `
    position: fixed; bottom: 60px; right: 20px; z-index: 10000;
    padding: 12px 20px; border-radius: 10px; font-size: 13px;
    background: rgba(15,23,42,0.95); color: ${colors[type] || '#ccc'};
    border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(20px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.4); max-width: 320px;
    animation: toastSlideIn 0.3s ease; pointer-events: none;
  `;
  toast.textContent = message;
  document.body.appendChild(toast);
  setTimeout(() => {
    toast.style.opacity = '0';
    toast.style.transition = 'opacity 0.3s';
    setTimeout(() => toast.remove(), 300);
  }, 2500);
}
window.showToast = showToast;

// 添加 toast 动画样式
const toastStyle = document.createElement('style');
toastStyle.textContent = '@keyframes toastSlideIn { from { transform: translateX(100px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }';
document.head.appendChild(toastStyle);

boot().catch(err => {
  if (bootLogLine) bootLogLine(`严重错误: ${err.message}`, 'err');
  console.error(err);
  if (bootScreen) bootScreen.classList.add('hidden');
  if (appRoot) appRoot.style.display = 'block';
  if (window.unlockDesktop) window.unlockDesktop();
});
</script>
