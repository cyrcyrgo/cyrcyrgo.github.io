(function(){
// ===================================================================
// WebNT 浏览器
// ===================================================================

const id = 'webview';
const name = '浏览器';
const icon = '\ud83c\udf10';

function launch() {
  window.showAppWindow('浏览器', '\ud83c\udf10', `
    <style>
      .browser-wrap { display:flex;flex-direction:column;height:100%; }
      .browser-toolbar { display:flex;align-items:center;gap:6px;padding:8px;border-bottom:1px solid rgba(255,255,255,0.08); }
      .browser-toolbar button { background:rgba(255,255,255,0.06);border:none;color:#ccc;padding:6px 10px;border-radius:6px;cursor:pointer;font-size:13px; }
      .browser-toolbar button:hover { background:rgba(255,255,255,0.12); }
      .browser-toolbar button:disabled { opacity:0.4;cursor:not-allowed; }
      .browser-url { flex:1;padding:6px 12px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:6px;color:#e0e0e0;font-size:13px;outline:none; }
      .browser-url:focus { border-color:#667eea; }
      .browser-content { flex:1;overflow:hidden;background:#1a1a2e; }
      .browser-content iframe { width:100%;height:100%;border:none;background:#fff; }
      .browser-placeholder { display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:#666;gap:12px; }
      .browser-placeholder-icon { font-size:48px;opacity:0.3; }
      .browser-placeholder-text { font-size:13px; }
    </style>
    <div class="browser-wrap">
      <div class="browser-toolbar">
        <button id="browser-back" onclick="window.__browserBack()" title="后退">\u2190</button>
        <button id="browser-forward" onclick="window.__browserForward()" title="前进">\u2192</button>
        <button onclick="window.__browserRefresh()" title="刷新">\u21bb</button>
        <input type="text" class="browser-url" id="browser-url" placeholder="输入网址..." onkeydown="if(event.key==='Enter')window.__browserGo()">
        <button onclick="window.__browserGo()" title="访问">\u2192</button>
      </div>
      <div class="browser-content" id="browser-content">
        <div class="browser-placeholder">
          <div class="browser-placeholder-icon">\ud83c\udf10</div>
          <div class="browser-placeholder-text">输入网址开始浏览</div>
        </div>
      </div>
    </div>
  `);
  requestAnimationFrame(() => {
    let browserHistory = [];
    let browserHistoryIdx = -1;
    let browserIframe = null;
    
    window.__browserGo = function() {
      const urlInput = document.getElementById('browser-url');
      const content = document.getElementById('browser-content');
      let url = urlInput.value.trim();
      if(!url) return;
      if(!url.startsWith('http://') && !url.startsWith('https://')) {
        url = 'https://' + url;
      }
      if(!browserIframe) {
        browserIframe = document.createElement('iframe');
        browserIframe.style.cssText = 'width:100%;height:100%;border:none;background:#fff;';
        content.innerHTML = '';
        content.appendChild(browserIframe);
      }
      browserIframe.src = url;
      browserHistory = browserHistory.slice(0, browserHistoryIdx + 1);
      browserHistory.push(url);
      browserHistoryIdx = browserHistory.length - 1;
      updateBrowserButtons();
    };
    
    window.__browserBack = function() {
      if(browserHistoryIdx > 0 && browserIframe) {
        browserHistoryIdx--;
        browserIframe.src = browserHistory[browserHistoryIdx];
        document.getElementById('browser-url').value = browserHistory[browserHistoryIdx];
        updateBrowserButtons();
      }
    };
    
    window.__browserForward = function() {
      if(browserHistoryIdx < browserHistory.length - 1 && browserIframe) {
        browserHistoryIdx++;
        browserIframe.src = browserHistory[browserHistoryIdx];
        document.getElementById('browser-url').value = browserHistory[browserHistoryIdx];
        updateBrowserButtons();
      }
    };
    
    window.__browserRefresh = function() {
      if(browserIframe) {
        browserIframe.src = browserIframe.src;
      }
    };
    
    function updateBrowserButtons() {
      document.getElementById('browser-back').disabled = browserHistoryIdx <= 0;
      document.getElementById('browser-forward').disabled = browserHistoryIdx >= browserHistory.length - 1;
    }
    
    updateBrowserButtons();
  });
}

const name = '系统监控';
const icon = '\ud83d\udcbb';

function launch() {

      <span class="sm-val" id="sm-disk-val">0%</span>
    </div>
    <div class="sm-bar-wrap">
      <span class="sm-label">网络</span>
      <div class="sm-bar-bg"><div class="sm-bar-fill" id="sm-net-bar" style="width:0%;background:linear-gradient(90deg,#f28b82,#e81123)"></div></div>
      <span class="sm-val" id="sm-net-val">0%</span>
    </div>
    <div class="sm-chart" id="sm-chart"></div>
    <div style="font-size:10px;color:#666;margin-top:8px;text-align:center">CPU 历史 (最近 20 秒)</div>
    <div class="sm-info" id="sm-info"></div>
  `);
  (function updateSysMon() {
    const cpuBar=document.getElementById('sm-cpu-bar'), cpuVal=document.getElementById('sm-cpu-val');
    const memBar=document.getElementById('sm-mem-bar'), memVal=document.getElementById('sm-mem-val');
    const diskBar=document.getElementById('sm-disk-bar'), diskVal=document.getElementById('sm-disk-val');
    const netBar=document.getElementById('sm-net-bar'), netVal=document.getElementById('sm-net-val');
    const chart=document.getElementById('sm-chart');
    const info=document.getElementById('sm-info');
    if(!cpuBar) return;
    let cpu=0, mem=0, disk=0, net=0;
    let infoText='';
    // CPU - 使用 performance API 估算
    if(typeof performance !== 'undefined' && performance.now) {
      const now=performance.now();
      if(window.__smLastTime) {
        const elapsed=now-window.__smLastTime;
        const busy=window.__smBusyTime||0;
        cpu=Math.min(99, Math.round((busy/elapsed)*100));
      }
      window.__smLastTime=now;
      window.__smBusyTime=0;
      const startTime=now;
      while(performance.now()-startTime<10) {
        window.__smBusyTime+=performance.now()-startTime;
      }
    }
    // 内存 - 使用 performance.memory (Chrome)
    if(typeof performance !== 'undefined' && performance.memory) {
      const m=performance.memory;
      mem=Math.round((m.usedJSHeapSize/m.totalJSHeapSize)*100);
      infoText+=`内存: ${(m.usedJSHeapSize/1024/1024).toFixed(1)} MB / ${(m.totalJSHeapSize/1024/1024).toFixed(1)} MB`;
    }
    // CPU核心数
    if(navigator.hardwareConcurrency) {
      infoText+=` | CPU核心: ${navigator.hardwareConcurrency}`;
    }
    // 网络状态
    if(navigator.connection) {
      const conn=navigator.connection;
      net=conn.downlink?Math.min(99, Math.round((conn.downlink/100)*100)):0;
      infoText+=` | 网络: ${conn.effectiveType||'unknown'}`;
    }
    // 存储信息
    navigator.storage.estimate().then(e=>{
      if(e.quota && e.usage) {
        disk=Math.round((e.usage/e.quota)*100);
        diskBar.style.width=disk+'%';
        diskVal.textContent=disk+'%';
        if(infoText) infoText+=' | ';
        infoText+=`存储: ${(e.usage/1024/1024).toFixed(1)} MB / ${(e.quota/1024/1024).toFixed(1)} MB`;
        if(info) info.textContent=infoText;
      } else {
        setDiskFallback();
      }
    }).catch(()=>{ setDiskFallback(); });
    function setDiskFallback() {
      disk=Math.round(10+Math.random()*20);
      diskBar.style.width=disk+'%';
      diskVal.textContent=disk+'%';
    }
    // 如果API不可用，使用模拟数据(确保始终显示有效值)
    if(cpu===0) cpu=Math.round(5+Math.random()*35);
    if(mem===0) mem=Math.round(25+Math.random()*35);
    if(net===0 && !navigator.connection) net=Math.round(2+Math.random()*12);
    cpuBar.style.width=cpu+'%'; cpuVal.textContent=cpu+'%';
    memBar.style.width=mem+'%'; memVal.textContent=mem+'%';
    netBar.style.width=net+'%'; netVal.textContent=net+'%';
    if(info && !info.textContent) info.textContent=infoText||'浏览器不支持完整的硬件信息API';
    // Update chart
    if(chart) {
      const bar=document.createElement('div'); bar.className='sm-chart-bar';
      bar.style.height=(Math.min(100,cpu)*0.8+10)+'px';
      chart.appendChild(bar);
      if(chart.children.length>20) chart.firstChild.remove();
    }
    setTimeout(updateSysMon, 1000);
  })();
}


window.__app_systemmonitorapp = { id: id, name: name, icon: icon, launch: launch };
})();

      .paint-toolbar input[type=range] { width:80px; }
      .paint-canvas-wrap { flex:1;overflow:hidden;border-radius:8px;background:#fff; }
      .paint-canvas { display:block;cursor:crosshair;width:100%;height:100%; }
    </style>
    <div class="paint-toolbar">
      <input type="color" id="paint-color" value="#667eea" title="Color">
      <input type="range" id="paint-size" min="1" max="20" value="3" title="Brush Size">
      <button id="paint-clear">清空</button>
      <button id="paint-fill" title="填充背景">填充</button>
      <span style="font-size:11px;color:#888;margin-left:auto">在画布上绘制</span>
    </div>
    <div class="paint-canvas-wrap"><canvas class="paint-canvas" id="paint-canvas"></canvas></div>
  `);
  // Initialize paint canvas after DOM is attached
  requestAnimationFrame(() => {
    const canvas = document.getElementById('paint-canvas');
    const colorPicker = document.getElementById('paint-color');
    const sizeSlider = document.getElementById('paint-size');
    const clearBtn = document.getElementById('paint-clear');
    const fillBtn = document.getElementById('paint-fill');
    if(!canvas) return;
    const wrap = canvas.parentElement;
    const ctx = canvas.getContext('2d');
    let drawing = false;
    function resize() {
      const rect = wrap.getBoundingClientRect();
      canvas.width = rect.width;
      canvas.height = rect.height;
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }
    resize();
    new ResizeObserver(resize).observe(wrap);
    function getCanvasPos(e) {
      const rect = canvas.getBoundingClientRect();
      return {
        x: (e.clientX - rect.left) * (canvas.width / rect.width),
        y: (e.clientY - rect.top) * (canvas.height / rect.height)
      };
    }
    canvas.addEventListener('pointerdown', e => {
      drawing = true;
      const pos = getCanvasPos(e);
      ctx.beginPath();
      ctx.moveTo(pos.x, pos.y);
      ctx.strokeStyle = colorPicker.value;
      ctx.lineWidth = parseInt(sizeSlider.value);
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
    });
    canvas.addEventListener('pointermove', e => {
      if(!drawing) return;
      const pos = getCanvasPos(e);
      ctx.lineTo(pos.x, pos.y);
      ctx.stroke();
    });
    canvas.addEventListener('pointerup', () => { drawing = false; });
    canvas.addEventListener('pointerleave', () => { drawing = false; });
    clearBtn.addEventListener('click', () => {
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    });
    fillBtn.addEventListener('click', () => {
      ctx.fillStyle = colorPicker.value;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    });
  });
}


window.__app_paint = { id: id, name: name, icon: icon, launch: launch };
})();

        ${[1,3,5,10,15,30].map(m=>'<button style="padding:6px 12px;background:rgba(255,255,255,0.06);border:none;color:#ccc;border-radius:6px;cursor:pointer;font-size:12px" onclick="document.getElementById(\'tm-time\').textContent=\''+String(m).padStart(2,'0')+':00\';window.__tmTotal='+(m*60)+';window.__tmRemaining='+(m*60)+'">'+m+' min</button>').join('')}
      </div>
    </div>
  `);
  // Clock live update
  (function updateClock() {
    const now = new Date();
    const timeEl = document.getElementById('clk-time');
    const dateEl = document.getElementById('clk-date');
    if(!timeEl) return;
    timeEl.textContent = now.toLocaleTimeString('zh-CN',{hour12:false});
    dateEl.textContent = now.toLocaleDateString('zh-CN',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
    setTimeout(updateClock, 1000);
  })();
  // Stopwatch
  (function() {
    const swTime = document.getElementById('sw-time');
    const swStart = document.getElementById('sw-start');
    const swLap = document.getElementById('sw-lap');
    const swReset = document.getElementById('sw-reset');
    const swLaps = document.getElementById('sw-laps');
    if(!swTime) return;
    let swRunning = false, swStartTime = 0, swElapsed = 0, swInterval;
    function updateSwDisplay() {
      const total = swElapsed + (swRunning ? Date.now() - swStartTime : 0);
      const ms = Math.floor(total/10)%100;
      const s = Math.floor(total/1000)%60;
      const m = Math.floor(total/60000);
      swTime.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}.${String(ms).padStart(2,'0')}`;
    }
    swStart.addEventListener('click', () => {
      if(swRunning) { swElapsed += Date.now() - swStartTime; clearInterval(swInterval); swStart.textContent = '开始'; swStart.classList.add('primary'); }
      else { swStartTime = Date.now(); swInterval = setInterval(updateSwDisplay, 10); swStart.textContent = '停止'; swStart.classList.remove('primary'); }
      swRunning = !swRunning;
    });
    swLap.addEventListener('click', () => {
      if(!swRunning && swElapsed===0) return;
      const lap = document.createElement('div');
      lap.textContent = `#${swLaps.children.length+1}  ${swTime.textContent}`;
      swLaps.appendChild(lap);
    });
    swReset.addEventListener('click', () => {
      swRunning = false; swElapsed = 0; clearInterval(swInterval);
      swStart.textContent = '开始'; swStart.classList.add('primary');
      swTime.textContent = '00:00.00'; swLaps.innerHTML = '';
    });
  })();
  // Timer
  (function() {
    const tmTime = document.getElementById('tm-time');
    const tmStart = document.getElementById('tm-start');
    const tmReset = document.getElementById('tm-reset');
    if(!tmTime) return;
    let tmRunning = false, tmRemaining = 300, tmInterval;
    window.__tmTotal = 300;
    window.__tmRemaining = 300;
    function updateTmDisplay() {
      const m = Math.floor(tmRemaining/60);
      const s = tmRemaining%60;
      tmTime.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }
    tmStart.addEventListener('click', () => {
      if(tmRunning) { clearInterval(tmInterval); tmStart.textContent = '开始'; tmStart.classList.add('primary'); }
      else {
        tmInterval = setInterval(() => {
          tmRemaining--;
          if(tmRemaining <= 0) { tmRemaining = 0; clearInterval(tmInterval); tmRunning = false; tmStart.textContent = '开始'; tmStart.classList.add('primary'); }
          updateTmDisplay();
        }, 1000);
        tmStart.textContent = '停止'; tmStart.classList.remove('primary');
      }
      tmRunning = !tmRunning;
    });
    tmReset.addEventListener('click', () => {
      tmRunning = false; clearInterval(tmInterval);
      tmRemaining = window.__tmTotal || 300;
      tmStart.textContent = '开始'; tmStart.classList.add('primary');
      updateTmDisplay();
    });
  })();
  // Tab switching
  (function() {
    document.querySelectorAll('.clk-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.clk-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.clk-panel').forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById('panel-' + tab.dataset.panel).classList.add('active');
      });
    });
  })();

(function(){
// ===================================================================
// WebNT 扫雷
// ===================================================================

const id = 'minesweeper';
const name = '扫雷';
const icon = '\ud83d\udca3';

const ROWS=9, COLS=9, MINES=10;

function launch() {
  let board, revealed, flagged, gameOver, gameStarted;
  function initBoard() {
    board = Array(ROWS).fill(null).map(() => Array(COLS).fill(0));
    revealed = Array(ROWS).fill(null).map(() => Array(COLS).fill(false));
    flagged = Array(ROWS).fill(null).map(() => Array(COLS).fill(false));
    gameOver = false; gameStarted = false;
    // Place mines
    let placed = 0;
    while(placed < MINES) {
      const r = Math.floor(Math.random()*ROWS), c = Math.floor(Math.random()*COLS);
      if(board[r][c] === -1) continue;
      board[r][c] = -1;
      placed++;
    }
    // Calculate numbers
    for(let r=0; r<ROWS; r++)
      for(let c=0; c<COLS; c++) {
        if(board[r][c] === -1) continue;
        let count = 0;
        for(let dr=-1; dr<=1; dr++)
          for(let dc=-1; dc<=1; dc++) {
            if(dr===0 && dc===0) continue;
            const nr=r+dr, nc=c+dc;
            if(nr>=0 && nr<ROWS && nc>=0 && nc<COLS && board[nr][nc]===-1) count++;
          }
        board[r][c] = count;
      }
  }
  function reveal(r, c) {
    if(r<0||r>=ROWS||c<0||c>=COLS||revealed[r][c]||flagged[r][c]||gameOver) return;
    revealed[r][c] = true;
    if(board[r][c] === -1) { gameOver = true; return; }
    if(board[r][c] === 0) {
      for(let dr=-1; dr<=1; dr++)
        for(let dc=-1; dc<=1; dc++)
          reveal(r+dr, c+dc);
    }
  }
  function checkWin() {
    for(let r=0; r<ROWS; r++)
      for(let c=0; c<COLS; c++)
        if(!revealed[r][c] && board[r][c] !== -1) return false;
    return true;
  }
  function renderBoard() {
    const container = document.getElementById('ms-board');
    if(!container) return;
    let html = '';
    for(let r=0; r<ROWS; r++) {
      html += '<div style="display:flex">';
      for(let c=0; c<COLS; c++) {
        let content = '', bg = 'rgba(255,255,255,0.06)', color = '#ccc';
        if(revealed[r][c]) {
          bg = 'rgba(255,255,255,0.02)';
          if(board[r][c] === -1) { content = '\ud83d\udca3'; }
          else if(board[r][c] > 0) {
            content = board[r][c];
            const colors = ['','#4fc3f7','#81c995','#f28b82','#ce93d8','#ff9800','#fdd663','#aaa','#888'];
            color = colors[board[r][c]] || '#fff';
          }
        } else if(flagged[r][c]) {
          content = '\ud83d\udea9'; bg = 'rgba(255,200,50,0.1)';
        }
        if(gameOver && board[r][c] === -1 && !flagged[r][c]) { content = '\ud83d\udca3'; bg = 'rgba(255,0,0,0.2)'; }
        html += `<div data-r="${r}" data-c="${c}" style="width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-size:16px;background:${bg};color:${color};border:1px solid rgba(255,255,255,0.04);cursor:pointer;user-select:none;border-radius:2px">${content}</div>`;
      }
      html += '</div>';
    }
    container.innerHTML = html;
    // Attach click handlers
    container.querySelectorAll('div[data-r]').forEach(cell => {
      cell.addEventListener('click', () => {
        if(gameOver) return;
        const r = parseInt(cell.dataset.r), c = parseInt(cell.dataset.c);
        reveal(r, c);
        if(checkWin()) { gameOver = true; }
        renderBoard();
        const status = document.getElementById('ms-status');
        if(status) {
          if(gameOver && checkWin()) status.textContent = '你赢了! \ud83c\udf89';
          else if(gameOver) status.textContent = '游戏结束 \ud83d\udca5';
          else status.textContent = `雷数: ${MINES}`;
        }
      });
      cell.addEventListener('contextmenu', e => {
        e.preventDefault();
        if(gameOver || revealed[parseInt(cell.dataset.r)][parseInt(cell.dataset.c)]) return;
        const r = parseInt(cell.dataset.r), c = parseInt(cell.dataset.c);
        flagged[r][c] = !flagged[r][c];
        renderBoard();
      });
    });
  }
  initBoard();
  window.showAppWindow('扫雷', '\ud83d\udca3', `
    <style>
      #ms-board { display:inline-block;margin:0 auto; }
    </style>
    <div style="text-align:center">
      <div id="ms-status" style="font-size:14px;margin-bottom:12px;color:#888">雷数: ${MINES}</div>
      <div id="ms-board"></div>
      <button id="ms-restart" style="margin-top:12px;padding:8px 20px;background:rgba(255,255,255,0.08);border:none;color:#e0e0e0;border-radius:8px;cursor:pointer;font-size:13px">新游戏</button>
    </div>
  `);
  // Render after DOM attached
  requestAnimationFrame(() => {
    renderBoard();
    const restartBtn = document.getElementById('ms-restart');
    if(restartBtn) {
      restartBtn.addEventListener('click', () => {
        initBoard();
        renderBoard();
        const status = document.getElementById('ms-status');
        if(status) status.textContent = `雷数: ${MINES}`;
      });
    }
  });
}


window.__app_minesweeper = { id: id, name: name, icon: icon, launch: launch };
})();

          + '<div class="st-icon" style="background:'+app.color+'22;color:'+app.color+'">'+app.icon+'</div>'

    window.__showDetail = function(storeId) {

      const hasUpdate = inst && inst.version !== app.version;
      storeMain.innerHTML = '<div class="st-detail">'
        + '<button class="st-back" onclick="window.__storeGoBack()">\u2190 返回应用列表</button>'
        + (app.images.length? '<img class="st-hero" src="'+app.images[0]+'" alt="'+app.name+'">' : '')
        + '<div class="st-d-header"><div class="st-d-icon" style="background:'+app.color+'22;color:'+app.color+'">'+app.icon+'</div><div><div class="st-d-name">'+app.name+'</div><div class="st-d-author">'+app.author+'</div><div class="st-d-version">版本 '+app.version+' \u00b7 '+app.category+'</div></div></div>'

          ? (hasUpdate
            ? '<button class="st-btn-update" onclick="window.__updateApp(\''+storeId+'\')">更新至 v'+app.version+'</button>'

            + '<button class="st-btn-delete" onclick="window.__deleteApp(\''+storeId+'\');window.__showDetail(\''+storeId+'\')">删除</button>'

        + '</div></div>';
    };
    window.__storeGoBack = function() { renderOfficial(); };

    window.__installFromStore = function(storeId) {
      const app = storeRegistry.find(a => a.id === storeId);
      if(!app) return;
      if(isInstalled(storeId)) return;
      const appId = 'ext_' + storeId + '_' + Date.now();
      const newApp = { id: appId, storeId: app.id, name: app.name, url: app.url, icon: app.icon, color: app.color, version: app.version };
      const apps = loadInstalled();
      apps.push(newApp);
      saveInstalled(apps);
      window.addDesktopIcon(appId, app.name, app.icon, app.color, appId);
      window.renderDesktopIcons();
      window.__showDetail(storeId);
    };

    window.__updateApp = function(storeId) {
      const app = storeRegistry.find(a => a.id === storeId);
      if(!app) return;
      let apps = loadInstalled();
      const idx = apps.findIndex(a => a.storeId === storeId);
      if(idx === -1) return;
      apps[idx].version = app.version;
      apps[idx].url = app.url;
      saveInstalled(apps);
      window.__showDetail(storeId);
    };

    window.__deleteApp = function(storeId) {
      if(!confirm('确定要删除此应用吗？')) return;
      let apps = loadInstalled();
      const app = apps.find(a => a.storeId === storeId);
      if(!app) return;
      apps = apps.filter(a => a.storeId !== storeId);
      saveInstalled(apps);
      const existing = document.querySelector('.desktop-icon[data-app-id="'+app.id+'"]');
      if(existing) existing.remove();
    };

        + '<div class="st-scan-box">'
        + '<label>输入链接，自动扫描 SDK 特征码匹配应用</label>'
        + '<div class="st-scan-row"><input type="text" id="scan-url-input" placeholder="https://example.com/app 或粘贴 SDK 特征码"><button id="scan-btn">扫描</button></div>'
        + '<div class="st-msg" id="scan-msg"></div>'
        + '</div>'
        + '<div id="scan-result"></div>'
        + '<div style="font-size:11px;color:#555;margin-top:12px;padding:12px;background:rgba(255,255,255,0.02);border-radius:8px;line-height:1.6">'
        + '<strong>SDK 特征码说明：</strong><br>'
        + '特征码格式: <code style="color:#8ab4f8">webnt-app:&lt;app-id&gt;:&lt;version&gt;</code><br>'
        + '开发者可在应用页面 HTML 的 meta 标签中声明特征码：<br>'
        + '<code style="color:#81c995">&lt;meta name="webnt-app" content="snake:2.1.0"&gt;</code><br>'
        + '应用商店将自动识别并匹配已注册应用。'
        + '</div>';

      const scanInput = document.getElementById('scan-url-input');
      const scanBtn = document.getElementById('scan-btn');
      const scanMsg = document.getElementById('scan-msg');
      const scanResult = document.getElementById('scan-result');

      scanBtn.addEventListener('click', () => {
        const input = scanInput.value.trim();
        if(!input) { scanMsg.textContent = '请输入链接或特征码'; scanMsg.className = 'st-msg error'; return; }
        scanResult.innerHTML = '';

        // 扫描特征码
        let matched = null;
        // 尝试直接匹配特征码格式: webnt-app:<id>:<version>
        const codeMatch = input.match(/webnt-app:([a-zA-Z0-9_-]+):?([\d.]+)?/);
        if(codeMatch) {
          const appId = codeMatch[1];
          const version = codeMatch[2];
          matched = storeRegistry.find(a => a.id === appId);
          if(matched) {
            scanMsg.textContent = '找到匹配应用！';
            scanMsg.className = 'st-msg success';
          }
        }
        // 尝试从 URL 中提取特征码（模拟扫描页面 meta）
        if(!matched) {
          const urlMatch = input.match(/([a-zA-Z0-9_-]+)\.html?$/);
          if(urlMatch) {
            const name = urlMatch[1].toLowerCase();
            matched = storeRegistry.find(a => a.id === name || a.name.toLowerCase().includes(name));
            if(matched) { scanMsg.textContent = '根据链接名称匹配到应用'; scanMsg.className = 'st-msg success'; }
          }
        }
        if(!matched) {
          scanMsg.textContent = '未找到匹配的应用，请检查链接或特征码';
          scanMsg.className = 'st-msg error';
          return;
        }
        const inst = getInstalled(matched.id);
        const hasUpdate = inst && inst.version !== matched.version;
        scanResult.innerHTML = '<div class="st-card" onclick="window.__showDetail(\''+matched.id+'\')">'
          + '<div class="st-icon" style="background:'+matched.color+'22;color:'+matched.color+'">'+matched.icon+'</div>'
          + '<div class="st-info"><div class="st-name">'+matched.name+'</div><div class="st-desc">'+matched.description+'</div><div class="st-meta">'+matched.author+' \u00b7 v'+matched.version+' '+(inst?(hasUpdate?'<span style="color:#ff9800">可更新</span>':'<span style="color:#81c995">已安装</span>'):'<span style="color:#ff7043">未安装</span>')+'</div></div>'
          + '<div class="st-arrow">\u276f</div></div>';
      });
    }

    // ============================================================
    // 标签切换
    // ============================================================
    let currentTab = 'official';
    document.querySelectorAll('.store-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.store-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentTab = tab.dataset.tab;
        if(currentTab === 'official') renderOfficial();
        else renderScan();
      });
    });

    renderOfficial();
  });
}

function launchApp(appId) {
  // 访客模式限制
  if (window.__WebNT_isGuest) {
    const restrictedApps = ['terminal', 'settings', 'taskmgr'];
    if (restrictedApps.includes(appId)) {
      if (window.showAppWindow) {
        window.showAppWindow('访问受限', '\ud83d\uded1', `<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#f28b82;font-size:14px;text-align:center;padding:20px;">访客模式下无法使用此功能。<br>请切换到管理员账户。</div>`);
      }
      return;
    }
  }

  // 先检查已注册的模块化应用
  const app = appRegistry[appId];
  if (app && app.launch) {
    app.launch();
    window.updateTaskbarWindowButtons();
    if (window.showToast) window.showToast('已启动: ' + (app.name || appId), 'success');
    return;
  }

  // 检查特殊应用
  const special = specialApps[appId];
  if (special) {
    special();
    window.updateTaskbarWindowButtons();
    if (window.showToast) window.showToast('已启动: ' + appId, 'success');
    return;
  }

  // 检查是否是已安装的第三方应用
  if (appId.startsWith('ext_')) {
    if (window.__launchInstalledApp) window.__launchInstalledApp(appId);
    if (window.showToast) window.showToast('已启动: ' + appId, 'success');
  } else {
    window.showAppWindow(appId, '\ud83d\udce6', `<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#777">${appId} 正在运行</div>`);
    if (window.showToast) window.showToast('已启动: ' + appId, 'success');
  }

  window.updateTaskbarWindowButtons();
}

    async call(name, ...args) { return SysCallBridge.instance.call(name, ...args); },

    shutdown() { return SysCallBridge.instance.call('NtShutdown'); },
    reboot() { return SysCallBridge.instance.call('NtReboot'); },
  },
  
  // 事件总线
  events: {
    on(event, callback) { EventBus.on(event, callback); },

  // 存储接口

    get(key) { try { return JSON.parse(localStorage.getItem('webnt_' + key)); } catch(e) { return null; } },
    set(key, value) { try { localStorage.setItem('webnt_' + key, JSON.stringify(value)); } catch(e) {} },
    remove(key) { try { localStorage.removeItem('webnt_' + key); } catch(e) {} },

  // 桌面接口

  // 通知接口
  notify(title, body) {

  // 注册应用
  registerApp(app) {

// ===================================================================
// DOM Refs
// ===================================================================
var bootScreen = document.getElementById('boot-screen');
var appRoot = document.getElementById('app-root');
var lockScreen = document.getElementById('lock-screen');
var tw = document.getElementById('terminal-window');
var twOutput = document.getElementById('tw-output');
var twInput = document.getElementById('tw-input');

// ===================================================================
// 时间更新
// ===================================================================
function updateAllClocks() {
  var now = new Date();
  var h = String(now.getHours()).padStart(2,'0'), m = String(now.getMinutes()).padStart(2,'0');
  var lsTime = document.getElementById('ls-time'), lsDate = document.getElementById('ls-date');
  if (lsTime) lsTime.textContent = h + ':' + m;
  if (lsDate) lsDate.textContent = now.toLocaleDateString('zh-CN',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  var tbc = document.querySelector('#taskbar .tb-clock-time'), tbcd = document.querySelector('#taskbar .tb-clock-date');
  if (tbc) tbc.textContent = h + ':' + m;
  if (tbcd) tbcd.textContent = (now.getMonth()+1) + '/' + now.getDate();
}
updateAllClocks();
setInterval(updateAllClocks, 1000);

// 点击任务栏时钟显示同步时间弹窗
document.getElementById('tb-clock').addEventListener('click', function() {
  var popup = document.getElementById('clock-sync-popup');
  if (popup) { popup.remove(); return; }
  var server = localStorage.getItem('webnt_time_server') || 'time.windows.com';
  popup = document.createElement('div');
  popup.id = 'clock-sync-popup';
  popup.style.cssText = 'position:fixed;bottom:48px;right:8px;background:rgba(15,23,42,0.95);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:16px;z-index:2500;width:280px;box-shadow:0 8px 32px rgba(0,0,0,0.5);';
  popup.innerHTML = '<div style="font-size:14px;color:#fff;margin-bottom:12px;font-weight:500;">时间同步</div><div style="font-size:12px;color:#888;margin-bottom:8px;">当前时间服务器</div><input type="text" id="clock-server-input" value="'+server+'" style="width:100%;padding:8px 12px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:6px;color:#e0e0e0;font-size:13px;outline:none;margin-bottom:12px;box-sizing:border-box;"><button id="clock-sync-btn" style="width:100%;padding:10px;background:#667eea;border:none;border-radius:6px;color:#fff;font-size:13px;cursor:pointer;">立即同步时间</button><div id="clock-sync-status" style="margin-top:8px;font-size:12px;color:#888;text-align:center;"></div>';
  document.body.appendChild(popup);
  document.getElementById('clock-sync-btn').addEventListener('click', function() {
    var newServer = document.getElementById('clock-server-input').value.trim();
    if (newServer) localStorage.setItem('webnt_time_server', newServer);
    var status = document.getElementById('clock-sync-status');
    status.textContent = '正在同步...';
    status.style.color = '#8ab4f8';
    setTimeout(function() {
      status.textContent = '\u2713 时间已同步 (' + newServer + ')';
      status.style.color = '#81c995';
      updateAllClocks();
    }, 800);
  });
  var closePopup = function(e) {
    if (!popup.contains(e.target) && e.target.id !== 'tb-clock') {
      popup.remove();
      document.removeEventListener('click', closePopup);
    }
  };
  setTimeout(function() { document.addEventListener('click', closePopup); }, 0);
});

// ===================================================================
// 终端
// ===================================================================
var twHistory = [];
var twHistoryIdx = -1;

function writeTerminal(text, cls) {
  cls = cls || '';
  if (!twOutput) return;
  var lines = text.split('\n');
  lines.forEach(function(line) {
    var l = document.createElement('div');
    l.className = 'tw-line' + (cls ? ' ' + cls : '');
    l.textContent = line || ' ';
    twOutput.appendChild(l);
  });
  twOutput.scrollTop = twOutput.scrollHeight;
}

function writeWelcome() {
  if (!twOutput) return;
  twOutput.innerHTML = '';
  var version = window.__WebNT_VERSION || '2.01';
  writeTerminal('WebNT 内核 v' + version + ' [HTML5 混合微内核]', 'info');
  writeTerminal('输入 "help" 查看可用命令。');
  writeTerminal('');
}

writeWelcome();
window.writeTerminal = writeTerminal;

if (twInput) {
  twInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      var cmd = twInput.value.trim();
      if (!cmd) return;
      var restrictedCmds = ['shutdown', 'reboot', 'rm', 'sudo', 'format', 'kill'];
      var cmdBase = cmd.split(/\s+/)[0];
      if (window.__WebNT_isGuest && restrictedCmds.indexOf(cmdBase) !== -1) {
        if (window.showToast) window.showToast('访客模式下此操作受限', 'warning');
        var cwd2 = TerminalCommandRegistry.instance.getCwd ? TerminalCommandRegistry.instance.getCwd() : '/home/webnt';
        var promptPath2 = cwd2 === '/' ? '/' : (cwd2.indexOf('/home/webnt') === 0 ? '~' + cwd2.replace('/home/webnt', '') : cwd2);
        writeTerminal('webnt@kernel:' + promptPath2 + '$ ' + cmd, '');
        writeTerminal('权限不足: 访客模式下无法执行此命令', 'error');
        twInput.value = '';
        return;
      }
      var cwd = TerminalCommandRegistry.instance.getCwd ? TerminalCommandRegistry.instance.getCwd() : '/home/webnt';
      var promptPath = cwd === '/' ? '/' : (cwd.indexOf('/home/webnt') === 0 ? '~' + cwd.replace('/home/webnt', '') : cwd);
      writeTerminal('webnt@kernel:' + promptPath + '$ ' + cmd, '');
      twInput.value = '';
      if (cmd !== 'clear') twHistory.push(cmd);
      twHistoryIdx = twHistory.length;
      TerminalExecutor.instance.execute(cmd).then(function(result) {
        if (result.clear) { twOutput.innerHTML = ''; return; }
        writeTerminal(result.output, result.exitCode !== 0 ? 'error' : '');
      });
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      if (twHistoryIdx > 0) { twHistoryIdx--; twInput.value = twHistory[twHistoryIdx] || ''; }
    } else if (e.key === 'ArrowDown') {
      e.preventDefault();
      if (twHistoryIdx < twHistory.length - 1) { twHistoryIdx++; twInput.value = twHistory[twHistoryIdx] || ''; }
      else { twHistoryIdx = twHistory.length; twInput.value = ''; }
    } else if (e.key === 'Tab') {
      e.preventDefault();
      var input = twInput.value.trim().split(/\s+/)[0];
      var cmds = TerminalCommandRegistry.instance.getAllCommands();
      var matches = cmds.filter(function(c) { return c.indexOf(input) === 0; });
      if (matches.length === 1) twInput.value = matches[0] + ' ';
      else if (matches.length > 1) writeTerminal(matches.join('  '), '');
    }
  });
}

// 终端按钮
document.getElementById('tb-terminal-btn').addEventListener('click', function() {
  if (window.launchApp) window.launchApp('terminal');
});
document.getElementById('tw-close').addEventListener('click', function() {
  if (!tw) return;
  tw.style.display = 'none';
  var wid = tw.dataset.winId;
  if (wid && window.WindowManager) window.WindowManager.instance.destroyWindow(wid);
  if (window.updateTaskbarWindowButtons) window.updateTaskbarWindowButtons();
});
document.getElementById('tw-minimize').addEventListener('click', function() {
  if (!tw) return;
  tw.style.display = 'none';
  if (window.updateTaskbarWindowButtons) window.updateTaskbarWindowButtons();
});
document.getElementById('tw-maximize').addEventListener('click', function() {
  if (!tw) return;
  if (tw.style.width === '100vw') {
    tw.style.cssText = tw.dataset.normalStyle || 'width:700px;height:420px;left:150px;top:80px';
    tw.style.display = 'flex';
    this.textContent = '\u25a1';
  } else {
    tw.dataset.normalStyle = 'width:' + tw.style.width + ';height:' + tw.style.height + ';left:' + tw.style.left + ';top:' + tw.style.top;
    tw.style.width = '100vw'; tw.style.height = 'calc(100vh - 48px)'; tw.style.left = '0'; tw.style.top = '0';
    this.textContent = '\u25a2';
  }
});

// 终端拖拽
var twDragging = false, twSx = 0, twSy = 0, twOx = 0, twOy = 0;
document.getElementById('tw-titlebar').addEventListener('pointerdown', function(e) {
  if (!tw) return;
  twDragging = true; twSx = e.clientX; twSy = e.clientY;
  twOx = tw.offsetLeft; twOy = tw.offsetTop;
  tw.setPointerCapture(e.pointerId);
});
if (tw) {
  tw.addEventListener('pointermove', function(e) {
    if (!twDragging) return;
    tw.style.left = (twOx + e.clientX - twSx) + 'px';
    tw.style.top = (twOy + e.clientY - twSy) + 'px';
  });
  tw.addEventListener('pointerup', function(e) { twDragging = false; if (tw.hasPointerCapture(e.pointerId)) tw.releasePointerCapture(e.pointerId); });
  tw.addEventListener('pointercancel', function(e) { twDragging = false; if (tw.hasPointerCapture(e.pointerId)) tw.releasePointerCapture(e.pointerId); });
}

// ===================================================================
// 键盘快捷键
// ===================================================================
document.addEventListener('keydown', function(e) {
  if (e.ctrlKey && e.key === '`') {
    e.preventDefault();
    if (window.launchApp) window.launchApp('terminal');
    return;
  }
  if (e.key === 'Escape') {
    var startMenu = document.getElementById('start-menu');
    var powerMenu = document.getElementById('power-menu');
    if (startMenu && startMenu.classList.contains('show')) startMenu.classList.remove('show');
    if (powerMenu && powerMenu.style.display === 'block') powerMenu.style.display = 'none';
    if (window.hideContextMenu) window.hideContextMenu();
    return;
  }
});

// ===================================================================
// Toast 通知系统
// ===================================================================
function showToast(message, type) {
  type = type || 'info';
  var toast = document.createElement('div');
  var colors = { info: '#667eea', success: '#81c995', error: '#f28b82', warning: '#fdd663' };
  toast.style.cssText = 'position:fixed;bottom:60px;right:20px;z-index:10000;padding:12px 20px;border-radius:10px;font-size:13px;background:rgba(15,23,42,0.95);color:' + (colors[type] || '#ccc') + ';border:1px solid rgba(255,255,255,0.1);backdrop-filter:blur(20px);box-shadow:0 8px 24px rgba(0,0,0,0.4);max-width:320px;animation:toastSlideIn 0.3s ease;pointer-events:none;';
  toast.textContent = message;
  document.body.appendChild(toast);
  setTimeout(function() {
    toast.style.opacity = '0';
    toast.style.transition = 'opacity 0.3s';
    setTimeout(function() { toast.remove(); }, 300);
  }, 2500);
}
window.showToast = showToast;

var toastStyleEl = document.createElement('style');
toastStyleEl.textContent = '@keyframes toastSlideIn { from { transform: translateX(100px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }';
document.head.appendChild(toastStyleEl);

// ===================================================================
// UI 初始化
// ===================================================================
function initUI() {
  initDesktop();
  initTaskbar();
  initStartMenu();
  initPowerMenu();
  initContextMenu();
  initLockScreen();
  initWallpaper();
  initAppWindow();
  if (window.SystemMonitor) window.SystemMonitor.start();
}

// ===================================================================
// 启动流程
// ===================================================================
async function boot() {
  if (!bootScreen || !appRoot) {
    console.error('Boot: 缺少必要的 DOM 元素');
    return;
  }
  var version = window.__WebNT_VERSION || '2.01';
  try {
    bootLogLine('WebNT 内核 v' + version + ' 正在启动...', 'info');
    bootLogLine('Copyright (c) 2026 WebNT 项目', '');
    bootLogLine('', '');

    bootProgress(10, '阶段 0: 硬件检测');
    bootLogLine('阶段 0: 硬件检测', 'info');
    bootLogLine('  CPU: ' + (navigator.hardwareConcurrency || '?') + ' 核', '');
    bootLogLine('  内存: ' + (navigator.deviceMemory || '?') + ' GB', '');
    var gpuOk = false;
    try { gpuOk = !!navigator.gpu; } catch(e) { gpuOk = false; }
    bootLogLine('  WebGPU: ' + (gpuOk ? '可用' : '不可用'), gpuOk ? 'ok' : 'warn');
    bootLogLine('', '');
    await new Promise(function(r) { setTimeout(r, 300); });

    bootProgress(35, '阶段 1: 内核初始化');
    bootLogLine('阶段 1: 内核初始化', 'info');
    bootLogLine('  [正常] 对象管理器已初始化', 'ok');
    bootLogLine('  [正常] 句柄表就绪', 'ok');
    bootLogLine('  [正常] SMP调度器已启动', 'ok');
    bootLogLine('  [正常] 中断控制器在线', 'ok');
    bootLogLine('', '');
    await new Promise(function(r) { setTimeout(r, 200); });

    bootProgress(55, '阶段 2: 加载驱动');
    bootLogLine('阶段 2: 加载驱动', 'info');
    bootLogLine('  [正常] 显示驱动.WebGPU', 'ok');
    bootLogLine('  [正常] 文件驱动.FS', 'ok');
    bootLogLine('  [正常] 网络驱动.Stream', 'ok');
    bootLogLine('  [正常] 终端驱动.Cmd', 'ok');
    bootLogLine('  [正常] 音频驱动.WA', 'ok');
    bootLogLine('', '');
    await new Promise(function(r) { setTimeout(r, 200); });

    bootProgress(75, '阶段 3: 启动用户会话');
    bootLogLine('阶段 3: 启动用户会话', 'info');
    bootLogLine('  [正常] 会话管理器已启动', 'ok');
    bootLogLine('  [正常] 桌面子系统已加载', 'ok');
    bootLogLine('  [正常] WinHTML 显示管线就绪', 'ok');
    bootLogLine('', '');
    await new Promise(function(r) { setTimeout(r, 200); });

    bootProgress(100, '系统就绪');
    bootLogLine('', '');
    bootLogLine('========================================', '');
    bootLogLine('  WebNT 内核 v' + version + ' 就绪', 'ok');
    bootLogLine('  所有系统运行正常', 'ok');
    bootLogLine('========================================', '');

    await new Promise(function(r) { setTimeout(r, 400); });

    if (bootScreen) bootScreen.classList.add('hidden');
    if (appRoot) appRoot.style.display = 'block';

    var lsVersionEl = document.getElementById('ls-version-text');
    if (lsVersionEl) lsVersionEl.textContent = 'v' + version;

    initUI();

    if (window.loadWallpaper) window.loadWallpaper();
    updateAllClocks();

    setTimeout(function() { if (bootScreen && bootScreen.parentNode) bootScreen.remove(); }, 600);

    console.log('%c WebNT 内核 v' + version + ' 就绪 %c| %c滑动解锁',
      'color:#00ff88;font-size:16px;', '', 'color:#aaa;');
  } catch(err) {
    if (bootLogLine) bootLogLine('启动错误: ' + err.message, 'err');
    console.error('Boot error:', err);
    if (bootScreen) bootScreen.classList.add('hidden');
    if (appRoot) appRoot.style.display = 'block';
    if (lockScreen && lockScreen.style.display !== 'none' && window.unlockDesktop) window.unlockDesktop();
  }
}

boot().catch(function(err) {
  if (bootLogLine) bootLogLine('严重错误: ' + err.message, 'err');
  console.error(err);
  if (bootScreen) bootScreen.classList.add('hidden');
  if (appRoot) appRoot.style.display = 'block';
  if (window.unlockDesktop) window.unlockDesktop();
});

})();
</script>
