<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebNT Music</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #1a1a2e;
    --bg-card: #16213e;
    --bg-elevated: #1f2b47;
    --text: #e0e0e0;
    --text-dim: #8899aa;
    --accent: #4fc3f7;
    --accent-glow: rgba(79, 195, 247, 0.25);
    --progress-bg: #2a3a5c;
    --slider-track: #2a3a5c;
    --radius: 12px;
    --radius-sm: 8px;
    --transition: 0.2s ease;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    height: 100vh;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
    -webkit-user-select: none;
  }

  .player {
    width: 100%;
    max-width: 420px;
    height: 100vh;
    max-height: 700px;
    display: flex;
    flex-direction: column;
    padding: 24px 20px;
    gap: 20px;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .header-brand {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .header-logo {
    width: 36px;
    height: 36px;
    background: var(--accent);
    border-radius: var(--radius-sm);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    color: #1a1a2e;
    font-weight: 700;
  }
  .header-title {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.4px;
  }
  .header-subtitle {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .playlist-btn {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background: var(--bg-elevated);
    border: 1px solid rgba(255,255,255,0.06);
    color: var(--text-dim);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    transition: all var(--transition);
  }
  .playlist-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.15); }
  .playlist-btn.active { color: var(--accent); border-color: var(--accent); }

  /* Artwork */
  .artwork-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 1;
    max-height: 320px;
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: 0 12px 40px rgba(0,0,0,0.4);
    flex-shrink: 0;
  }
  .artwork {
    width: 100%;
    height: 100%;
    background: var(--bg-card);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.4s ease;
  }
  .artwork svg {
    width: 40%;
    height: 40%;
    opacity: 0.5;
    transition: opacity 0.4s ease;
  }
  .artwork.playing svg { opacity: 0.8; }
  .artwork-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, transparent 60%, rgba(26,26,46,0.85));
    pointer-events: none;
  }
  .artwork-eq {
    position: absolute;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 3px;
    align-items: flex-end;
    height: 40px;
    pointer-events: none;
  }
  .eq-bar {
    width: 4px;
    border-radius: 2px;
    background: var(--accent);
    transition: height 0.15s ease;
    height: 4px;
  }
  .playing .eq-bar {
    animation: eq 0.8s ease-in-out infinite alternate;
  }
  .playing .eq-bar:nth-child(1) { animation-delay: 0s; }
  .playing .eq-bar:nth-child(2) { animation-delay: 0.15s; }
  .playing .eq-bar:nth-child(3) { animation-delay: 0.3s; }
  .playing .eq-bar:nth-child(4) { animation-delay: 0.45s; }
  .playing .eq-bar:nth-child(5) { animation-delay: 0.6s; }
  .playing .eq-bar:nth-child(6) { animation-delay: 0.1s; }
  .playing .eq-bar:nth-child(7) { animation-delay: 0.25s; }
  .playing .eq-bar:nth-child(8) { animation-delay: 0.4s; }

  @keyframes eq {
    0% { height: 4px; }
    100% { height: var(--h, 28px); }
  }

  /* Track Info */
  .track-info {
    text-align: center;
    flex-shrink: 0;
  }
  .track-title {
    font-size: 20px;
    font-weight: 700;
    line-height: 1.3;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .track-artist {
    font-size: 14px;
    color: var(--text-dim);
    margin-top: 4px;
  }
  .track-album {
    font-size: 12px;
    color: var(--text-dim);
    opacity: 0.7;
    margin-top: 2px;
  }

  /* Progress */
  .progress-section {
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .progress-bar {
    position: relative;
    height: 5px;
    background: var(--progress-bg);
    border-radius: 3px;
    cursor: pointer;
    overflow: visible;
  }
  .progress-bar:hover { height: 7px; margin-top: -1px; margin-bottom: -1px; }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 3px;
    transition: width 0.15s linear;
    position: relative;
  }
  .progress-fill::after {
    content: '';
    position: absolute;
    right: -5px;
    top: 50%;
    transform: translateY(-50%);
    width: 11px;
    height: 11px;
    background: var(--accent);
    border-radius: 50%;
    box-shadow: 0 0 8px var(--accent-glow);
    opacity: 0;
    transition: opacity var(--transition);
  }
  .progress-bar:hover .progress-fill::after { opacity: 1; }
  .progress-times {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--text-dim);
    font-variant-numeric: tabular-nums;
    font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
  }

  /* Controls */
  .controls {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
  }
  .ctrl-btn {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: transparent;
    border: none;
    color: var(--text);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    transition: all var(--transition);
  }
  .ctrl-btn:hover { color: var(--accent); }
  .ctrl-btn.play-btn {
    width: 56px;
    height: 56px;
    background: var(--accent);
    color: #1a1a2e;
    font-size: 24px;
    box-shadow: 0 4px 20px var(--accent-glow);
  }
  .ctrl-btn.play-btn:hover {
    transform: scale(1.06);
    box-shadow: 0 6px 28px var(--accent-glow);
  }
  .ctrl-btn.play-btn:active { transform: scale(0.96); }
  .ctrl-btn:active { transform: scale(0.92); }

  /* Volume */
  .volume-section {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 8px;
  }
  .volume-icon {
    font-size: 18px;
    color: var(--text-dim);
    cursor: pointer;
    width: 24px;
    text-align: center;
    transition: color var(--transition);
  }
  .volume-icon:hover { color: var(--text); }
  .volume-slider {
    flex: 1;
    -webkit-appearance: none;
    appearance: none;
    height: 4px;
    background: var(--slider-track);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  .volume-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    box-shadow: 0 0 6px var(--accent-glow);
    transition: transform var(--transition);
  }
  .volume-slider::-webkit-slider-thumb:hover { transform: scale(1.2); }
  .volume-slider::-moz-range-thumb {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
    cursor: pointer;
  }

  /* Playlist Dropdown */
  .playlist-panel {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--bg-card);
    border-radius: var(--radius) var(--radius) 0 0;
    box-shadow: 0 -8px 40px rgba(0,0,0,0.5);
    padding: 8px 0 20px;
    z-index: 100;
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    max-height: 60vh;
    display: flex;
    flex-direction: column;
  }
  .playlist-panel.open { transform: translateY(0); }
  .playlist-handle {
    width: 40px;
    height: 4px;
    background: rgba(255,255,255,0.2);
    border-radius: 2px;
    margin: 0 auto 12px;
    flex-shrink: 0;
  }
  .playlist-header {
    padding: 0 20px 12px;
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    flex-shrink: 0;
  }
  .playlist-list {
    flex: 1;
    overflow-y: auto;
    padding: 0 12px;
  }
  .playlist-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: background var(--transition);
  }
  .playlist-item:hover { background: var(--bg-elevated); }
  .playlist-item.active { background: var(--bg-elevated); }
  .playlist-item.active .pl-track { color: var(--accent); }
  .pl-num {
    width: 24px;
    text-align: center;
    font-size: 13px;
    color: var(--text-dim);
    flex-shrink: 0;
  }
  .playlist-item.active .pl-num { color: var(--accent); font-weight: 700; }
  .pl-art {
    width: 36px;
    height: 36px;
    border-radius: 6px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
  }
  .pl-info { flex: 1; min-width: 0; }
  .pl-track { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .pl-artist { font-size: 11px; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .pl-now {
    width: 20px;
    text-align: center;
    font-size: 12px;
    color: var(--accent);
    flex-shrink: 0;
  }

  /* Backdrop */
  .playlist-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 99;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
  }
  .playlist-backdrop.open { opacity: 1; pointer-events: auto; }

  /* Scrollbar */
  .playlist-list::-webkit-scrollbar { width: 4px; }
  .playlist-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }
</style>
</head>
<body>

<div class="player">
  <div class="header">
    <div class="header-brand">
      <div class="header-logo">♪</div>
      <div>
        <div class="header-title">WebNT Music</div>
        <div class="header-subtitle">Now Playing</div>
      </div>
    </div>
    <button class="playlist-btn" id="playlistToggle" title="播放列表">☰</button>
  </div>

  <div class="artwork-wrap">
    <div class="artwork" id="artwork">
      <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="50" cy="50" r="40" stroke="currentColor" stroke-width="2" opacity="0.3"/>
        <circle cx="50" cy="50" r="28" stroke="currentColor" stroke-width="1.5" opacity="0.5"/>
        <circle cx="50" cy="50" r="16" fill="currentColor" opacity="0.6"/>
        <circle cx="44" cy="44" r="4" fill="currentColor" opacity="0.9"/>
      </svg>
    </div>
    <div class="artwork-overlay"></div>
    <div class="artwork-eq" id="eqBars">
      <div class="eq-bar" style="--h:18px"></div>
      <div class="eq-bar" style="--h:32px"></div>
      <div class="eq-bar" style="--h:26px"></div>
      <div class="eq-bar" style="--h:38px"></div>
      <div class="eq-bar" style="--h:22px"></div>
      <div class="eq-bar" style="--h:30px"></div>
      <div class="eq-bar" style="--h:35px"></div>
      <div class="eq-bar" style="--h:20px"></div>
    </div>
  </div>

  <div class="track-info">
    <div class="track-title" id="trackTitle">—</div>
    <div class="track-artist" id="trackArtist">—</div>
    <div class="track-album" id="trackAlbum">—</div>
  </div>

  <div class="progress-section">
    <div class="progress-bar" id="progressBar">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
    <div class="progress-times">
      <span id="currentTime">0:00</span>
      <span id="duration">3:42</span>
    </div>
  </div>

  <div class="controls">
    <button class="ctrl-btn" id="prevBtn" title="上一首">⏮</button>
    <button class="ctrl-btn play-btn" id="playBtn" title="播放">▶</button>
    <button class="ctrl-btn" id="nextBtn" title="下一首">⏭</button>
  </div>

  <div class="volume-section">
    <span class="volume-icon" id="volumeIcon" title="音量">🔊</span>
    <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="70" title="音量">
  </div>
</div>

<div class="playlist-backdrop" id="playlistBackdrop"></div>
<div class="playlist-panel" id="playlistPanel">
  <div class="playlist-handle"></div>
  <div class="playlist-header">播放列表</div>
  <div class="playlist-list" id="playlistList"></div>
</div>

<script>
(function() {
  const PLAYLIST = [
    { title: '星河漫步', artist: 'Lunar Echo', album: 'Stellar Drift', dur: '4:12', color: '#4fc3f7' },
    { title: '霓虹雨夜', artist: 'Neon Pulse', album: 'City Lights', dur: '3:47', color: '#ce93d8' },
    { title: '深空回响', artist: 'Void Walker', album: 'Cosmos', dur: '5:03', color: '#80cbc4' },
    { title: '晨曦微光', artist: 'Dawn Breaker', album: 'First Light', dur: '3:28', color: '#fff176' },
    { title: '电子潮汐', artist: 'Waveform', album: 'Tidal', dur: '4:35', color: '#64b5f6' },
    { title: '午夜爵士', artist: 'Blue Note', album: 'After Hours', dur: '6:12', color: '#ef9a9a' },
    { title: '数字梦境', artist: 'Pixel Dreams', album: 'Binary', dur: '3:55', color: '#a5d6a7' },
    { title: '极光之舞', artist: 'Aurora', album: 'Northern Lights', dur: '4:01', color: '#b39ddb' },
    { title: '钢铁森林', artist: 'Concrete Jungle', album: 'Urban Tales', dur: '3:38', color: '#90a4ae' },
    { title: '落日飞车', artist: 'Sunset Rider', album: 'Horizon', dur: '4:22', color: '#ffab91' },
  ];

  const STORAGE_KEY_VOL = 'webnt_music_volume';
  const STORAGE_KEY_TRACK = 'webnt_music_track';

  let currentIndex = 0;
  let isPlaying = false;
  let volume = 0.7;
  let progressInterval = null;
  let progress = 0;
  let playlistOpen = false;

  // DOM refs
  const $ = id => document.getElementById(id);
  const artwork = $('artwork');
  const trackTitle = $('trackTitle');
  const trackArtist = $('trackArtist');
  const trackAlbum = $('trackAlbum');
  const progressFill = $('progressFill');
  const progressBar = $('progressBar');
  const currentTimeEl = $('currentTime');
  const durationEl = $('duration');
  const playBtn = $('playBtn');
  const prevBtn = $('prevBtn');
  const nextBtn = $('nextBtn');
  const volumeSlider = $('volumeSlider');
  const volumeIcon = $('volumeIcon');
  const playlistToggle = $('playlistToggle');
  const playlistPanel = $('playlistPanel');
  const playlistBackdrop = $('playlistBackdrop');
  const playlistList = $('playlistList');

  function loadState() {
    const savedVol = localStorage.getItem(STORAGE_KEY_VOL);
    if (savedVol !== null) {
      volume = parseFloat(savedVol);
      volume = Math.max(0, Math.min(1, volume));
    }
    const savedTrack = localStorage.getItem(STORAGE_KEY_TRACK);
    if (savedTrack !== null) {
      const idx = parseInt(savedTrack, 10);
      if (idx >= 0 && idx < PLAYLIST.length) currentIndex = idx;
    }
  }

  function saveState() {
    localStorage.setItem(STORAGE_KEY_VOL, volume);
    localStorage.setItem(STORAGE_KEY_TRACK, currentIndex);
  }

  function getTrack() { return PLAYLIST[currentIndex]; }

  function updateTrackDisplay() {
    const t = getTrack();
    trackTitle.textContent = t.title;
    trackArtist.textContent = t.artist;
    trackAlbum.textContent = t.album;
    durationEl.textContent = t.dur;
    artwork.style.background = t.color + '18';
    artwork.querySelector('svg').style.color = t.color;
    updatePlaylistHighlight();
    saveState();
  }

  function updatePlayPauseBtn() {
    playBtn.textContent = isPlaying ? '⏸' : '▶';
  }

  function updateArtworkPlaying() {
    if (isPlaying) {
      artwork.classList.add('playing');
    } else {
      artwork.classList.remove('playing');
    }
  }

  function formatTime(percent, durStr) {
    const parts = durStr.split(':');
    const totalSec = parseInt(parts[0]) * 60 + parseInt(parts[1]);
    const sec = Math.floor(totalSec * percent);
    const m = Math.floor(sec / 60);
    const s = sec % 60;
    return m + ':' + String(s).padStart(2, '0');
  }

  function startProgress() {
    stopProgress();
    const dur = getTrack().dur;
    const parts = dur.split(':');
    const totalSec = parseInt(parts[0]) * 60 + parseInt(parts[1]);
    const stepMs = 200;
    const stepPct = (stepMs / 1000) / totalSec;

    progressInterval = setInterval(() => {
      progress += stepPct;
      if (progress >= 1) {
        progress = 0;
        nextTrack();
      }
      updateProgressUI();
    }, stepMs);
  }

  function stopProgress() {
    if (progressInterval) {
      clearInterval(progressInterval);
      progressInterval = null;
    }
  }

  function updateProgressUI() {
    const pct = Math.round(progress * 1000) / 10;
    progressFill.style.width = pct + '%';
    currentTimeEl.textContent = formatTime(progress, getTrack().dur);
  }

  function play() {
    isPlaying = true;
    updatePlayPauseBtn();
    updateArtworkPlaying();
    startProgress();
  }

  function pause() {
    isPlaying = false;
    updatePlayPauseBtn();
    updateArtworkPlaying();
    stopProgress();
  }

  function togglePlay() {
    if (isPlaying) pause(); else play();
  }

  function nextTrack() {
    stopProgress();
    progress = 0;
    currentIndex = (currentIndex + 1) % PLAYLIST.length;
    updateTrackDisplay();
    updateProgressUI();
    durationEl.textContent = getTrack().dur;
    currentTimeEl.textContent = '0:00';
    if (isPlaying) startProgress();
  }

  function prevTrack() {
    stopProgress();
    progress = 0;
    currentIndex = (currentIndex - 1 + PLAYLIST.length) % PLAYLIST.length;
    updateTrackDisplay();
    updateProgressUI();
    durationEl.textContent = getTrack().dur;
    currentTimeEl.textContent = '0:00';
    if (isPlaying) startProgress();
  }

  function setVolume(val) {
    volume = val;
    volumeSlider.value = Math.round(val * 100);
    updateVolumeIcon();
    saveState();
  }

  function updateVolumeIcon() {
    if (volume === 0) volumeIcon.textContent = '🔇';
    else if (volume < 0.33) volumeIcon.textContent = '🔈';
    else if (volume < 0.66) volumeIcon.textContent = '🔉';
    else volumeIcon.textContent = '🔊';
  }

  function toggleMute() {
    if (volume > 0) {
      setVolume(0);
    } else {
      setVolume(0.7);
    }
  }

  function buildPlaylist() {
    playlistList.innerHTML = '';
    PLAYLIST.forEach((t, i) => {
      const item = document.createElement('div');
      item.className = 'playlist-item' + (i === currentIndex ? ' active' : '');
      item.innerHTML = `
        <span class="pl-num">${String(i + 1).padStart(2, '0')}</span>
        <div class="pl-art" style="background:${t.color}22;color:${t.color}">♪</div>
        <div class="pl-info">
          <div class="pl-track">${t.title}</div>
          <div class="pl-artist">${t.artist}</div>
        </div>
        <span class="pl-now">${i === currentIndex && isPlaying ? '▶' : ''}</span>
      `;
      item.addEventListener('click', () => {
        if (i === currentIndex) return;
        stopProgress();
        progress = 0;
        currentIndex = i;
        updateTrackDisplay();
        updateProgressUI();
        currentTimeEl.textContent = '0:00';
        updatePlaylistHighlight();
        if (isPlaying) startProgress();
        closePlaylist();
      });
      playlistList.appendChild(item);
    });
  }

  function updatePlaylistHighlight() {
    const items = playlistList.querySelectorAll('.playlist-item');
    items.forEach((el, i) => {
      el.classList.toggle('active', i === currentIndex);
      const nowEl = el.querySelector('.pl-now');
      nowEl.textContent = (i === currentIndex && isPlaying) ? '▶' : '';
    });
  }

  function openPlaylist() {
    playlistOpen = true;
    playlistPanel.classList.add('open');
    playlistBackdrop.classList.add('open');
    playlistToggle.classList.add('active');
    buildPlaylist();
  }

  function closePlaylist() {
    playlistOpen = false;
    playlistPanel.classList.remove('open');
    playlistBackdrop.classList.remove('open');
    playlistToggle.classList.remove('active');
  }

  function togglePlaylist() {
    if (playlistOpen) closePlaylist(); else openPlaylist();
  }

  // Progress bar click / drag
  function seekFromEvent(e) {
    const rect = progressBar.getBoundingClientRect();
    const x = Math.max(0, Math.min(e.clientX - rect.left, rect.width));
    progress = x / rect.width;
    updateProgressUI();
    if (isPlaying) {
      stopProgress();
      startProgress();
    }
  }

  let isDragging = false;
  progressBar.addEventListener('mousedown', e => {
    isDragging = true;
    seekFromEvent(e);
  });
  document.addEventListener('mousemove', e => {
    if (isDragging) seekFromEvent(e);
  });
  document.addEventListener('mouseup', () => { isDragging = false; });

  // Touch support
  progressBar.addEventListener('touchstart', e => {
    isDragging = true;
    seekFromEvent(e.touches[0]);
  });
  document.addEventListener('touchmove', e => {
    if (isDragging) seekFromEvent(e.touches[0]);
  });
  document.addEventListener('touchend', () => { isDragging = false; });

  // Keyboard
  document.addEventListener('keydown', e => {
    if (e.code === 'Space') {
      e.preventDefault();
      togglePlay();
    } else if (e.code === 'ArrowRight' && e.metaKey) {
      e.preventDefault();
      nextTrack();
    } else if (e.code === 'ArrowLeft' && e.metaKey) {
      e.preventDefault();
      prevTrack();
    } else if (e.code === 'ArrowUp') {
      e.preventDefault();
      setVolume(Math.min(1, volume + 0.05));
    } else if (e.code === 'ArrowDown') {
      e.preventDefault();
      setVolume(Math.max(0, volume - 0.05));
    }
  });

  // Event bindings
  playBtn.addEventListener('click', togglePlay);
  prevBtn.addEventListener('click', prevTrack);
  nextBtn.addEventListener('click', nextTrack);
  volumeSlider.addEventListener('input', () => setVolume(volumeSlider.value / 100));
  volumeIcon.addEventListener('click', toggleMute);
  playlistToggle.addEventListener('click', togglePlaylist);
  playlistBackdrop.addEventListener('click', closePlaylist);

  // Init
  loadState();
  volumeSlider.value = Math.round(volume * 100);
  updateVolumeIcon();
  updateTrackDisplay();
  updatePlayPauseBtn();
  updateArtworkPlaying();
  currentTimeEl.textContent = '0:00';
  durationEl.textContent = getTrack().dur;
  progressFill.style.width = '0%';
})();
</script>
</body>
</html>
