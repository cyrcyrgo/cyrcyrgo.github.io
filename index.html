<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="format-detection" content="telephone=no">
  <title>AI 偶像聊天室</title>
  <style>
    /* ===== Reset & Base ===== */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      /* 暖色系 · 温馨偶像风 */
      --bg-primary: #1a1410;
      --bg-secondary: #231d18;
      --bg-card: #2d2620;
      --text-primary: #f0ece4;
      --text-secondary: #a09488;
      --accent: #e8865e;
      --accent-hover: #d6754d;
      --accent-glow: rgba(232, 134, 94, 0.25);
      --user-msg-bg: #c47a5a;
      --ai-msg-bg: #2d2620;
      --border-color: #3a3028;
      --radius: 12px;
      --radius-lg: 18px;
      --shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
      /* 各偶像主题色 */
      --star-ding: #e8865e;
      --star-chen: #7cb89a;
      --star-zhang: #7a9ec7;
    }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
      -webkit-overflow-scrolling: touch;
      touch-action: manipulation;
    }

    /* ===== Layout ===== */
    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
      max-width: 800px;
      margin: 0 auto;
      background: var(--bg-secondary);
      box-shadow: var(--shadow);
      overscroll-behavior: none;
    }

    /* ===== Header ===== */
    .header {
      padding: 18px 20px 14px;
      text-align: center;
      border-bottom: 1px solid var(--border-color);
      flex-shrink: 0;
    }

    .header h1 {
      font-size: 20px;
      font-weight: 700;
      background: linear-gradient(135deg, #e8865e, #d4a373, #7cb89a);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 1px;
    }

    .header p {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 2px;
    }

    /* ===== Star Selector ===== */
    .star-selector {
      display: flex;
      gap: 10px;
      padding: 14px 20px;
      justify-content: center;
      flex-shrink: 0;
      border-bottom: 1px solid var(--border-color);
      background: var(--bg-primary);
      position: relative;
    }
    .star-selector::after {
      content: '';
      position: absolute;
      right: 0;
      top: 0;
      bottom: 0;
      width: 32px;
      background: linear-gradient(to right, transparent, var(--bg-primary));
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .star-selector.can-scroll::after { opacity: 1; }

    .star-btn {
      flex: 1;
      max-width: 140px;
      padding: 10px 0;
      border: 2px solid var(--border-color);
      border-radius: 50px;
      background: transparent;
      color: var(--text-secondary);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .star-btn::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 3px;
      border-radius: 3px;
      background: var(--accent);
      transition: width 0.3s ease;
    }

    .star-btn:hover {
      color: var(--text-primary);
      border-color: var(--accent);
    }

    .star-btn.active {
      color: #fff;
    }

    .star-btn.active::after {
      width: 60%;
    }

    .star-btn[data-star="丁程鑫"].active {
      border-color: var(--star-ding);
      background: linear-gradient(135deg, rgba(232, 134, 94, 0.25), rgba(232, 134, 94, 0.08));
      box-shadow: 0 0 20px rgba(232, 134, 94, 0.25), inset 0 0 20px rgba(232, 134, 94, 0.1);
    }
    .star-btn[data-star="陈奕恒"].active {
      border-color: var(--star-chen);
      background: linear-gradient(135deg, rgba(124, 184, 154, 0.25), rgba(124, 184, 154, 0.08));
      box-shadow: 0 0 20px rgba(124, 184, 154, 0.25), inset 0 0 20px rgba(124, 184, 154, 0.1);
    }
    .star-btn[data-star="张真源"].active {
      border-color: var(--star-zhang);
      background: linear-gradient(135deg, rgba(122, 158, 199, 0.25), rgba(122, 158, 199, 0.08));
      box-shadow: 0 0 20px rgba(122, 158, 199, 0.25), inset 0 0 20px rgba(122, 158, 199, 0.1);
    }

    .star-btn .star-emoji {
      margin-right: 4px;
      font-size: 16px;
    }

    /* ===== Chat Container ===== */
    .chat-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    /* ===== Messages ===== */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar {
      width: 5px;
    }

    .messages::-webkit-scrollbar-track {
      background: transparent;
    }

    .messages::-webkit-scrollbar-thumb {
      background: var(--border-color);
      border-radius: 10px;
    }

    /* ===== Message Bubbles ===== */
    .message {
      display: flex;
      gap: 10px;
      max-width: 85%;
      animation: msgFadeIn 0.3s ease;
    }

    @keyframes msgFadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .message.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .message.ai {
      align-self: flex-start;
    }

    .message .avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .message.user .avatar {
      background: linear-gradient(135deg, var(--accent), var(--accent-hover));
      order: 1;
    }

    .message.ai .avatar {
      background: linear-gradient(135deg, #e8865e, #c47a5a);
    }

    .message.ai[data-star="丁程鑫"] .avatar {
      background: linear-gradient(135deg, var(--star-ding), #d9754e);
    }
    .message.ai[data-star="陈奕恒"] .avatar {
      background: linear-gradient(135deg, var(--star-chen), #6ba88a);
    }
    .message.ai[data-star="张真源"] .avatar {
      background: linear-gradient(135deg, var(--star-zhang), #6a8eb7);
    }

    .message .bubble {
      padding: 11px 16px;
      border-radius: var(--radius-lg);
      font-size: 14px;
      line-height: 1.65;
      word-break: break-word;
      white-space: pre-wrap;
    }

    .message.user .bubble {
      background: var(--user-msg-bg);
      border-bottom-right-radius: 4px;
      color: #fff;
    }

    .message.ai .bubble {
      background: var(--ai-msg-bg);
      border-bottom-left-radius: 4px;
      border: 1px solid var(--border-color);
    }

    /* ===== Typing Indicator ===== */
    .typing .bubble {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 14px 18px;
    }

    .typing .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--text-secondary);
      animation: typingBounce 1.4s ease-in-out infinite;
    }

    .typing .dot:nth-child(2) { animation-delay: 0.2s; }
    .typing .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    /* ===== Message Time ===== */
    .message .time {
      font-size: 11px;
      color: var(--text-secondary);
      align-self: flex-end;
      padding: 0 4px 2px;
      flex-shrink: 0;
    }

    /* ===== Empty State ===== */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--text-secondary);
      padding: 20px;
      text-align: center;
    }

    .empty-state .icon {
      font-size: 52px;
      opacity: 0.5;
    }

    .empty-state h3 {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .empty-state p {
      font-size: 13px;
      max-width: 260px;
    }

    /* ===== Input Area ===== */
    .input-area {
      display: flex;
      gap: 10px;
      padding: 14px 20px;
      border-top: 1px solid var(--border-color);
      background: var(--bg-primary);
      flex-shrink: 0;
      align-items: flex-end;
    }

    .input-wrapper {
      flex: 1;
      display: flex;
      align-items: flex-end;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 24px;
      padding: 2px 4px 2px 16px;
      transition: border-color 0.3s;
    }

    .input-wrapper:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 12px var(--accent-glow);
    }

    .input-wrapper textarea {
      flex: 1;
      border: none;
      background: transparent;
      color: var(--text-primary);
      font-size: 14px;
      line-height: 1.5;
      padding: 10px 0;
      resize: none;
      outline: none;
      font-family: inherit;
      max-height: 100px;
    }

    .input-wrapper textarea::placeholder {
      color: var(--text-secondary);
    }

    .send-btn {
      width: 40px;
      height: 40px;
      border: none;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent-hover));
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      transition: all 0.2s;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .send-btn:hover:not(:disabled) {
      transform: scale(1.05);
      box-shadow: 0 0 16px var(--accent-glow);
    }

    .send-btn:active:not(:disabled) {
      transform: scale(0.95);
    }

    .send-btn:disabled {
      background: var(--border-color);
      color: var(--text-secondary);
      cursor: not-allowed;
    }

    /* ===== Responsive ===== */

    /* 小手机 (< 420px) */
    @media (max-width: 420px) {
      .app {
        max-width: 100%;
        height: 100dvh;
      }

      .header {
        padding: 12px 14px 10px;
        padding-top: max(12px, env(safe-area-inset-top, 12px));
      }
      .header h1 { font-size: 16px; }
      .header p { font-size: 11px; }

      .settings-toggle {
        top: max(10px, env(safe-area-inset-top, 10px));
        right: 10px;
        width: 30px;
        height: 30px;
        font-size: 14px;
      }

      .star-selector {
        gap: 6px;
        padding: 10px 12px;
        overflow-x: auto;
        overflow-y: hidden;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
        justify-content: flex-start;
      }
      .star-selector::-webkit-scrollbar { display: none; }

      .star-btn {
        flex: 0 0 auto;
        max-width: none;
        padding: 7px 14px;
        font-size: 12px;
        white-space: nowrap;
      }
      .star-btn .star-emoji { margin-right: 3px; }

      .messages {
        padding: 10px 10px;
        gap: 10px;
      }
      .message { max-width: 88%; }

      .message .bubble {
        font-size: 13px;
        padding: 8px 12px;
      }
      .message .avatar {
        width: 28px;
        height: 28px;
        font-size: 13px;
      }
      .message .time { font-size: 10px; }

      .input-area {
        padding: 8px 10px;
        gap: 8px;
        padding-bottom: max(8px, env(safe-area-inset-bottom, 8px));
      }
      .input-wrapper { border-radius: 20px; }
      .input-wrapper textarea {
        font-size: 13px;
        padding: 8px 0;
      }
      .send-btn {
        width: 36px;
        height: 36px;
        font-size: 15px;
      }

      .empty-state .icon { font-size: 36px; }
      .empty-state h3 { font-size: 14px; }
      .empty-state p { font-size: 12px; }

      /* 设置面板全屏 */
      .settings-panel {
        max-width: 100%;
        max-height: 90vh;
        border-radius: 16px 16px 0 0;
        margin-top: auto;
      }
      .settings-overlay { align-items: flex-end; padding: 0; }
      .settings-header { padding: 14px 16px; }
      .settings-body { padding: 12px 16px; }
      .settings-footer { padding: 12px 16px; padding-bottom: max(12px, env(safe-area-inset-bottom, 12px)); }

      .edit-modal {
        max-width: 100%;
        margin: 0 12px;
        border-radius: 16px;
      }
      .star-card { padding: 12px 14px; }

      .star-card-emoji { font-size: 22px; }
      .star-card-actions button {
        width: 28px;
        height: 28px;
        font-size: 13px;
      }
      .add-star-btn { font-size: 13px; padding: 10px; }
    }

    /* 普通手机 (420px - 768px) */
    @media (min-width: 421px) and (max-width: 768px) {
      .app {
        max-width: 100%;
        height: 100dvh;
      }

      .header {
        padding: 14px 18px 12px;
      }
      .header h1 { font-size: 18px; }
      .header p { font-size: 12px; }

      .settings-toggle {
        top: 12px;
        right: 14px;
        width: 32px;
        height: 32px;
        font-size: 16px;
      }

      .star-selector {
        gap: 8px;
        padding: 12px 16px;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
        justify-content: flex-start;
      }
      .star-selector::-webkit-scrollbar { display: none; }

      .star-btn {
        flex: 0 0 auto;
        max-width: none;
        padding: 8px 16px;
        font-size: 13px;
        white-space: nowrap;
      }

      .messages { padding: 14px 16px; gap: 12px; }
      .message { max-width: 85%; }

      .message .bubble { font-size: 14px; padding: 10px 14px; }
      .message .avatar { width: 30px; height: 30px; font-size: 14px; }

      .input-area {
        padding: 10px 16px;
        gap: 8px;
        padding-bottom: max(10px, env(safe-area-inset-bottom, 10px));
      }
      .input-wrapper { border-radius: 22px; }

      .settings-panel {
        max-width: 480px;
        max-height: 80vh;
      }
      .settings-panel { border-radius: 16px; }

      .star-card-emoji { font-size: 24px; }
    }

    /* 桌面端 */
    @media (min-width: 769px) {
      .app {
        margin: 12px auto;
        height: calc(100vh - 24px);
        border-radius: var(--radius);
      }

      .messages {
        padding: 20px 24px;
      }

      .input-area {
        padding: 16px 24px;
      }
    }

    /* ===== Settings Panel ===== */
    .settings-toggle {
      position: absolute;
      top: 14px;
      right: 16px;
      width: 36px;
      height: 36px;
      border: 1px solid var(--border-color);
      border-radius: 50%;
      background: var(--bg-card);
      color: var(--text-secondary);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      z-index: 5;
    }
    .settings-toggle:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .settings-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .settings-panel {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      max-width: 520px;
      width: 100%;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
      animation: slideUp 0.25s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .settings-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border-color);
    }
    .settings-header h2 {
      font-size: 17px;
      font-weight: 600;
    }
    .settings-close {
      width: 32px;
      height: 32px;
      border: none;
      border-radius: 50%;
      background: var(--bg-card);
      color: var(--text-secondary);
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .settings-close:hover {
      background: var(--border-color);
      color: var(--text-primary);
    }

    .settings-body {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
    }
    .settings-body::-webkit-scrollbar {
      width: 4px;
    }
    .settings-body::-webkit-scrollbar-thumb {
      background: var(--border-color);
      border-radius: 4px;
    }

    .star-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 12px;
      transition: border-color 0.2s;
    }
    .star-card:hover {
      border-color: var(--accent);
    }

    .star-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .star-card-info {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .star-card-emoji {
      font-size: 28px;
      line-height: 1;
    }
    .star-card-name {
      font-weight: 600;
      font-size: 15px;
    }
    .star-card-actions {
      display: flex;
      gap: 6px;
    }
    .star-card-actions button {
      width: 30px;
      height: 30px;
      border: 1px solid var(--border-color);
      border-radius: 6px;
      background: transparent;
      color: var(--text-secondary);
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }
    .star-card-actions .edit-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    .star-card-actions .del-btn:hover {
      border-color: #e85a5a;
      color: #e85a5a;
    }
    .star-card-prompt {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .add-star-btn {
      width: 100%;
      padding: 12px;
      border: 2px dashed var(--border-color);
      border-radius: var(--radius);
      background: transparent;
      color: var(--text-secondary);
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 4px;
    }
    .add-star-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .settings-footer {
      padding: 14px 20px;
      border-top: 1px solid var(--border-color);
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }
    .settings-footer button {
      padding: 8px 20px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      border: none;
    }
    .settings-save {
      background: linear-gradient(135deg, var(--accent), var(--accent-hover));
      color: #fff;
    }
    .settings-save:hover {
      box-shadow: 0 0 12px var(--accent-glow);
    }
    .settings-cancel {
      background: var(--bg-card);
      color: var(--text-secondary);
      border: 1px solid var(--border-color) !important;
    }
    .settings-cancel:hover {
      color: var(--text-primary);
      border-color: var(--text-secondary) !important;
    }

    /* ===== Edit Modal ===== */
    .edit-modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .edit-modal {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      max-width: 440px;
      width: 100%;
      padding: 24px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    }
    .edit-modal h3 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 16px;
    }
    .edit-field {
      margin-bottom: 14px;
    }
    .edit-field label {
      display: block;
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 4px;
      font-weight: 500;
    }
    .edit-field input,
    .edit-field textarea {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      background: var(--bg-card);
      color: var(--text-primary);
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
      box-sizing: border-box;
    }
    .edit-field input:focus,
    .edit-field textarea:focus {
      border-color: var(--accent);
    }
    .edit-field textarea {
      min-height: 100px;
      resize: vertical;
    }
    .edit-emoji-color {
      display: flex;
      gap: 12px;
    }
    .edit-emoji-color .edit-field {
      flex: 1;
    }
    .edit-modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 20px;
    }
    .edit-modal-actions button {
      padding: 8px 20px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: all 0.15s;
    }
    .edit-modal-save {
      background: linear-gradient(135deg, var(--accent), var(--accent-hover));
      color: #fff;
    }
    .edit-modal-save:hover {
      box-shadow: 0 0 12px var(--accent-glow);
    }
    .edit-modal-cancel {
      background: var(--bg-card);
      color: var(--text-secondary);
      border: 1px solid var(--border-color) !important;
    }
    .edit-modal-cancel:hover {
      color: var(--text-primary);
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header" style="position:relative;">
      <h1>&#9733; AI 偶像聊天室</h1>
      <p>选择你的偶像，开启专属对话</p>
      <button class="settings-toggle" id="settingsToggle" title="管理偶像">&#9881;</button>
    </header>

    <!-- Star Selector -->
    <div class="star-selector" id="starSelector"></div>

    <!-- Chat Container -->
    <div class="chat-container">
      <div class="messages" id="messages">
        <div class="empty-state" id="emptyState">
          <div class="icon">&#128172;</div>
          <h3>开始聊天</h3>
          <p>请在上方选择一位偶像，然后发送消息开始对话吧</p>
        </div>
      </div>

      <!-- Input Area -->
      <div class="input-area">
        <div class="input-wrapper">
          <textarea id="messageInput" rows="1" placeholder="输入你想说的话..." maxlength="500"></textarea>
          <button class="send-btn" id="sendBtn" disabled title="发送">
            &#10148;
          </button>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function () {
      'use strict';

      /* ===== Configuration ===== */
      const CONFIG = {
        API_URL: 'https://crummiest-pronto-lung.ngrok-free.dev/chat',
        STORAGE_KEY: 'idol-chat-history',
        MAX_MESSAGE_LENGTH: 500,
      };

      /* ===== State ===== */
      let stars = [];            // 从后端加载的偶像列表
      let currentStar = null;
      let messages = [];
      let isStreaming = false;
      let abortController = null;

      /* ===== DOM Refs ===== */
      const starSelector = document.getElementById('starSelector');
      const messagesEl = document.getElementById('messages');
      const emptyState = document.getElementById('emptyState');
      const inputEl = document.getElementById('messageInput');
      const sendBtn = document.getElementById('sendBtn');
      const settingsToggle = document.getElementById('settingsToggle');

      /* ===== Utils ===== */
      function getTimestamp() {
        const now = new Date();
        const pad = n => String(n).padStart(2, '0');
        return `${pad(now.getHours())}:${pad(now.getMinutes())}`;
      }

      function getFullTimestamp() {
        const now = new Date();
        return now.toISOString();
      }

      function scrollToBottom() {
        requestAnimationFrame(() => {
          messagesEl.scrollTop = messagesEl.scrollHeight;
        });
      }

      /* ===== Storage ===== */
      function saveToStorage() {
        try {
          const data = { currentStar, messages, updatedAt: getFullTimestamp() };
          localStorage.setItem(CONFIG.STORAGE_KEY, JSON.stringify(data));
        } catch (e) { /* ignore */ }
      }

      function loadFromStorage() {
        try {
          const raw = localStorage.getItem(CONFIG.STORAGE_KEY);
          return raw ? JSON.parse(raw) : null;
        } catch { return null; }
      }

      /* ===== 偶像按钮渲染 ===== */
      function renderStarButtons() {
        starSelector.innerHTML = '';
        stars.forEach(s => {
          const btn = document.createElement('button');
          btn.className = 'star-btn';
          btn.dataset.star = s.name;
          btn.innerHTML = `<span class="star-emoji">${s.emoji || '⭐'}</span>${s.name}`;
          if (s.name === currentStar) btn.classList.add('active');
          btn.addEventListener('click', () => {
            if (currentStar !== s.name && messages.length > 0) {
              messages = [];
              renderMessages();
            }
            selectStar(s.name);
          });
          starSelector.appendChild(btn);
        });
        // 检测是否可横向滚动（移动端）
        requestAnimationFrame(() => {
          starSelector.classList.toggle('can-scroll', starSelector.scrollWidth > starSelector.clientWidth);
        });
      }

      function findStarData(starName) {
        return stars.find(s => s.name === starName) || { emoji: '⭐', color: '#e8865e' };
      }

      /* ===== 设置面板 ===== */
      let settingsDirty = false;
      let editingStars = [];

      function openSettings() {
        editingStars = stars.map(s => ({ ...s }));
        settingsDirty = false;
        renderSettingsPanel();
      }

      function closeSettings() {
        const overlay = document.querySelector('.settings-overlay');
        if (overlay) overlay.remove();
      }

      function renderSettingsPanel() {
        closeSettings();

        const overlay = document.createElement('div');
        overlay.className = 'settings-overlay';
        overlay.innerHTML = `
          <div class="settings-panel">
            <div class="settings-header">
              <h2>管理偶像</h2>
              <button class="settings-close" id="settingsClose">&times;</button>
            </div>
            <div class="settings-body" id="settingsBody"></div>
            <div class="settings-footer">
              <button class="settings-cancel" id="settingsCancel">取消</button>
              <button class="settings-save" id="settingsSave">保存更改</button>
            </div>
          </div>`;
        document.body.appendChild(overlay);

        document.getElementById('settingsClose').onclick = closeSettings;
        document.getElementById('settingsCancel').onclick = closeSettings;
        document.getElementById('settingsSave').onclick = saveSettings;

        overlay.addEventListener('click', e => {
          if (e.target === overlay) closeSettings();
        });

        renderStarCards();
      }

      function renderStarCards() {
        const body = document.getElementById('settingsBody');

        // 已存偶像卡片
        editingStars.forEach((s, i) => {
          const card = document.createElement('div');
          card.className = 'star-card';
          card.innerHTML = `
            <div class="star-card-header">
              <div class="star-card-info">
                <span class="star-card-emoji">${s.emoji || '⭐'}</span>
                <span class="star-card-name">${s.name}</span>
              </div>
              <div class="star-card-actions">
                <button class="edit-btn" data-idx="${i}">&#9998;</button>
                <button class="del-btn" data-idx="${i}">&times;</button>
              </div>
            </div>
            <div class="star-card-prompt">${s.prompt || ''}</div>`;
          body.appendChild(card);

          card.querySelector('.edit-btn').onclick = () => openEditModal(i);
          card.querySelector('.del-btn').onclick = () => {
            if (editingStars.length <= 1) {
              alert('至少保留一个偶像');
              return;
            }
            editingStars.splice(i, 1);
            settingsDirty = true;
            renderStarCards();
          };
        });

        // 添加按钮
        const addBtn = document.createElement('button');
        addBtn.className = 'add-star-btn';
        addBtn.textContent = '+ 添加新偶像';
        addBtn.onclick = () => openEditModal(-1);
        body.appendChild(addBtn);
      }

      /* ===== 编辑弹窗 ===== */
      function openEditModal(idx) {
        const isNew = idx === -1;
        const data = isNew ? { name: '', emoji: '⭐', color: '#e8865e', prompt: '' } : { ...editingStars[idx] };

        const overlay = document.createElement('div');
        overlay.className = 'edit-modal-overlay';
        overlay.innerHTML = `
          <div class="edit-modal">
            <h3>${isNew ? '添加偶像' : '编辑偶像'}</h3>
            <div class="edit-field">
              <label>偶像名称</label>
              <input type="text" id="editName" value="${data.name}" placeholder="例如：王小明" />
            </div>
            <div class="edit-emoji-color">
              <div class="edit-field">
                <label>头像 emoji</label>
                <input type="text" id="editEmoji" value="${data.emoji}" placeholder="🦊" />
              </div>
              <div class="edit-field">
                <label>主题色</label>
                <input type="text" id="editColor" value="${data.color}" placeholder="#e8865e" />
              </div>
            </div>
            <div class="edit-field">
              <label>人设提示词</label>
              <textarea id="editPrompt" placeholder="描述这个偶像的性格和说话方式...">${data.prompt || ''}</textarea>
            </div>
            <div class="edit-modal-actions">
              <button class="edit-modal-cancel" id="editCancel">取消</button>
              <button class="edit-modal-save" id="editSave">${isNew ? '添加' : '保存'}</button>
            </div>
          </div>`;
        document.body.appendChild(overlay);

        document.getElementById('editCancel').onclick = () => overlay.remove();
        document.getElementById('editSave').onclick = () => {
          const name = document.getElementById('editName').value.trim();
          const emoji = document.getElementById('editEmoji').value.trim();
          const color = document.getElementById('editColor').value.trim();
          const prompt = document.getElementById('editPrompt').value.trim();

          if (!name) { alert('请输入偶像名称'); return; }
          if (!prompt) { alert('请输入人设提示词'); return; }

          // 检查重名（排除自己）
          const dup = editingStars.findIndex((s, i) => s.name === name && i !== idx);
          if (dup !== -1) { alert('偶像名称不能重复'); return; }

          if (isNew) {
            editingStars.push({ name, emoji: emoji || '⭐', color: color || '#e8865e', prompt });
          } else {
            editingStars[idx] = { name, emoji: emoji || '⭐', color: color || '#e8865e', prompt };
          }
          settingsDirty = true;
          overlay.remove();
          renderStarCards();
        };

        overlay.addEventListener('click', e => {
          if (e.target === overlay) overlay.remove();
        });

        // 聚焦名称输入
        setTimeout(() => document.getElementById('editName')?.focus(), 100);
      }

      async function saveSettings() {
        if (!settingsDirty) { closeSettings(); return; }

        const saveBtn = document.getElementById('settingsSave');
        saveBtn.textContent = '保存中...';
        saveBtn.disabled = true;

        try {
          const res = await fetch(CONFIG.API_URL.replace('/chat', '/stars'), {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ stars: editingStars }),
          });
          if (!res.ok) throw new Error('保存失败');
          const data = await res.json();
          stars = data.stars;
          // 如果当前选中的偶像被删了，重置
          if (!stars.some(s => s.name === currentStar)) {
            currentStar = null;
          }
          renderStarButtons();
          updateSendButton();
          closeSettings();
        } catch (err) {
          alert('保存失败，请检查网络连接：' + err.message);
          saveBtn.textContent = '保存更改';
          saveBtn.disabled = false;
        }
      }

      /* ===== 消息渲染 ===== */
      function renderMessages() {
        while (messagesEl.firstChild) messagesEl.removeChild(messagesEl.firstChild);
        if (messages.length === 0) { messagesEl.appendChild(emptyState); return; }
        const fragment = document.createDocumentFragment();
        for (const msg of messages) {
          fragment.appendChild(createMessageElement(msg.role, msg.content, msg.time, msg.star));
        }
        messagesEl.appendChild(fragment);
        scrollToBottom();
      }

      function createMessageElement(role, content, time, star) {
        const div = document.createElement('div');
        div.className = `message ${role}`;
        if (role === 'ai' && star) div.dataset.star = star;

        const avatar = document.createElement('div');
        avatar.className = 'avatar';
        if (role === 'user') {
          avatar.textContent = '🙋';
        } else if (role === 'ai' && star) {
          const sd = findStarData(star);
          avatar.textContent = sd.emoji || '⭐';
        }

        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble.textContent = content;

        const timeEl = document.createElement('div');
        timeEl.className = 'time';
        timeEl.textContent = time || getTimestamp();

        div.append(avatar, bubble, timeEl);
        return div;
      }

      function appendMessage(role, content, time, star) {
        if (messagesEl.contains(emptyState)) messagesEl.removeChild(emptyState);
        messagesEl.appendChild(createMessageElement(role, content, time, star));
        scrollToBottom();
      }

      function updateLastAIMessage(content) {
        const aiMsgs = messagesEl.querySelectorAll('.message.ai');
        if (!aiMsgs.length) return;
        const bubble = aiMsgs[aiMsgs.length - 1].querySelector('.bubble');
        if (bubble) { bubble.textContent = content; scrollToBottom(); }
      }

      /* ===== Streaming ===== */
      async function sendMessage(text) {
        if (!currentStar || isStreaming || !text.trim()) return;

        const userMsg = { role: 'user', content: text.trim(), time: getTimestamp() };
        messages.push(userMsg);
        appendMessage('user', userMsg.content, userMsg.time);
        saveToStorage();

        const aiMsg = { role: 'ai', content: '', time: getTimestamp(), star: currentStar };
        messages.push(aiMsg);
        appendMessage('ai', '', aiMsg.time, currentStar);
        isStreaming = true;
        updateSendButton();

        const aiEls = messagesEl.querySelectorAll('.message.ai');
        const lastAiEl = aiEls[aiEls.length - 1];
        lastAiEl.classList.add('typing');
        const bubble = lastAiEl.querySelector('.bubble');
        bubble.innerHTML = '<span class="dot"></span><span class="dot"></span><span class="dot"></span>';

        abortController = new AbortController();

        try {
          const response = await fetch(CONFIG.API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ star: currentStar, message: text.trim() }),
            signal: abortController.signal,
          });
          if (!response.ok) throw new Error(`HTTP ${response.status}`);

          lastAiEl.classList.remove('typing');
          const reader = response.body.getReader();
          const decoder = new TextDecoder();
          let buffer = '', fullContent = '';

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split('\n');
            buffer = lines.pop() || '';
            for (const line of lines) {
              if (!line.startsWith('data: ')) continue;
              const jsonStr = line.slice(6).trim();
              if (!jsonStr || jsonStr === '[DONE]') continue;
              try {
                const data = JSON.parse(jsonStr);
                if (data.content) { fullContent += data.content; updateLastAIMessage(fullContent); }
              } catch { /* ignore */ }
            }
          }
          // 处理最后一行
          if (buffer.startsWith('data: ')) {
            const jsonStr = buffer.slice(6).trim();
            if (jsonStr && jsonStr !== '[DONE]') {
              try { const data = JSON.parse(jsonStr); if (data.content) fullContent += data.content; updateLastAIMessage(fullContent); } catch { /* ignore */ }
            }
          }
          const lastMsg = messages[messages.length - 1];
          if (lastMsg && lastMsg.role === 'ai') lastMsg.content = fullContent || '(未收到回复)';
          saveToStorage();
        } catch (err) {
          if (err.name === 'AbortError') return;
          if (lastAiEl) lastAiEl.classList.remove('typing');
          const errText = '抱歉，连接出错了，请稍后重试。';
          updateLastAIMessage(errText);
          if (messages.length) messages[messages.length - 1].content = errText;
          saveToStorage();
        } finally {
          isStreaming = false;
          abortController = null;
          updateSendButton();
          inputEl.focus();
        }
      }

      /* ===== UI Controls ===== */
      function selectStar(star) {
        currentStar = star;
        document.querySelectorAll('.star-btn').forEach(btn => {
          btn.classList.toggle('active', btn.dataset.star === star);
        });
        updateSendButton();
        inputEl.focus();
      }

      function updateSendButton() {
        sendBtn.disabled = !(currentStar && !isStreaming && inputEl.value.trim().length > 0);
      }

      function handleSend() {
        const text = inputEl.value.trim();
        if (!text) return;
        inputEl.value = '';
        inputEl.style.height = 'auto';
        updateSendButton();
        sendMessage(text);
      }

      function autoResize() {
        inputEl.style.height = 'auto';
        inputEl.style.height = Math.min(inputEl.scrollHeight, 100) + 'px';
      }

      /* ===== 从后端加载偶像 ===== */
      async function loadStars() {
        try {
          const res = await fetch(CONFIG.API_URL.replace('/chat', '/stars'));
          if (!res.ok) throw new Error('加载失败');
          const data = await res.json();
          stars = data.stars || [];
        } catch {
          // 离线回退：使用完整默认数据
          stars = [
            { name: "丁程鑫", emoji: "🦊", color: "#e8865e", prompt: "你是丁程鑫..." },
            { name: "宋亚轩", emoji: "🐬", color: "#5bc0de", prompt: "你是宋亚轩..." },
            { name: "刘耀文", emoji: "🐺", color: "#d4a373", prompt: "你是刘耀文..." },
            { name: "马嘉祺", emoji: "🐱", color: "#f0a030", prompt: "你是马嘉祺..." },
            { name: "严浩翔", emoji: "🦮", color: "#8a9ba8", prompt: "你是严浩翔..." },
            { name: "贺峻霖", emoji: "🐹", color: "#f5a5b5", prompt: "你是贺峻霖..." },
            { name: "张真源", emoji: "🐻", color: "#7a9ec7", prompt: "你是张真源..." },
            { name: "陈奕恒", emoji: "🐰", color: "#7cb89a", prompt: "你是陈奕恒..." },
            { name: "朱志鑫", emoji: "🦁", color: "#d4875e", prompt: "你是朱志鑫..." },
            { name: "苏新皓", emoji: "🐿️", color: "#c9a96e", prompt: "你是苏新皓..." },
            { name: "左航",   emoji: "🦅", color: "#6b8fa3", prompt: "你是左航..." },
            { name: "张极",   emoji: "🦋", color: "#b88cc4", prompt: "你是张极..." },
            { name: "张泽禹", emoji: "🐯", color: "#e8a838", prompt: "你是张泽禹..." },
            { name: "邓佳鑫", emoji: "🐆", color: "#c49a6c", prompt: "你是邓佳鑫..." },
            { name: "余宇涵", emoji: "🐳", color: "#5d9bca", prompt: "你是余宇涵..." },
            { name: "童禹坤", emoji: "🐼", color: "#7a8a8a", prompt: "你是童禹坤..." },
            { name: "穆祉丞", emoji: "🐣", color: "#f5d76e", prompt: "你是穆祉丞..." },
            { name: "黄朔",   emoji: "🦌", color: "#b5a07a", prompt: "你是黄朔..." },
            { name: "姚昱辰", emoji: "🦔", color: "#8b7355", prompt: "你是姚昱辰..." },
            { name: "王俊凯", emoji: "👑", color: "#e8c84a", prompt: "你是王俊凯..." },
            { name: "王源",   emoji: "🍀", color: "#6db37a", prompt: "你是王源..." },
            { name: "易烊千玺", emoji: "😼", color: "#b05c5c", prompt: "你是易烊千玺..." },
          ];
        }
      }

      /* ===== 初始化 ===== */
      async function init() {
        await loadStars();

        // 恢复本地聊天记录
        const saved = loadFromStorage();
        if (saved && saved.currentStar && stars.some(s => s.name === saved.currentStar) && Array.isArray(saved.messages) && saved.messages.length > 0) {
          currentStar = saved.currentStar;
          messages = saved.messages;
        }

        renderStarButtons();
        renderMessages();

        if (messages.length === 0 && messagesEl.contains(emptyState) === false) {
          messagesEl.appendChild(emptyState);
        }

        updateSendButton();

        // 事件绑定
        sendBtn.addEventListener('click', handleSend);
        inputEl.addEventListener('keydown', e => {
          if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
        });
        inputEl.addEventListener('input', () => { autoResize(); updateSendButton(); });
        messagesEl.addEventListener('click', () => { if (!isStreaming) inputEl.focus(); });
        settingsToggle.addEventListener('click', openSettings);
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
      } else {
        init();
      }
    })();
  </script>
</body>
