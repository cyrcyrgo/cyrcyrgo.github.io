<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 小游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        body {
            background-color: #faf8ef;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .game-container {
            max-width: 500px;
            width: 100%;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .title {
            font-size: 48px;
            font-weight: bold;
            color: #776e65;
        }

        .scores {
            display: flex;
            gap: 10px;
        }

        .score-box {
            background-color: #bbada0;
            padding: 10px 20px;
            border-radius: 6px;
            text-align: center;
            color: white;
        }

        .score-label {
            font-size: 12px;
            text-transform: uppercase;
        }

        .score-value {
            font-size: 24px;
            font-weight: bold;
        }

        .auto-btn {
            background-color: #8f7a66;
            color: white;
            border: none;
            padding: 10px 18px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            margin-left: auto;
        }

        .auto-btn:hover {
            background-color: #9f8b77;
        }

        .auto-btn.active {
            background-color: #f65e3b;
        }

        .game-board {
            position: relative;
            background-color: #bbada0;
            border-radius: 10px;
            padding: 15px;
            touch-action: none; /* 防止触屏时页面滚动 */
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }

        .grid-cell {
            width: 100%;
            aspect-ratio: 1;
            background-color: #cdc1b4;
            border-radius: 6px;
        }

        .tile-container {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            bottom: 15px;
            pointer-events: none;
        }

        .tile {
            position: absolute;
            width: calc((100% - 45px) / 4);
            height: calc((100% - 45px) / 4);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: bold;
            transition: all 0.15s ease-in-out;
            z-index: 10;
        }

        /* 不同数字的配色方案 */
        .tile-2 { background-color: #eee4da; color: #776e65; }
        .tile-4 { background-color: #ede0c8; color: #776e65; }
        .tile-8 { background-color: #f2b179; color: white; }
        .tile-16 { background-color: #f59563; color: white; }
        .tile-32 { background-color: #f67c5f; color: white; }
        .tile-64 { background-color: #f65e3b; color: white; }
        .tile-128 { background-color: #edcf72; color: white; font-size: 28px; }
        .tile-256 { background-color: #edcc61; color: white; font-size: 28px; }
        .tile-512 { background-color: #edc850; color: white; font-size: 28px; }
        .tile-1024 { background-color: #edc53f; color: white; font-size: 24px; }
        .tile-2048 { background-color: #edc22e; color: white; font-size: 24px; }
        .tile-super { background-color: #3c3a32; color: white; font-size: 20px; }

        /* 新方块出现动画 */
        .tile-new {
            animation: appear 0.2s ease-in-out;
        }

        @keyframes appear {
            0% {
                opacity: 0;
                transform: scale(0);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* 方块合并动画 */
        .tile-merged {
            animation: pop 0.2s ease-in-out;
            z-index: 20;
        }

        @keyframes pop {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.2);
            }
            100% {
                transform: scale(1);
            }
        }

        .game-message {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(238, 228, 218, 0.73);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease-in-out;
        }

        .game-message.show {
            opacity: 1;
            pointer-events: auto;
        }

        .message-text {
            font-size: 48px;
            font-weight: bold;
            color: #776e65;
            margin-bottom: 20px;
        }

        .restart-btn {
            background-color: #8f7a66;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .restart-btn:hover {
            background-color: #9f8b77;
        }

        .instructions {
            margin-top: 20px;
            text-align: center;
            color: #776e65;
            font-size: 14px;
            line-height: 1.5;
        }

        /* 响应式布局 */
        @media (max-width: 500px) {
            .title {
                font-size: 36px;
            }

            .score-box {
                padding: 8px 15px;
            }

            .score-value {
                font-size: 20px;
            }

            .auto-btn {
                padding: 8px 15px;
                font-size: 14px;
            }

            .game-board {
                padding: 10px;
            }

            .grid-container {
                gap: 10px;
            }

            .tile-container {
                top: 10px;
                left: 10px;
                right: 10px;
                bottom: 10px;
            }

            .tile {
                width: calc((100% - 30px) / 4);
                height: calc((100% - 30px) / 4);
                font-size: 24px;
            }

            .tile-128, .tile-256, .tile-512 {
                font-size: 20px;
            }

            .tile-1024, .tile-2048 {
                font-size: 18px;
            }

            .tile-super {
                font-size: 16px;
            }

            .message-text {
                font-size: 36px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <div class="title">2048</div>
            <div class="scores">
                <div class="score-box">
                    <div class="score-label">分数</div>
                    <div class="score-value" id="score">0</div>
                </div>
                <div class="score-box">
                    <div class="score-label">最高分</div>
                    <div class="score-value" id="best-score">0</div>
                </div>
            </div>
            <button class="auto-btn" id="auto-btn">开启Auto</button>
        </div>

        <div class="game-board" id="game-board">
            <div class="grid-container">
                <!-- 16个网格单元格 -->
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
            </div>
            <div class="tile-container" id="tile-container"></div>
            
            <div class="game-message" id="game-message">
                <div class="message-text" id="message-text">游戏结束!</div>
                <button class="restart-btn" id="restart-btn">重新开始</button>
            </div>
        </div>

        <div class="instructions">
            <p>使用方向键 ↑ ↓ ← → 或触屏滑动来移动方块</p>
            <p>点击"开启Auto"按钮可自动循环运行，合成2048即可获胜!</p>
        </div>
    </div>

    <script>
        // 游戏状态
        let grid = [];
        let score = 0;
        let bestScore = localStorage.getItem('2048-best-score') || 0;
        let gameOver = false;
        let gameWon = false;
        
        // Auto模式状态
        let autoMode = false;
        let autoInterval = null;
        const autoDirections = ['up', 'right', 'down', 'left']; // 循环方向顺序
        let currentDirectionIndex = 0;

        // DOM元素
        const tileContainer = document.getElementById('tile-container');
        const scoreElement = document.getElementById('score');
        const bestScoreElement = document.getElementById('best-score');
        const gameMessage = document.getElementById('game-message');
        const messageText = document.getElementById('message-text');
        const restartBtn = document.getElementById('restart-btn');
        const autoBtn = document.getElementById('auto-btn');

        // 初始化游戏
        function initGame() {
            // 重置游戏状态
            grid = Array(4).fill().map(() => Array(4).fill(0));
            score = 0;
            gameOver = false;
            gameWon = false;
            
            // 停止Auto模式
            stopAutoMode();
            
            // 更新UI
            updateScore();
            bestScoreElement.textContent = bestScore;
            gameMessage.classList.remove('show');
            tileContainer.innerHTML = '';
            
            // 生成两个初始方块
            generateRandomTile();
            generateRandomTile();
        }

        // 在随机空白位置生成新方块
        function generateRandomTile() {
            // 找到所有空白格子
            const emptyCells = [];
            for (let i = 0; i < 4; i++) {
                for (let j = 0; j < 4; j++) {
                    if (grid[i][j] === 0) {
                        emptyCells.push({ row: i, col: j });
                    }
                }
            }
            
            if (emptyCells.length === 0) return false;
            
            // 随机选择一个空白格子
            const randomCell = emptyCells[Math.floor(Math.random() * emptyCells.length)];
            // 90%概率生成2，10%概率生成4
            const value = Math.random() < 0.9 ? 2 : 4;
            
            // 更新网格数据
            grid[randomCell.row][randomCell.col] = value;
            
            // 创建并添加方块元素
            addTile(randomCell.row, randomCell.col, value, true);
            
            return true;
        }

        // 添加方块元素到DOM
        function addTile(row, col, value, isNew = false, isMerged = false) {
            const tile = document.createElement('div');
            tile.classList.add('tile');
            tile.classList.add(`tile-${value > 2048 ? 'super' : value}`);
            tile.textContent = value;
            
            // 设置方块位置
            setTilePosition(tile, row, col);
            
            // 添加动画类
            if (isNew) {
                tile.classList.add('tile-new');
            }
            if (isMerged) {
                tile.classList.add('tile-merged');
            }
            
            tileContainer.appendChild(tile);
            
            // 动画结束后移除动画类
            setTimeout(() => {
                tile.classList.remove('tile-new', 'tile-merged');
            }, 200);
        }

        // 设置方块的位置
        function setTilePosition(tile, row, col) {
            const gap = window.innerWidth <= 500 ? 10 : 15;
            const tileSize = `calc((100% - ${gap * 3}px) / 4)`;
            
            tile.style.top = `calc(${row} * (${tileSize} + ${gap}px))`;
            tile.style.left = `calc(${col} * (${tileSize} + ${gap}px))`;
        }

        // 更新分数显示
        function updateScore() {
            scoreElement.textContent = score;
            if (score > bestScore) {
                bestScore = score;
                bestScoreElement.textContent = bestScore;
                localStorage.setItem('2048-best-score', bestScore);
            }
        }

        // 移动方块
        function move(direction) {
            if (gameOver || gameWon) return;
            
            let moved = false;
            const oldGrid = JSON.parse(JSON.stringify(grid));
            const mergedPositions = [];
            
            // 根据方向处理移动
            switch (direction) {
                case 'up':
                    for (let col = 0; col < 4; col++) {
                        const column = [];
                        for (let row = 0; row < 4; row++) {
                            column.push(grid[row][col]);
                        }
                        
                        const result = processLine(column);
                        for (let row = 0; row < 4; row++) {
                            grid[row][col] = result.line[row];
                            if (result.merged[row]) {
                                mergedPositions.push({ row, col });
                            }
                        }
                    }
                    break;
                    
                case 'down':
                    for (let col = 0; col < 4; col++) {
                        const column = [];
                        for (let row = 3; row >= 0; row--) {
                            column.push(grid[row][col]);
                        }
                        
                        const result = processLine(column);
                        for (let row = 3; row >= 0; row--) {
                            grid[row][col] = result.line[3 - row];
                            if (result.merged[3 - row]) {
                                mergedPositions.push({ row, col });
                            }
                        }
                    }
                    break;
                    
                case 'left':
                    for (let row = 0; row < 4; row++) {
                        const result = processLine(grid[row]);
                        grid[row] = result.line;
                        for (let col = 0; col < 4; col++) {
                            if (result.merged[col]) {
                                mergedPositions.push({ row, col });
                            }
                        }
                    }
                    break;
                    
                case 'right':
                    for (let row = 0; row < 4; row++) {
                        const reversed = [...grid[row]].reverse();
                        const result = processLine(reversed);
                        grid[row] = result.line.reverse();
                        for (let col = 0; col < 4; col++) {
                            if (result.merged[3 - col]) {
                                mergedPositions.push({ row, col });
                            }
                        }
                    }
                    break;
            }
            
            // 检查是否有移动
            for (let i = 0; i < 4; i++) {
                for (let j = 0; j < 4; j++) {
                    if (oldGrid[i][j] !== grid[i][j]) {
                        moved = true;
                        break;
                    }
                }
                if (moved) break;
            }
            
            if (moved) {
                // 清除所有旧方块
                tileContainer.innerHTML = '';
                
                // 重新渲染所有方块
                for (let i = 0; i < 4; i++) {
                    for (let j = 0; j < 4; j++) {
                        if (grid[i][j] !== 0) {
                            const isMerged = mergedPositions.some(pos => pos.row === i && pos.col === j);
                            addTile(i, j, grid[i][j], false, isMerged);
                        }
                    }
                }
                
                // 生成新方块
                setTimeout(() => {
                    generateRandomTile();
                    
                    // 检查游戏状态
                    checkGameState();
                }, 150);
            }
            
            return moved;
        }

        // 处理一行/一列的移动和合并
        function processLine(line) {
            let newLine = line.filter(val => val !== 0);
            const merged = Array(4).fill(false);
            
            // 合并相同数字
            for (let i = 0; i < newLine.length - 1; i++) {
                if (newLine[i] === newLine[i + 1]) {
                    newLine[i] *= 2;
                    score += newLine[i];
                    merged[i] = true;
                    newLine.splice(i + 1, 1);
                }
            }
            
            // 补零
            while (newLine.length < 4) {
                newLine.push(0);
            }
            
            return { line: newLine, merged };
        }

        // 检查游戏状态（胜利或失败）
        function checkGameState() {
            updateScore();
            
            // 检查是否合成了2048
            if (!gameWon) {
                for (let i = 0; i < 4; i++) {
                    for (let j = 0; j < 4; j++) {
                        if (grid[i][j] === 2048) {
                            gameWon = true;
                            stopAutoMode(); // 胜利时自动停止Auto模式
                            showMessage('恭喜你赢了!');
                            return;
                        }
                    }
                }
            }
            
            // 检查是否还有空白格子
            for (let i = 0; i < 4; i++) {
                for (let j = 0; j < 4; j++) {
                    if (grid[i][j] === 0) {
                        return;
                    }
                }
            }
            
            // 检查是否还有可以合并的相邻方块
            for (let i = 0; i < 4; i++) {
                for (let j = 0; j < 4; j++) {
                    const current = grid[i][j];
                    // 检查右边
                    if (j < 3 && current === grid[i][j + 1]) {
                        return;
                    }
                    // 检查下边
                    if (i < 3 && current === grid[i + 1][j]) {
                        return;
                    }
                }
            }
            
            // 如果到这里，说明游戏结束
            gameOver = true;
            stopAutoMode(); // 失败时自动停止Auto模式
            showMessage('游戏结束!');
        }

        // 显示游戏消息
        function showMessage(text) {
            messageText.textContent = text;
            gameMessage.classList.add('show');
        }

        // 键盘事件处理
        document.addEventListener('keydown', (e) => {
            // 如果Auto模式开启，手动操作会自动关闭Auto模式
            if (autoMode) {
                stopAutoMode();
            }
            
            switch (e.key) {
                case 'ArrowUp':
                    e.preventDefault();
                    move('up');
                    break;
                case 'ArrowDown':
                    e.preventDefault();
                    move('down');
                    break;
                case 'ArrowLeft':
                    e.preventDefault();
                    move('left');
                    break;
                case 'ArrowRight':
                    e.preventDefault();
                    move('right');
                    break;
            }
        });

        // 触屏滑动事件处理
        let touchStartX = 0;
        let touchStartY = 0;
        let touchEndX = 0;
        let touchEndY = 0;

        const gameBoard = document.getElementById('game-board');

        gameBoard.addEventListener('touchstart', (e) => {
            // 如果Auto模式开启，手动操作会自动关闭Auto模式
            if (autoMode) {
                stopAutoMode();
            }
            
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, { passive: true });

        gameBoard.addEventListener('touchend', (e) => {
            touchEndX = e.changedTouches[0].clientX;
            touchEndY = e.changedTouches[0].clientY;
            handleSwipe();
        }, { passive: true });

        function handleSwipe() {
            const deltaX = touchEndX - touchStartX;
            const deltaY = touchEndY - touchStartY;
            
            // 最小滑动距离
            const minSwipeDistance = 30;
            
            // 判断滑动方向
            if (Math.abs(deltaX) > Math.abs(deltaY)) {
                // 水平滑动
                if (Math.abs(deltaX) > minSwipeDistance) {
                    if (deltaX > 0) {
                        move('right');
                    } else {
                        move('left');
                    }
                }
            } else {
                // 垂直滑动
                if (Math.abs(deltaY) > minSwipeDistance) {
                    if (deltaY > 0) {
                        move('down');
                    } else {
                        move('up');
                    }
                }
            }
        }

        // 开启Auto模式
        function startAutoMode() {
            if (gameOver || gameWon) return;
            
            autoMode = true;
            autoBtn.textContent = '关闭Auto';
            autoBtn.classList.add('active');
            currentDirectionIndex = 0;
            
            // 设置高速自动运行间隔（180ms，与动画时间匹配）
            autoInterval = setInterval(() => {
                const direction = autoDirections[currentDirectionIndex];
                const moved = move(direction);
                
                // 无论是否移动成功，都切换到下一个方向
                currentDirectionIndex = (currentDirectionIndex + 1) % autoDirections.length;
            }, 180);
        }

        // 停止Auto模式
        function stopAutoMode() {
            autoMode = false;
            autoBtn.textContent = '开启Auto';
            autoBtn.classList.remove('active');
            
            if (autoInterval) {
                clearInterval(autoInterval);
                autoInterval = null;
            }
        }

        // Auto模式按钮事件
        autoBtn.addEventListener('click', () => {
            if (autoMode) {
                stopAutoMode();
            } else {
                startAutoMode();
            }
        });

        // 重新开始按钮事件
        restartBtn.addEventListener('click', initGame);

        // 页面加载时初始化游戏
        window.addEventListener('load', initGame);
    </script>
</body>
</html>
